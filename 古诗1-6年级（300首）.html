        content: [{t:"梅雪争春未肯降，",m:"梅花和雪花争夺春色，谁也不肯服输。"},{t:"骚人阁笔费评章。",m:"文人放下笔，难以评判高下。"},{t:"梅须逊雪三分白，",m:"梅花须输给雪花三分洁白。"},{t:"雪却输梅一段香。",m:"雪花却输给梅花一段清香。"}],
        translation: "梅花和雪花争夺春色，谁也不肯服输，文人骚客放下笔，难以评判它们的高下。梅花须输给雪花三分洁白，雪花却输给梅花一段清香。这首诗告诉我们事物各有长短，要取长补短。",
        quiz: [{q:"“未肯降”的意思是？",options:["不肯下雪","不肯服输","不肯降落","不肯投降"],ans:1},{q:"“骚人”是指？",options:["发骚的人","诗人/文人","坏人","路人"],ans:1},{q:"“阁笔”的意思是？",options:["拿起笔","放下笔","阁楼上的笔","买笔"],ans:1},{q:"梅花输给雪的是？",options:["香气","白色/洁白","美丽","高度"],ans:1},{q:"雪输给梅花的是？",options:["香气","颜色","数量","温度"],ans:0}]
    },
    {
        id: 98, category: '五年级', title: "观书有感", author: "宋 · 朱熹", image: "观书有感.png",
        content: [{t:"半亩方塘一鉴开，",m:"半亩大的方形池塘像一面镜子打开。"},{t:"天光云影共徘徊。",m:"天光和云影在水中一同移动。"},{t:"问渠那得清如许？",m:"要问它怎么能这样清澈？"},{t:"为有源头活水来。",m:"因为有源源不断的活水流进来。"}],
        translation: "半亩大的方形池塘像一面打开的镜子，天光和云影在水中一同来回移动。要问这池塘的水怎么能这样清澈呢？是因为有源源不断的活水流进来啊。这首诗借水喻理，告诉我们要不断学习新知识，才能保持思想的活力。",
        quiz: [{q:"“一鉴开”比喻？",options:["打开书","像镜子一样打开","鉴别","开门"],ans:1},{q:"“徘徊”是指？",options:["来回移动/晃动","犹豫","走路","排队"],ans:0},{q:"“渠”是指？",options:["水渠","它(指方塘)","渠道","哪里"],ans:1},{q:"“清如许”的意思是？",options:["清澈","清闲","像这样清澈","许多"],ans:2},{q:"这首诗告诉我们？",options:["要保护水资源","要不断学习/补充新知","风景很美","池塘很深"],ans:1}]
    },
    {
        id: 99, category: '五年级', title: "乞巧", author: "唐 · 林杰", image: "乞巧.png",
        content: [{t:"七夕今宵看碧霄，",m:"七夕的今夜仰望碧蓝的天空。"},{t:"牵牛织女渡河桥。",m:"牵牛星和织女星跨过银河相会。"},{t:"家家乞巧望秋月，",m:"家家户户都在秋月下乞取智巧。"},{t:"穿尽红丝几万条。",m:"穿过的红线有几万条。"}],
        translation: "七夕的今夜仰望碧蓝的天空，仿佛看见牵牛星和织女星跨过银河相会。家家户户的妇女都在秋月下向织女乞取智巧，穿过的红线有几万条。这首诗描写了七夕节乞巧的民俗。",
        quiz: [{q:"“七夕”是指？",options:["农历七月初七","七月十四","七月一日","七月十五"],ans:0},{q:"“碧霄”是指？",options:["碧绿的草","蓝天/夜空","碧玉","乐器"],ans:1},{q:"“乞巧”是向谁乞求？",options:["月亮","牛郎","织女","玉帝"],ans:2},{q:"“穿红丝”是为了？",options:["做衣服","比手巧","好玩","绑东西"],ans:1},{q:"这首诗描写的是？",options:["风景","节日习俗","神话","战争"],ans:1}]
    },
    {
        id: 100, category: '四年级', title: "大林寺桃花", author: "唐 · 白居易", image: "大林寺桃花.png",
        content: [{t:"人间四月芳菲尽，",m:"山下四月花儿已凋谢。"},{t:"山寺桃花始盛开。",m:"山寺里的桃花才刚刚盛开。"},{t:"长恨春归无觅处，",m:"常遗憾春天归去无处寻找。"},{t:"不知转入此中来。",m:"没想到转到这里又遇到了春天。"}],
        translation: "山下平原的四月，百花已经凋谢，而山寺里的桃花才刚刚盛开。我常遗憾春天归去无处寻找，没想到转到这里又遇到了春天。这首诗说明了高山气候与平原不同，景色也不同。",
        quiz: [{q:"“芳菲”是指？",options:["芳香","花草","名字","草地"],ans:1},{q:"“尽”的意思是？",options:["完/凋谢","尽头","尽量","全部"],ans:0},{q:"为什么山寺桃花“始盛开”？",options:["桃花开得慢","海拔高气温低","和尚种的","品种不同"],ans:1},{q:"“无觅处”意思是？",options:["找不到","不要找","没有去处","不想找"],ans:0},{q:"诗人看到桃花的心情是？",options:["悲伤","惊喜","愤怒","平淡"],ans:1}]
    },
    {
        id: 101, category: '四年级', title: "暮江吟", author: "唐 · 白居易", image: "暮江吟.png",
        content: [{t:"一道残阳铺水中，",m:"一道夕阳铺在江面上。"},{t:"半江瑟瑟半江红。",m:"一半江水碧绿，一半江水艳红。"},{t:"可怜九月初三夜，",m:"最可爱的是九月初三的夜晚。"},{t:"露似真珠月似弓。",m:"露水像珍珠，月亮像弯弓。"}],
        translation: "一道夕阳铺在江面上，照得江水一半碧绿，一半艳红。最可爱的是九月初三的夜晚，露水像珍珠一样晶莹，月亮像弯弓一样挂在天边。这首诗描写了深秋傍晚到夜间的江边美景。",
        quiz: [{q:"“残阳”是指？",options:["早上的太阳","快落山的太阳","破太阳","烈日"],ans:1},{q:"“铺”字说明？",options:["阳光柔和贴在水面","铺床","铺路","阳光猛烈"],ans:0},{q:"“瑟瑟”形容？",options:["发抖","碧绿色","红色","寒冷"],ans:1},{q:"“可怜”在这里意思是？",options:["值得同情","可爱","可惜","贫穷"],ans:1},{q:"“真珠”是指？",options:["真的猪","珍珠","露水","眼泪"],ans:1}]
    },
    {
        id: 102, category: '五年级', title: "菊花", author: "唐 · 元稹", image: "菊花.png",
        content: [{t:"秋丛绕舍似陶家，",m:"秋菊绕着房舍开放，像陶渊明的家。"},{t:"遍绕篱边日渐斜。",m:"我绕着篱笆观赏，不知不觉太阳西斜。"},{t:"不是花中偏爱菊，",m:"不是花中我偏偏喜爱菊花。"},{t:"此花开尽更无花。",m:"是因为菊花谢了就没有别的花了。"}],
        translation: "一丛丛秋菊绕着房舍开放，好像到了陶渊明的家。我绕着篱笆观赏，不知不觉太阳已经西斜。并不是我在百花中偏偏喜爱菊花，而是因为菊花谢了之后，这一年就没有别的花可赏了。这首诗赞美了菊花坚贞的品格。",
        quiz: [{q:"“陶家”是指？",options:["姓陶的人家","做陶器家","陶渊明的家","逃跑"],ans:2},{q:"“日渐斜”说明？",options:["地不平","观赏时间长/流连忘返","太阳坏了","斜坡"],ans:1},{q:"诗人为什么偏爱菊？",options:["菊花贵","菊花好吃","此花开尽更无花/殿军","菊花多"],ans:2},{q:"这首诗表达了？",options:["对菊花的珍视/喜爱","悲伤","无聊","想家"],ans:0},{q:"菊花通常象征？",options:["富贵","隐逸/高洁","爱情","友情"],ans:1}]
    },
    {
        id: 103, category: '六年级', title: "过零丁洋", author: "宋 · 文天祥", image: "过零丁洋.png",
        content: [{t:"辛苦遭逢起一经，",m:"回想我早年由科举入仕历尽辛苦。"},{t:"干戈寥落四周星。",m:"在战火中抗元已经度过了四年。"},{t:"山河破碎风飘絮，",m:"国家支离破碎像风中的柳絮。"},{t:"身世浮沉雨打萍。",m:"个人命运起伏像雨中的浮萍。"},{t:"惶恐滩头说惶恐，",m:"惶恐滩头曾诉说心中的惶恐。"},{t:"零丁洋里叹零丁。",m:"零丁洋里感叹自己的孤苦伶仃。"},{t:"人生自古谁无死？",m:"自古以来人谁能免不了一死？"},{t:"留取丹心照汗青。",m:"留下一颗赤诚的心光照史册。"}],
        translation: "回想我早年由科举入仕历尽辛苦，在战火中抗元已经度过了四个年头。国家支离破碎像风中的柳絮，个人命运起伏像雨中的浮萍。惶恐滩头曾诉说心中的惶恐，零丁洋里感叹自己的孤苦伶仃。自古以来人谁能免不了一死？我要留下一颗赤诚的爱国心光照史册。这首诗表现了诗人誓死不屈的民族气节。",
        quiz: [{q:"“干戈”代指？",options:["武器/战争","干活","兄弟","乐器"],ans:0},{q:"“四周星”是指？",options:["四周有星星","四年","四个星期","四个地方"],ans:1},{q:"“汗青”是指？",options:["汗水","青草","史册","墨水"],ans:2},{q:"“丹心”是指？",options:["红心/赤诚的心","丹药","担心的心","鸡蛋"],ans:0},{q:"千古名句是？",options:["山河破碎","身世浮沉","人生自古谁无死","惶恐滩头"],ans:2}]
    },
    {
        id: 104, category: '四年级', title: "逢雪宿芙蓉山主人", author: "唐 · 刘长卿", image: "逢雪宿芙蓉山主人.png",
        content: [{t:"日暮苍山远，",m:"暮色降临，苍山显得更加遥远。"},{t:"天寒白屋贫。",m:"天气寒冷，茅草屋显得更加贫困。"},{t:"柴门闻犬吠，",m:"柴门外听到了狗叫声。"},{t:"风雪夜归人。",m:"那是风雪夜归来的人。"}],
        translation: "暮色降临，连绵的苍山显得更加遥远，天气寒冷，茅草屋显得更加贫困。忽然听到柴门外狗叫了起来，原来是风雪夜归来的人。这首诗描绘了一幅风雪夜归图。",
        quiz: [{q:"“日暮”是指？",options:["早上","傍晚","中午","深夜"],ans:1},{q:"“苍山”是指？",options:["青翠的山","苍老的山","灰白的山","雪山"],ans:0},{q:"“白屋”是指？",options:["白色的房子","贫苦人家的茅屋","雪盖的屋","没人住的屋"],ans:1},{q:"听到“犬吠”说明？",options:["有坏人","有狼","有人来了","狗饿了"],ans:2},{q:"这首诗给人什么感觉？",options:["温暖","苍凉/清贫","热闹","恐怖"],ans:1}]
    },
    {
        id: 105, category: '六年级', title: "长歌行", author: "汉乐府", image: "长歌行.png",
        content: [{t:"百川东到海，",m:"百条江河向东流入大海。"},{t:"何时复西归？",m:"什么时候才能倒流回西方？"},{t:"少壮不努力，",m:"年少力壮时不努力向上。"},{t:"老大徒伤悲。",m:"年老时只能白白伤心悲切。"}],
        translation: "百条江河向东流入大海，什么时候才能倒流回西方呢？时间也是一样一去不复返。如果在年少力壮时不努力向上，等到年老时只能白白伤心悲切了。这首诗劝勉人们要珍惜时间，努力学习。",
        quiz: [{q:"“复”的意思是？",options:["重复","恢复","再/又","复习"],ans:2},{q:"“老大”是指？",options:["大哥","年纪老了","第一名","很大"],ans:1},{q:"“徒”的意思是？",options:["徒弟","走路","白白地","徒刑"],ans:2},{q:"这首诗告诉我们？",options:["要看海","河水流向","珍惜时间/少壮不努力","不要悲伤"],ans:2},{q:"这是一首？",options:["汉乐府民歌","唐诗","宋词","元曲"],ans:0}]
    },
    {
        id: 106, category: '五年级', title: "明日歌", author: "清 · 钱福", image: "明日歌.png",
        content: [{t:"明日复明日，",m:"明天又一个明天。"},{t:"明日何其多。",m:"明天是多么的多啊。"},{t:"我生待明日，",m:"我的一生都在等待明天。"},{t:"万事成蹉跎。",m:"什么事情都因此耽误了。"}],
        translation: "明天又一个明天，明天是多么的多啊。我的一生都在等待明天，结果什么事情都因此耽误了，一事无成。这首诗劝告人们要珍惜今天，不要把事情拖到明天。",
        quiz: [{q:"“复”的意思是？",options:["又","复习","报复","复杂"],ans:0},{q:"“何其”的意思是？",options:["为什么","多么","何时","哪里"],ans:1},{q:"“蹉跎”的意思是？",options:["摔倒","光阴虚度/耽误","磨蹭","跳舞"],ans:1},{q:"这首诗的主题是？",options:["赞美明天","劝人珍惜今天","抱怨时间少","等待机会"],ans:1},{q:"作者是谁？",options:["李白","杜甫","钱福","文天祥"],ans:2}]
    },
    {
        id: 107, category: '五年级', title: "鸟鸣涧", author: "唐 · 王维", image: "鸟鸣涧.png",
        content: [{t:"人闲桂花落，",m:"人闲静下来感到桂花飘落。"},{t:"夜静春山空。",m:"夜静谧，春天的山林空旷。"},{t:"月出惊山鸟，",m:"月亮升起惊动了山鸟。"},{t:"时鸣春涧中。",m:"时而鸣叫在春天的溪涧中。"}],
        translation: "人闲静下来甚至能感到桂花在飘落，夜静谧，春天的山林显得格外空旷。月亮升起，惊动了栖息的山鸟，它们时而在春天的溪涧中鸣叫。这首诗以动衬静，描写了春夜山中的幽静。",
        quiz: [{q:"“闲”反映了诗人？",options:["没事干","内心闲静","懒惰","嫌弃"],ans:1},{q:"“空”的感觉是？",options:["没有东西","空虚","空旷幽静","天空"],ans:2},{q:"为什么鸟被“惊”？",options:["月亮出来了/光线变化","有人来了","打雷了","风大了"],ans:0},{q:"这首诗用了什么手法？",options:["以动衬静","夸张","比喻","拟人"],ans:0},{q:"描写的季节是？",options:["春","夏","秋","冬"],ans:0}]
    },
    {
        id: 108, category: '五年级', title: "山居秋暝", author: "唐 · 王维", image: "山居秋暝.png",
        content: [{t:"空山新雨后，",m:"空旷的群山刚下过一场雨。"},{t:"天气晚来秋。",m:"傍晚的天气充满了秋意。"},{t:"明月松间照，",m:"明月透过松林洒落斑驳光影。"},{t:"清泉石上流。",m:"清澈的泉水在岩石上流淌。"}],
        translation: "空旷的群山刚下过一场雨，傍晚的天气充满了秋意。明月透过松林洒落斑驳光影，清澈的泉水在岩石上潺潺流淌。这首诗描绘了秋天傍晚山间如诗如画的美景，表现了诗人隐居生活的闲适。",
        quiz: [{q:"“暝”的意思是？",options:["日落/傍晚","闭眼","明白","明天"],ans:0},{q:"“空山”说明？",options:["山里没人","山是空的","幽静","荒凉"],ans:2},{q:"“晚来秋”是指？",options:["秋天晚来了","晚上来了秋意","晚上的秋天","秋天结束"],ans:1},{q:"名句“明月松间照”下句是？",options:["清泉石上流","黄河入海流","一行白鹭上青天","莲叶何田田"],ans:0},{q:"王维被称为？",options:["诗仙","诗圣","诗佛","诗鬼"],ans:2}]
    },
    {
        id: 109, category: '五年级', title: "相思", author: "唐 · 王维", image: "相思.png",
        content: [{t:"红豆生南国，",m:"红豆生长在南方。"},{t:"春来发几枝。",m:"春天来了长出多少新枝？"},{t:"愿君多采撷，",m:"希望你多采摘一些。"},{t:"此物最相思。",m:"因为这东西最能寄托相思。"}],
        translation: "红豆生长在南方，春天来了不知道长出了多少新枝？希望你多采摘一些，因为红豆最能寄托相思之情。这首诗借红豆表达了对友人的眷念。",
        quiz: [{q:"“红豆”又叫？",options:["相思子","黄豆","绿豆","豌豆"],ans:0},{q:"“南国”是指？",options:["南方","南边的国家","越南","南京"],ans:0},{q:"“采撷”的意思是？",options:["种植","采摘","购买","吃"],ans:1},{q:"“君”指的是？",options:["皇帝","君子","朋友/你","作者"],ans:2},{q:"这首诗的主题是？",options:["爱情/友情/相思","农业","风景","植物"],ans:0}]
    },
    {
        id: 110, category: '五年级', title: "杂诗", author: "唐 · 王维", image: "杂诗.png",
        content: [{t:"君自故乡来，",m:"你从故乡走来。"},{t:"应知故乡事。",m:"应该知道故乡的事情。"},{t:"来日绮窗前，",m:"你来的时候，我家雕花的窗前。"},{t:"寒梅著花未？",m:"那株腊梅开花了吗？"}],
        translation: "你从故乡走来，应该知道故乡最近发生的事情。请问你来的时候，我家雕花的窗前，那株腊梅开花了没有？这首诗通过问梅花，表达了诗人深切的思乡之情。",
        quiz: [{q:"“君”是指？",options:["作者","来自故乡的客人","梅花","窗户"],ans:1},{q:"“来日”的意思是？",options:["未来","明天","你来的那天","过几天"],ans:2},{q:"“绮窗”是指？",options:["雕刻精美的窗户","破窗户","骑着窗户","奇怪的窗户"],ans:0},{q:"“著花未”意思是？",options:["种花没","开花没","买花没","看花没"],ans:1},{q:"诗人为什么问梅花？",options:["喜欢花","想知道家里的具体情况/思乡","梅花贵","没话找话"],ans:1}]
    },
    {
        id: 111, category: '六年级', title: "剑客", author: "唐 · 贾岛", image: "剑客.png",
        content: [{t:"十年磨一剑，",m:"十年辛苦磨一把宝剑。"},{t:"霜刃未曾试。",m:"锋利的刀刃还没尝试过。"},{t:"今日把示君，",m:"今天把它拿给你看。"},{t:"谁有不平事？",m:"谁有不平之事需要解决？"}],
        translation: "用了十年功夫辛苦磨制一把宝剑，霜雪般锋利的刀刃还未曾试过。今天把它拿出来给你看，告诉我，天下谁有不平之事？这首诗抒发了诗人渴望施展才华、建功立业的豪情。",
        quiz: [{q:"“磨一剑”用了多久？",options:["一年","十年","一个月","一辈子"],ans:1},{q:"“霜刃”形容？",options:["刀刃像霜一样白/锋利","刀刃上有霜","冷","刀坏了"],ans:0},{q:"“示君”的意思是？",options:["给皇帝","给你看","表示","君子"],ans:1},{q:"“不平事”是指？",options:["地不平","不公平/冤屈的事","没事","平常事"],ans:1},{q:"这首诗表达了？",options:["想打架","豪情壮志/渴望用世","卖剑","磨刀技术"],ans:1}]
    },
    {
        id: 112, category: '四年级', title: "悯农(其一)", author: "唐 · 李绅", image: "悯农_其一.png",
        content: [{t:"春种一粒粟，",m:"春天种下一粒种子。"},{t:"秋收万颗子。",m:"秋天收成万颗粮食。"},{t:"四海无闲田，",m:"虽然普天之下没有荒废的田地。"},{t:"农夫犹饿死。",m:"可是辛勤的农夫仍然会饿死。"}],
        translation: "春天种下一粒种子，秋天能收成万颗粮食。虽然普天之下没有荒废的田地，可是辛勤劳作的农夫仍然常常被饿死。这首诗深刻揭露了旧社会不合理的制度和农民的悲惨命运。",
        quiz: [{q:"“粟”是指？",options:["谷子/粮食","树木","蔬菜","水果"],ans:0},{q:"“万颗子”形容？",options:["种子多","丰收","孩子多","石头"],ans:1},{q:"“四海”是指？",options:["四个海","到处/天下","海边","国外"],ans:1},{q:"“犹”的意思是？",options:["尤其","犹豫","仍然/还","犹如"],ans:2},{q:"这首诗揭示了？",options:["丰收的喜悦","农民的悲惨命运","种田的方法","风景优美"],ans:1}]
    },
    {
        id: 113, category: '四年级', title: "约客", author: "宋 · 赵师秀", image: "约客.png",
        content: [{t:"黄梅时节家家雨，",m:"梅子黄时，家家户户都笼罩在烟雨中。"},{t:"青草池塘处处蛙。",m:"长满青草的池塘边传来阵阵蛙声。"},{t:"有约不来过夜半，",m:"约好的客人过了半夜还没来。"},{t:"闲敲棋子落灯花。",m:"无聊地敲着棋子，震落了油灯上的灯花。"}],
        translation: "梅子黄时，家家户户都笼罩在蒙蒙雨雾中，长满青草的池塘边传来阵阵蛙声。约好的客人过了半夜还没来，我百无聊赖地敲着棋子，震落了油灯上的灯花。这首诗描写了江南夏夜雨景和诗人等待客人的心情。",
        quiz: [{q:"“黄梅时节”是？",options:["冬天","早春","初夏/梅雨季节","深秋"],ans:2},{q:"“家家雨”形容？",options:["每家都下雨","雨下得大","江南梅雨连绵","雨漏了"],ans:2},{q:"“灯花”是指？",options:["灯上的花纹","灯芯燃烧结成的花状物","灯笼","礼花"],ans:1},{q:"诗人心情如何？",options:["愤怒","焦急又闲适/落寞","开心","害怕"],ans:1},{q:"“闲敲棋子”表现了？",options:["在下棋","在奏乐","等待的无聊","棋子坏了"],ans:2}]
    },
    {
        id: 114, category: '五年级', title: "秋夜将晓出篱门迎凉有感", author: "宋 · 陆游", image: "秋夜将晓出篱门.png",
        content: [{t:"三万里河东入海，",m:"三万里长的黄河向东流入大海。"},{t:"五千仞岳上摩天。",m:"五千仞高的华山高耸入云。"},{t:"遗民泪尽胡尘里，",m:"北方遗民在金人的铁蹄下泪已流干。"},{t:"南望王师又一年。",m:"向南盼望朝廷军队收复失地又过了一年。"}],
        translation: "三万里长的黄河向东流入大海，五千仞高的华山高耸入云。北方沦陷区的百姓在金人的铁蹄下泪已流干，他们年年向南盼望朝廷军队来收复失地，可是盼了一年又一年。这首诗表达了诗人对山河破碎的悲愤和对百姓的同情。",
        quiz: [{q:"“岳”是指？",options:["山岳/华山","岳父","高楼","云彩"],ans:0},{q:"“摩天”形容？",options:["山很高","手摸天","摩擦","魔术"],ans:0},{q:"“遗民”是指？",options:["移民","沦陷区百姓","遗忘的人","难民"],ans:1},{q:"“胡尘”代指？",options:["胡人的灰尘","金人的统治/侵略","沙尘暴","胡子"],ans:1},{q:"“王师”是指？",options:["王老师","大宋军队","姓王的师傅","狮子"],ans:1}]
    },
    {
        id: 115, category: '六年级', title: "浣溪沙", author: "宋 · 苏轼", image: "浣溪沙.png",
        content: [{t:"游蕲水清泉寺，",m:"(序)游览蕲水清泉寺。"},{t:"寺临兰溪，",m:"寺庙临近兰溪。"},{t:"溪水西流。",m:"溪水向西流去。"},{t:"山下兰芽短浸溪，",m:"山下兰草嫩芽浸在溪水中。"},{t:"松间沙路净无泥，",m:"松林间的沙路干净得没有泥土。"},{t:"潇潇暮雨子规啼。",m:"傍晚的细雨中传杜鹃的啼叫。"},{t:"谁道人生无再少？",m:"谁说人生不能再回到少年？"},{t:"门前流水尚能西！",m:"你看门前的流水还能向西流呢！"},{t:"休将白发唱黄鸡。",m:"不要在那感叹白发苍苍时光流逝了。"}],
        translation: "山下兰草的嫩芽浸在溪水中，松林间的沙路干净得没有泥土，傍晚的细雨中传来杜鹃的啼叫。谁说人生不能再回到少年时期？你看门前的流水还能向西流呢！所以不要在那感叹白发苍苍、时光流逝了。这首词表现了苏轼乐观旷达的人生态度。",
        quiz: [{q:"“子规”是指？",options:["乌龟","杜鹃鸟","孩子","规定"],ans:1},{q:"“尚能西”是指？",options:["还能去西方","还能向西流","还能吸水","还能休息"],ans:1},{q:"“白发”代指？",options:["白色的头发","老年/衰老","染发","雪"],ans:1},{q:"“唱黄鸡”是指？",options:["吃鸡","感叹时光流逝","养鸡","唱歌"],ans:1},{q:"这首词表达了？",options:["悲观老去","乐观旷达/老当益壮","想去游泳","喜欢下雨"],ans:1}]
    },
    {
        id: 116, category: '六年级', title: "卜算子·咏梅", author: "宋 · 陆游", image: "卜算子_咏梅.png",
        content: [{t:"驿外断桥边，",m:"驿站外的断桥旁边。"},{t:"寂寞开无主。",m:"梅花寂寞地开放，无人欣赏。"},{t:"已是黄昏独自愁，",m:"已是黄昏，它独自忧愁。"},{t:"更著风和雨。",m:"更加上风吹雨打。"},{t:"无意苦争春，",m:"不想费尽心思去争夺春色。"},{t:"一任群芳妒。",m:"任凭百花去嫉妒。"},{t:"零落成泥碾作尘，",m:"即使凋零落入泥土碾成尘埃。"},{t:"只有香如故。",m:"只有清香依然如故。"}],
        translation: "驿站外的断桥旁边，梅花寂寞地开放，无人欣赏。已是黄昏，它独自忧愁，更加上风吹雨打。它不想费尽心思去争夺春色，任凭百花去嫉妒。即使凋零落入泥土碾成尘埃，只有它的清香依然如故。这首词以梅自喻，表现了诗人孤高不屈的品格。",
        quiz: [{q:"“无主”说明？",options:["没有主人","无人照管/欣赏","没有主见","免费"],ans:1},{q:"“著”的意思是？",options:["著名","遭受/加上","穿着","写书"],ans:1},{q:"“一任”的意思是？",options:["一届任期","任凭/听凭","担任","一个人"],ans:1},{q:"“碾作尘”形容？",options:["被碾碎","很多灰尘","做成药","磨面"],ans:0},{q:"“香如故”象征？",options:["香水好","品格坚贞不变","花很香","故乡"],ans:1}]
    },
    {
        id: 117, category: '四年级', title: "村夜", author: "唐 · 白居易", image: "村夜.png",
        content: [{t:"霜草苍苍虫切切，",m:"霜草苍茫，昆虫在唧唧叫着。"},{t:"村南村北行人绝。",m:"村南村北已没有行人。"},{t:"独出门前望野田，",m:"独自走到门前眺望田野。"},{t:"月明荞麦花如雪。",m:"明月照着荞麦花像雪一样白。"}],
        translation: "霜草苍茫，昆虫在唧唧叫着，村南村北已经没有行人了。我独自走到门前眺望田野，只见明月照着开满花的荞麦田，看上去像铺了一层雪一样白。这首诗描写了乡村月夜的景色，由寂寞转为惊喜。",
        quiz: [{q:"“切切”形容？",options:["切菜的声音","虫叫声","急切","一切"],ans:1},{q:"“绝”的意思是？",options:["绝对","断绝/没有","绝妙","拒绝"],ans:1},{q:"“花如雪”是指？",options:["雪花","荞麦花","棉花","梅花"],ans:1},{q:"诗人的心情变化是？",options:["开心到哭","孤寂到惊喜","愤怒到平静","害怕"],ans:1},{q:"描写的是哪个季节？",options:["春","夏","秋","冬"],ans:2}]
    },
    {
        id: 118, category: '六年级', title: "闻王昌龄左迁龙标遥有此寄", author: "唐 · 李白", image: "闻王昌龄左迁.png",
        content: [{t:"杨花落尽子规啼，",m:"杨花落尽，杜鹃鸟在啼叫。"},{t:"闻道龙标过五溪。",m:"听说你被贬到龙标，要经过五溪。"},{t:"我寄愁心与明月，",m:"我把愁心寄托给明月。"},{t:"随君直到夜郎西。",m:"随风陪伴你一直到夜郎西。"}],
        translation: "杨花落尽，杜鹃鸟在悲啼，听说你被贬到龙标，路途遥远要经过五溪。我把我的愁心寄托给天上的明月，让它随风陪伴你一直走到夜郎西边。这首诗表达了李白对朋友不幸遭遇的深切同情。",
        quiz: [{q:"“左迁”的意思是？",options:["升官","搬家","降职/被贬","向左走"],ans:2},{q:"“杨花”是指？",options:["杨树的花","柳絮","杨桃","桃花"],ans:1},{q:"“夜郎”是？",options:["人名","地名","晚上","狼"],ans:1},{q:"诗人寄托感情给？",options:["杨花","子规","明月","五溪"],ans:2},{q:"这首诗表达了？",options:["对朋友的关切/同情","想去旅游","喜欢月亮","讨厌做官"],ans:0}]
    },
    {
        id: 119, category: '六年级', title: "商山早行", author: "唐 · 温庭筠", image: "商山早行.png",
        content: [{t:"晨起动征铎，",m:"清晨起床，车马的铃声响了。"},{t:"客行悲故乡。",m:"客中远行，思念故乡倍感悲伤。"},{t:"鸡声茅店月，",m:"鸡鸣声中，残月映照着茅店。"},{t:"人迹板桥霜。",m:"足迹印在板桥的白霜上。"},{t:"槲叶落山路，",m:"槲叶飘落在山路上。"},{t:"枳花明驿墙。",m:"枳花明亮地照着驿站墙壁。"},{t:"因思杜陵梦，",m:"因为思念家乡杜陵的梦。"},{t:"凫雁满回塘。",m:"梦中野鸭大雁挤满了池塘。"}],
        translation: "清晨起床，车马的铃声响了，客中远行，思念故乡倍感悲伤。鸡鸣声中，残月映照着茅店，行人的足迹印在板桥的白霜上。槲叶飘落在山路上，枳花明亮地照着驿站墙壁。我不禁想起昨夜梦见家乡杜陵，梦中野鸭大雁挤满了池塘。这首诗描写了旅途早行的辛苦和思乡之情。",
        quiz: [{q:"“征铎”是指？",options:["出征的士兵","远行车马的铃铛","乐器","兵器"],ans:1},{q:"“鸡声茅店月”描写的是？",options:["晚上的景色","中午的景色","早行/拂晓的景色","下午的景色"],ans:2},{q:"“人迹板桥霜”说明？",options:["桥上有霜，有人走过","桥断了","下雪了","人很多"],ans:0},{q:"诗人思念的家乡是？",options:["商山","杜陵","茅店","驿站"],ans:1},{q:"千古名句是？",options:["晨起动征铎","鸡声茅店月，人迹板桥霜","槲叶落山路","凫雁满回塘"],ans:1}]
    },
    // 一年级
    {
        id: 120, category: '一年级', title: "山村咏怀", author: "宋 · 邵雍", image: "山村咏怀.png",
        content: [{t:"一去二三里，",m:"一眼望去有二三里远。"},{t:"烟村四五家。",m:"薄雾笼罩着四五户人家。"},{t:"亭台六七座，",m:"看到六七座亭台楼阁。"},{t:"八九十枝花。",m:"路边盛开着许多鲜花。"}],
        translation: "一眼望去有二三里远，薄雾笼罩的村庄里有四五户人家。远处有六七座亭台楼阁，路边盛开着八九十枝鲜花。这首诗用数字描绘了一幅恬静、淡雅的乡村景色。",
        quiz: [{q:"这首诗里包含了几个数字？",options:["5个","8个","10个","3个"],ans:2},{q:"“烟村”是指？",options:["着火的村子","有炊烟/云雾缭绕的村庄","很多烟","没人住的村子"],ans:1},{q:"这首诗描写的是？",options:["城市","山村","海边","沙漠"],ans:1},{q:"“咏怀”的意思是？",options:["唱歌","抒发情怀","怀念","抱在怀里"],ans:1},{q:"作者邵雍是哪个朝代的？",options:["唐朝","宋朝","元朝","明朝"],ans:1}]
    },
    {
        id: 121, category: '一年级', title: "画鸡", author: "明 · 唐寅", image: "画鸡.png",
        content: [{t:"头上红冠不用裁，",m:"头上的红色冠子不用剪裁，天生就有。"},{t:"满身雪白走将来。",m:"浑身雪白走过来。"},{t:"平生不敢轻言语，",m:"一生之中不敢轻易啼叫。"},{t:"一叫千门万户开。",m:"一旦叫起来，千家万户的门都打开了。"}],
        translation: "公鸡头上的红冠天生就有，不用剪裁，它浑身雪白地走过来。它一生中不敢轻易啼叫，但是一旦它叫起来，就意味着天亮了，千家万户的人都打开门开始一天的生活。这首诗赞美了公鸡的威武和守信。",
        quiz: [{q:"“不用裁”形容红冠？",options:["很大","很红","天生自然","很贵"],ans:2},{q:"这只鸡的颜色是？",options:["红色","黑色","花色","雪白"],ans:3},{q:"为什么“千门万户开”？",options:["鸡叫了天亮了/人们起床","鸡把门撞开了","大家来看鸡","门坏了"],ans:0},{q:"这首诗是？",options:["写生诗","题画诗","送别诗","叙事诗"],ans:1},{q:"唐寅又被称为？",options:["唐伯虎","唐老鸭","李白","杜甫"],ans:0}]
    },

    // 二年级
    {
        id: 122, category: '二年级', title: "小松", author: "唐 · 杜荀鹤", image: "小松.png",
        content: [{t:"自小刺头深草里，",m:"小松树刚长出时，满身针刺埋没在深草里。"},{t:"而今渐觉出蓬蒿。",m:"现在才渐渐感觉它长出了蓬蒿。"},{t:"时人不识凌云木，",m:"当时的人不认识这是将来能高耸入云的树木。"},{t:"直待凌云始道高。",m:"直到它高耸入云了，人们才说它高。"}],
        translation: "小松树刚长出来的时候，满身针刺埋没在深草里，现在才渐渐感觉它长出了蓬蒿。当时的人眼光短浅，不认识这是将来能高耸入云的树木，直到它真正高耸入云了，人们才开始称赞它高。这首诗讽刺了世俗之人目光短浅，不识人才。",
        quiz: [{q:"“刺头”是指？",options:["刺猬","松树的针叶","头发","坏人"],ans:1},{q:"“蓬蒿”是指？",options:["野草","高山","房子","云彩"],ans:0},{q:"“凌云木”比喻？",options:["很高的树","云彩","人才/有远大前程的人","木头"],ans:2},{q:"人们什么时候才觉得松树高？",options:["小时候","长高以后/凌云时","枯死后","砍倒后"],ans:1},{q:"这首诗讽刺了？",options:["松树长得慢","野草太高","世人目光短浅","天气不好"],ans:2}]
    },
    {
        id: 123, category: '二年级', title: "咏雪", author: "清 · 郑板桥", image: "咏雪.png",
        content: [{t:"一片两片三四片，",m:"一片两片三四片雪花。"},{t:"五六七八九十片。",m:"五六七八九十片雪花。"},{t:"千片万片无数片，",m:"千片万片无数片雪花。"},{t:"飞入梅花总不见。",m:"飞入梅花丛中就再也看不见了。"}],
        translation: "一片两片三四片，五六七八九十片，千片万片无数片雪花。它们飞入梅花丛中，与梅花融为一体，就再也看不见了。这首诗用数字入诗，生动描写了雪花纷飞和雪梅相融的景象。",
        quiz: [{q:"这首诗主要用了什么词？",options:["颜色词","数字词","方位词","象声词"],ans:1},{q:"雪花最后去哪了？",options:["融化了","飞走了","飞入梅花/与梅花融合","被人扫了"],ans:2},{q:"“总不见”是因为？",options:["没戴眼镜","雪停了","雪和梅花颜色相近","天黑了"],ans:2},{q:"郑板桥最擅长画？",options:["竹子","梅花","兰花","牡丹"],ans:0},{q:"这首诗描写的是？",options:["下雨","下雪","刮风","大雾"],ans:1}]
    },

    // 三年级
    {
        id: 124, category: '三年级', title: "夜书所见", author: "宋 · 叶绍翁", image: "夜书所见.png",
        content: [{t:"萧萧梧叶送寒声，",m:"萧萧秋风吹动梧桐叶，送来阵阵寒意。"},{t:"江上秋风动客情。",m:"江上的秋风勾起了游子的思乡之情。"},{t:"知有儿童挑促织，",m:"料想是孩子们在捉蟋蟀。"},{t:"夜深篱落一灯明。",m:"夜深了，篱笆处还有一盏灯亮着。"}],
        translation: "萧萧秋风吹动梧桐叶，送来阵阵寒意，江上的秋风勾起了游子的思乡之情。看到远处篱笆下的灯光，料想是孩子们在夜里捉蟋蟀。这首诗借景抒情，表达了诗人客居他乡的孤独和对童年生活的怀念。",
        quiz: [{q:"“萧萧”形容？",options:["马叫声","风吹梧桐叶的声音","哭声","笑声"],ans:1},{q:"“客情”是指？",options:["客人的心情","请客","羁旅思乡之情","热情"],ans:2},{q:"“促织”是指？",options:["纺织","蟋蟀/蛐蛐","知了","青蛙"],ans:1},{q:"诗人为什么知道是儿童？",options:["看到了","听到了","猜想/推测","有人告诉他"],ans:2},{q:"“挑”的意思是？",options:["挑担子","挑选","用细棍拨弄/捉","挑战"],ans:2}]
    },
    {
        id: 125, category: '三年级', title: "舟夜书所见", author: "清 · 查慎行", image: "舟夜书所见.png",
        content: [{t:"月黑见渔灯，",m:"夜黑了，没有月亮，只见渔船上的灯火。"},{t:"孤光一点萤。",m:"孤独的灯光像萤火虫一样微弱。"},{t:"微微风簇浪，",m:"微风阵阵，吹起细小的波浪。"},{t:"散作满河星。",m:"灯影被波浪摇碎，像散落满河的星星。"}],
        translation: "漆黑的夜晚不见月亮，只见渔船上的一盏灯火，那孤独的灯光像萤火虫一样微弱。微风吹起细小的波浪，那倒映在水中的灯影瞬间散开，好像散落满河的星星。这首诗描写了河上夜景的瞬间变化，奇妙动人。",
        quiz: [{q:"“月黑”说明？",options:["月亮是黑的","没有月亮/夜色黑","看不见","阴天"],ans:1},{q:"“孤光”比喻成？",options:["月亮","太阳","萤火虫","星星"],ans:2},{q:"“簇”的意思是？",options:["聚集/簇拥","一簇花","箭簇","粗心"],ans:0},{q:"为什么会“散作满河星”？",options:["星星掉下来了","萤火虫飞舞","波浪把灯影摇碎","下雨了"],ans:2},{q:"这首诗描写的是？",options:["山景","河上夜景","日出","雪景"],ans:1}]
    },
    {
        id: 126, category: '三年级', title: "采莲曲", author: "唐 · 王昌龄", image: "采莲曲.png",
        content: [{t:"荷叶罗裙一色裁，",m:"采莲少女的罗裙绿得像荷叶一样。"},{t:"芙蓉向脸两边开。",m:"少女的脸庞红润，像两边的荷花一样。"},{t:"乱入池中看不见，",m:"混入莲池中就看不见踪影了。"},{t:"闻歌始觉有人来。",m:"听到歌声才发觉有人来了。"}],
        translation: "采莲少女的罗裙绿得像荷叶一样，红润的脸庞与两边的荷花相映红。她们混入莲池中就看不见踪影了，直到听到歌声，才发觉有人来了。这首诗描写了采莲少女与大自然融为一体的美丽画面。",
        quiz: [{q:"“罗裙”是指？",options:["萝卜做的裙子","丝罗做的裙子","渔网","荷叶"],ans:1},{q:"“芙蓉”在这里指？",options:["木芙蓉","荷花","人名","地名"],ans:1},{q:"为什么“看不见”少女？",options:["人太小","天黑了","裙子和脸与荷叶荷花颜色相近","躲起来了"],ans:2},{q:"怎么发现有人来了？",options:["看到人","看到船","闻歌/听到歌声","水波动了"],ans:2},{q:"这首诗表现了少女的？",options:["悲伤","劳累","美丽活泼","贫穷"],ans:2}]
    },
    {
        id: 127, category: '三年级', title: "归园田居(其三)", author: "东晋 · 陶渊明", image: "归园田居.png",
        content: [{t:"种豆南山下，",m:"在南山下种豆子。"},{t:"草盛豆苗稀。",m:"野草长得很茂盛，豆苗却很稀疏。"},{t:"晨兴理荒秽，",m:"早晨起来清除杂草。"},{t:"带月荷锄归。",m:"披着月光扛着锄头回家。"},{t:"道狭草木长，",m:"道路狭窄，草木丛生。"},{t:"夕露沾我衣。",m:"傍晚的露水打湿了我的衣服。"},{t:"衣沾不足惜，",m:"衣服湿了不可惜。"},{t:"但使愿无违。",m:"只要不违背我归隐田园的心愿就好。"}],
        translation: "我在南山下种豆子，野草长得很茂盛，豆苗却很稀疏。早晨起来清除杂草，一直干到晚上，披着月光扛着锄头回家。道路狭窄，草木丛生，傍晚的露水打湿了我的衣服。衣服湿了并不可惜，只要不违背我归隐田园的心愿就好了。这首诗描写了诗人归隐田园后的劳动生活。",
        quiz: [{q:"“晨兴”的意思是？",options:["早晨高兴","早晨起来","姓晨的人","早晨的兴趣"],ans:1},{q:"“荷锄”的“荷”读音是？",options:["hé","hè(扛)","kě","kè"],ans:1},{q:"豆苗为什么稀？",options:["草盛/不善农耕","种子不好","被虫吃了","土不好"],ans:0},{q:"“愿”指的是？",options:["发财","做官","归隐田园/不与世俗同流合污","丰收"],ans:2},{q:"陶渊明被称为？",options:["诗仙","隐逸诗人之宗","诗圣","词圣"],ans:1}]
    },

    // 四年级
    {
        id: 128, category: '四年级', title: "四时田园杂兴(其三十一)", author: "宋 · 范成大", image: "昼出耘田夜绩麻.png",
        content: [{t:"昼出耘田夜绩麻，",m:"白天出去锄草，晚上搓麻线。"},{t:"村庄儿女各当家。",m:"村里的男男女女都各自忙碌。"},{t:"童孙未解供耕织，",m:"小孩子不懂得耕田织布。"},{t:"也傍桑阴学种瓜。",m:"也靠在桑树荫下学着种瓜。"}],
        translation: "白天出去锄草，晚上搓麻线，村里的男男女女都各自忙碌，担当家务。小孩子虽然不懂得耕田织布，但也靠在桑树荫下学着大人的样子种瓜。这首诗描写了农村繁忙而有趣的劳动生活。",
        quiz: [{q:"“耘田”是指？",options:["种田","在田里除草","浇水","收割"],ans:1},{q:"“绩麻”是指？",options:["种麻","收麻","搓麻线/纺织","吃麻"],ans:2},{q:"“未解”的意思是？",options:["不解开","不懂得","没解决","没解释"],ans:1},{q:"“供”的意思是？",options:["提供","从事/参加","供奉","口供"],ans:1},{q:"小孩子在做什么？",options:["玩游戏","睡觉","学种瓜","读书"],ans:2}]
    },
    {
        id: 129, category: '四年级', title: "乡村四月", author: "宋 · 翁卷", image: "乡村四月.png",
        content: [{t:"绿遍山原白满川，",m:"山陵原野一片绿色，稻田水色映着天空白茫茫。"},{t:"子规声里雨如烟。",m:"在杜鹃鸟的叫声中，细雨如烟雾般迷蒙。"},{t:"乡村四月闲人少，",m:"四月的乡村很少有闲着的人。"},{t:"才了蚕桑又插田。",m:"刚忙完采桑养蚕，又要去插秧。"}],
        translation: "山陵原野都染满了绿色，稻田的水面映着天空白茫茫一片。在杜鹃鸟的啼叫声中，细雨如烟雾般迷蒙。四月的乡村很少有闲着的人，大家刚忙完采桑养蚕，又要到田里去插秧。这首诗表现了江南农村初夏时节的繁忙景象。",
        quiz: [{q:"“白满川”指的是？",options:["水色映着天光","白色的河","棉花","下雪"],ans:0},{q:"“子规”是指？",options:["规矩","杜鹃鸟/布谷鸟","乌龟","孩子"],ans:1},{q:"“了”的意思是？",options:["了解","结束/忙完","走了","来了"],ans:1},{q:"“插田”是指？",options:["插秧","插花","种树","浇水"],ans:0},{q:"这首诗描写的季节是？",options:["初春","初夏/四月","深秋","寒冬"],ans:1}]
    },
    {
        id: 130, category: '四年级', title: "塞下曲(其二)", author: "唐 · 卢纶", image: "塞下曲_林暗.png",
        content: [{t:"林暗草惊风，",m:"昏暗的树林中，风吹草动令人惊恐。"},{t:"将军夜引弓。",m:"将军夜里拉开弓箭射击。"},{t:"平明寻白羽，",m:"天亮去寻找那只白羽箭。"},{t:"没在石棱中。",m:"竟然深深地陷入了石棱中。"}],
        translation: "昏暗的树林中，风吹草动令人惊恐，将军以为有老虎，夜里猛然拉开弓箭射击。天亮去寻找那只白羽箭，发现它竟然深深地陷入了石棱中。这首诗赞美了李广将军神勇的臂力和武艺。",
        quiz: [{q:"“林暗”说明？",options:["树林着火","天黑/视线不清","树林没了","树很黑"],ans:1},{q:"“引弓”是指？",options:["扔弓","做弓","拉弓射箭","背弓"],ans:2},{q:"“平明”是指？",options:["平常","明白","天亮/清晨","平地"],ans:2},{q:"“没”读作？",options:["méi","mò(陷入)","mā","mú"],ans:1},{q:"这首诗的主人公是？",options:["李白","李广(飞将军)","花木兰","岳飞"],ans:1}]
    },
    {
        id: 131, category: '四年级', title: "塞下曲(其三)", author: "唐 · 卢纶", image: "塞下曲_月黑.png",
        content: [{t:"月黑雁飞高，",m:"月亮被云遮掩，大雁飞得很高。"},{t:"单于夜遁逃。",m:"单于趁着黑夜悄悄逃跑。"},{t:"欲将轻骑逐，",m:"正要带领轻骑兵去追赶。"},{t:"大雪满弓刀。",m:"大雪纷纷扬扬落满了弓刀。"}],
        translation: "月亮被云遮掩，一片漆黑，受惊的大雁飞得很高，单于趁着黑夜悄悄逃跑。将军正要带领轻骑兵去追赶，大雪纷纷扬扬落满了将士们的弓刀。这首诗描写了边塞将士雪夜准备追敌的壮烈场面。",
        quiz: [{q:"“月黑”有利于？",options:["大雁飞","单于逃跑","看星星","睡觉"],ans:1},{q:"“单于”是指？",options:["匈奴的首领","单独","单纯","士兵"],ans:0},{q:"“逐”的意思是？",options:["驱逐/追赶","猪","逐渐","主意"],ans:0},{q:"“满弓刀”渲染了？",options:["武器多","雪大/环境恶劣","弓刀坏了","很高兴"],ans:1},{q:"这首诗属于？",options:["田园诗","边塞诗","送别诗","咏物诗"],ans:1}]
    },
    {
        id: 132, category: '四年级', title: "问刘十九", author: "唐 · 白居易", image: "问刘十九.png",
        content: [{t:"绿蚁新醅酒，",m:"新酿的米酒浮起绿色的泡沫。"},{t:"红泥小火炉。",m:"小小的红泥火炉烧得正旺。"},{t:"晚来天欲雪，",m:"天色将晚，看来要下雪了。"},{t:"能饮一杯无？",m:"能不能来喝一杯呢？"}],
        translation: "新酿的米酒浮起绿色的泡沫，小小的红泥火炉烧得正旺。天色将晚，看来要下雪了，朋友，能不能来我家喝一杯暖酒呢？这首诗描写了冬夜邀友饮酒的温馨情景。",
        quiz: [{q:"“绿蚁”是指？",options:["绿色的蚂蚁","新酒面上的绿色泡沫","绿色的衣服","绿茶"],ans:1},{q:"“醅”的意思是？",options:["赔偿","酿造/没过滤的酒","陪伴","培土"],ans:1},{q:"“无”在这里表示？",options:["没有","无聊","吗(表疑问)","无论"],ans:2},{q:"当时的天气是？",options:["下大雨","晴天","欲雪/快下雪","刮台风"],ans:2},{q:"这首诗给人的感觉是？",options:["寒冷","温暖/亲切","悲伤","孤独"],ans:1}]
    },
    {
        id: 133, category: '四年级', title: "游山西村", author: "宋 · 陆游", image: "游山西村.png",
        content: [{t:"莫笑农家腊酒浑，",m:"不要笑话农家腊月酿的酒浑浊。"},{t:"丰年留客足鸡豚。",m:"丰收之年留客，鸡肉猪肉很充足。"},{t:"山重水复疑无路，",m:"山峦重叠水流曲折，正担心无路可走。"},{t:"柳暗花明又一村。",m:"柳绿花红之处，忽然又出现一个村庄。"}],
        translation: "不要笑话农家腊月酿的酒浑浊，丰收之年留客，鸡肉猪肉非常充足。山峦重叠水流曲折，正担心无路可走，谁知柳绿花红之处，忽然又出现一个村庄。这首诗不仅描写了农家的好客，还蕴含了绝处逢生的哲理。",
        quiz: [{q:"“腊酒”是指？",options:["腊月酿的酒","辣酒","腊肉酒","过期的酒"],ans:0},{q:"“豚”是指？",options:["海豚","猪","臀部","河豚"],ans:1},{q:"“足”的意思是？",options:["脚","足够/充足","走路","足球"],ans:1},{q:"“柳暗花明”现在常比喻？",options:["风景好看","绝处逢生/新的转机","迷路了","春天"],ans:1},{q:"这首诗表达了？",options:["对农家淳朴好客的赞赏","嫌弃酒不好喝","路太难走","想吃肉"],ans:0}]
    },
    {
        id: 134, category: '四年级', title: "兰溪棹歌", author: "唐 · 戴叔伦", image: "兰溪棹歌.png",
        content: [{t:"凉月如眉挂柳湾，",m:"一弯如眉的凉月挂在柳湾上空。"},{t:"越中山色镜中看。",m:"越中的山色倒映在水中，如在镜中看。"},{t:"兰溪三日桃花雨，",m:"兰溪下了三天的春雨。"},{t:"半夜鲤鱼来上滩。",m:"半夜里鲤鱼抢着跳上滩头。"}],
        translation: "一弯如眉的凉月挂在柳湾上空，越中的山色倒映在平静的水中，就像在镜子里看一样。兰溪下了三天的春雨，水位上涨，半夜里鲤鱼抢着跳上滩头。这首诗描写了兰溪柔美的夜景和生机勃勃的鱼跃景象。",
        quiz: [{q:"“棹(zhào)歌”是指？",options:["船歌","找歌","唱歌","早歌"],ans:0},{q:"“镜中看”是因为？",options:["拿着镜子","水面平静倒映山色","戴眼镜","幻觉"],ans:1},{q:"“桃花雨”是指？",options:["下桃花","春雨/桃花盛开时的雨","粉色的雨","花瓣"],ans:1},{q:"鲤鱼为什么要上滩？",options:["水涨了/抢水","晒太阳","找吃的","被人抓"],ans:0},{q:"这首诗充满了？",options:["悲伤","生活情趣/生机","恐怖","愤怒"],ans:1}]
    },

    // 五年级
    {
        id: 135, category: '五年级', title: "寒夜", author: "宋 · 杜耒", image: "寒夜.png",
        content: [{t:"寒夜客来茶当酒，",m:"冬夜有客来访，煮茶当酒招待。"},{t:"竹炉汤沸火初红。",m:"竹炉里的水烧开了，炭火正红。"},{t:"寻常一样窗前月，",m:"还是和平常一样的窗前明月。"},{t:"才有梅花便不同。",m:"只因开了梅花，景色就大不相同。"}],
        translation: "寒冷的冬夜有客来访，我煮茶当酒招待。竹炉里的水烧开了，炭火正如红。虽然还是和平常一样的窗前明月，但只因梅花开了，这景色和心境就大不相同了。这首诗描写了冬夜雅集的情趣。",
        quiz: [{q:"“茶当酒”说明？",options:["没有酒","茶比酒好","君子之交淡如水/情意重","小气"],ans:2},{q:"“汤沸”是指？",options:["汤煮好了","水烧开了","汤废了","很热"],ans:1},{q:"“寻常”的意思是？",options:["寻找","平常","经常","长度"],ans:1},{q:"为什么觉得“不同”？",options:["换了窗户","月亮变了","因为梅花开放/心境雅致","客人走了"],ans:2},{q:"这首诗体现了？",options:["生活贫困","高雅的生活情趣","寒冷痛苦","喜欢喝酒"],ans:1}]
    },
    {
        id: 136, category: '五年级', title: "秋思", author: "唐 · 张籍", image: "秋思_张籍.png",
        content: [{t:"洛阳城里见秋风，",m:"在洛阳城里感觉到秋风乍起。"},{t:"欲作家书意万重。",m:"想写封家书，心绪万千不知从何说起。"},{t:"复恐匆匆说不尽，",m:"又担心匆匆忙忙写不完要说的话。"},{t:"行人临发又开封。",m:"送信人临走时，又拆开信封查看。"}],
        translation: "在洛阳城里感觉到秋风乍起，勾起了我的乡愁。想写封家书，可是心绪万千不知从何说起。信写好了，又担心匆匆忙忙写不完要说的话，在送信人临走的时候，又拆开信封查看。这首诗细腻地刻画了游子思乡的心理。",
        quiz: [{q:"“意万重”形容？",options:["意思很重","心绪万千/想说的话多","重力大","写了一万字"],ans:1},{q:"“复恐”的意思是？",options:["恢复恐惧","又担心","恐怖","反复"],ans:1},{q:"“行人”是指？",options:["路人","走路的人","捎信的人","客人"],ans:2},{q:"为什么“又开封”？",options:["信封坏了","担心话没说完/遗漏","拿钱","不想寄了"],ans:1},{q:"这首诗表达了？",options:["深切的思乡之情","秋天很冷","洛阳很美","喜欢写信"],ans:0}]
    },
    {
        id: 137, category: '五年级', title: "赠花卿", author: "唐 · 杜甫", image: "赠花卿.png",
        content: [{t:"锦城丝管日纷纷，",m:"锦官城里每天乐声纷纷。"},{t:"半入江风半入云。",m:"一半随着江风飘散，一半飘入云端。"},{t:"此曲只应天上有，",m:"这样的曲子只应该天上有。"},{t:"人间能得几回闻？",m:"人间哪里能听得到几回呢？"}],
        translation: "锦官城里每天管弦之声纷纷，一半随着江风飘散，一半飘入云端。这样的曲子只应该天上有，人间哪里能听得到几回呢？这首诗表面赞美音乐，实则讽刺花卿（花敬定）僭越礼制，纵情声色。",
        quiz: [{q:"“丝管”代指？",options:["丝绸和管子","音乐/乐器","吸管","丝线"],ans:1},{q:"“纷纷”形容？",options:["下雪","落叶","乐声繁多/杂乱","纷争"],ans:2},{q:"“天上”暗示？",options:["皇宫/朝廷音乐","神仙音乐","天空","飞机"],ans:0},{q:"这首诗的深层含义是？",options:["赞美音乐好听","讽刺僭越礼制","想上天","喜欢花卿"],ans:1},{q:"作者是？",options:["李白","杜甫","白居易","李商隐"],ans:1}]
    },
    {
        id: 138, category: '五年级', title: "金缕衣", author: "唐 · 杜秋娘", image: "金缕衣.png",
        content: [{t:"劝君莫惜金缕衣，",m:"劝你不要爱惜荣华富贵。"},{t:"劝君惜取少年时。",m:"劝你一定要珍惜少年时光。"},{t:"花开堪折直须折，",m:"花开宜折的时候就要抓紧去折。"},{t:"莫待无花空折枝。",m:"不要等到花谢了只折个空枝头。"}],
        translation: "劝你不要爱惜那华贵的金缕衣，劝你一定要珍惜美好的少年时光。花开宜折的时候就要抓紧去折，不要等到花谢了，只能折到一个空枝头。这首诗劝勉人们要珍惜光阴，把握时机。",
        quiz: [{q:"“金缕衣”代指？",options:["金色的衣服","荣华富贵/身外之物","金线","成衣"],ans:1},{q:"“惜取”的意思是？",options:["可惜","珍惜/选取","吸取","休息"],ans:1},{q:"“堪”的意思是？",options:["能够/可以","看见","砍断","忍受"],ans:0},{q:"“空折枝”比喻？",options:["折断树枝","错过机会/徒劳","空手","花落了"],ans:1},{q:"这首诗的主题是？",options:["买衣服","种花","珍惜时间","不要折花"],ans:2}]
    },
    {
        id: 139, category: '五年级', title: "客中行", author: "唐 · 李白", image: "客中行.png",
        content: [{t:"兰陵美酒郁金香，",m:"兰陵的美酒散发着郁金的香气。"},{t:"玉碗盛来琥珀光。",m:"盛在玉碗里像琥珀一样晶莹发光。"},{t:"但使主人能醉客，",m:"只要主人能让客人一醉方休。"},{t:"不知何处是他乡。",m:"就不管这里是故乡还是他乡。"}],
        translation: "兰陵的美酒散发着郁金的香气，盛在玉碗里像琥珀一样晶莹发光。只要主人能让我一醉方休，我就不管这里是故乡还是他乡了。这首诗表现了李白豪放洒脱、四海为家的性格。",
        quiz: [{q:"“兰陵”是？",options:["人名","地名","酒名","花名"],ans:1},{q:"“郁金香”在诗中指？",options:["郁金香花","一种香草/香料","很香","金子"],ans:1},{q:"“琥珀光”形容？",options:["酒色澄澈/晶莹","琥珀","光线","宝石"],ans:0},{q:"“但使”的意思是？",options:["但是","只要","使用","天使"],ans:1},{q:"这首诗体现了李白的？",options:["悲伤","豪放洒脱","思乡痛苦","贪杯"],ans:1}]
    },
    {
        id: 140, category: '五年级', title: "登幽州台歌", author: "唐 · 陈子昂", image: "登幽州台歌.png",
        content: [{t:"前不见古人，",m:"往前看不见古代的贤君。"},{t:"后不见来者。",m:"向后看不见未来的明主。"},{t:"念天地之悠悠，",m:"想到天地是多么久远辽阔。"},{t:"独怆然而涕下。",m:"我独自悲伤得热泪盈眶。"}],
        translation: "往前看不见古代招贤纳士的贤君，向后看不见未来的明主。想到天地是多么久远辽阔，而我生不逢时，我不禁独自悲伤得热泪盈眶。这首诗抒发了诗人怀才不遇、寂寞悲凉的情怀。",
        quiz: [{q:"“古人”和“来者”指？",options:["老古董和新人","古代和未来的贤明君主","老人和小孩","朋友"],ans:1},{q:"“悠悠”形容？",options:["悠闲","久远/辽阔","忧愁","悠扬"],ans:1},{q:"“怆然”的意思是？",options:["慌张","悲伤的样子","突然","创造"],ans:1},{q:"“涕”在古文中指？",options:["鼻涕","眼泪","剃头","身体"],ans:1},{q:"这首诗表达了？",options:["看风景的快乐","怀才不遇/孤独","想回家","天气不好"],ans:1}]
    },

    // 六年级
    {
        id: 141, category: '六年级', title: "观沧海", author: "东汉 · 曹操", image: "观沧海.png",
        content: [{t:"东临碣石，以观沧海。",m:"向东登上碣石山，来观赏大海。"},{t:"水何澹澹，山岛竦峙。",m:"海水多么宽阔浩荡，山岛高高耸立。"},{t:"树木丛生，百草丰茂。",m:"树木丛生，百草繁茂。"},{t:"秋风萧瑟，洪波涌起。",m:"秋风萧瑟，巨大的波浪涌起。"},{t:"日月之行，若出其中；",m:"日月的运行，好像是从海里出来的。"},{t:"星汉灿烂，若出其里。",m:"灿烂的银河，好像是从海里产生的。"},{t:"幸甚至哉，歌以咏志。",m:"庆幸得很，写这首诗来抒发心志。"}],
        translation: "向东登上碣石山，来观赏大海。海水多么宽阔浩荡，山岛高高耸立。树木丛生，百草繁茂。秋风萧瑟，巨大的波浪涌起。日月的运行，好像是从海里出来的；灿烂的银河，好像是从海里产生的。庆幸得很，写这首诗来抒发心志。这首诗借大海的壮丽景色，表达了曹操统一天下的雄心壮志。",
        quiz: [{q:"“沧海”是指？",options:["大海","地名","苍天","沧桑"],ans:0},{q:"“澹澹”形容？",options:["平淡","水波荡漾的样子","谈话","鸡蛋"],ans:1},{q:"“星汉”是指？",options:["星星和汉朝","银河","男子汉","流星"],ans:1},{q:"这首诗表达了曹操的？",options:["悲伤","博大胸怀/雄心壮志","恐惧","闲适"],ans:1},{q:"这是一首？",options:["四言诗","五言诗","七言诗","词"],ans:0}]
    },
    {
        id: 142, category: '六年级', title: "次北固山下", author: "唐 · 王湾", image: "次北固山下.png",
        content: [{t:"客路青山外，",m:"旅途在青山之外。"},{t:"行舟绿水前。",m:"船只在绿水中前行。"},{t:"潮平两岸阔，",m:"潮水涨满，两岸显得宽阔。"},{t:"风正一帆悬。",m:"风向顺直，船帆高高挂起。"},{t:"海日生残夜，",m:"红日从残夜中升起。"},{t:"江春入旧年。",m:"江南的春天在旧年中就来了。"},{t:"乡书何处达？",m:"家书送到什么地方？"},{t:"归雁洛阳边。",m:"北归的大雁请带到洛阳去。"}],
        translation: "旅途在青山之外，船只在绿水中前行。潮水涨满，两岸显得宽阔，风向顺直，船帆高高挂起。红日从残夜中升起，江南的春天在旧年中就来了。家书要送到什么地方？希望北归的大雁帮我带到洛阳去。这首诗描写了壮阔的江景，抒发了思乡之情，其中“海日生残夜，江春入旧年”蕴含了新事物取代旧事物的哲理。",
        quiz: [{q:"“次”的意思是？",options:["第二次","停泊","差","次序"],ans:1},{q:"“风正”说明？",options:["风很大","顺风","风停了","正如"],ans:1},{q:"“残夜”是指？",options:["夜快过完/拂晓","残酷的夜","深夜","昨夜"],ans:0},{q:"“生”和“入”妙在哪里？",options:["生动","拟人化/寓意新事物诞生","写错了","没有意义"],ans:1},{q:"诗人想把信寄到？",options:["北固山","洛阳","江南","海边"],ans:1}]
    },
    {
        id: 143, category: '六年级', title: "钱塘湖春行", author: "唐 · 白居易", image: "钱塘湖春行.png",
        content: [{t:"孤山寺北贾亭西，",m:"从孤山寺的北面到贾亭的西面。"},{t:"水面初平云脚低。",m:"湖面水位刚涨满，白云低垂。"},{t:"几处早莺争暖树，",m:"几只早来的黄莺争着飞向向阳的树。"},{t:"谁家新燕啄春泥。",m:"谁家的燕子衔着春泥筑巢。"},{t:"乱花渐欲迷人眼，",m:"繁多杂乱的花渐渐要迷住人的眼睛。"},{t:"浅草才能没马蹄。",m:"浅浅的青草刚刚能遮没马蹄。"},{t:"最爱湖东行不足，",m:"最爱湖东的美景游览不够。"},{t:"绿杨阴里白沙堤。",m:"绿杨树荫下的白沙堤。"}],
        translation: "从孤山寺的北面到贾亭的西面，湖面水位刚涨满，白云低垂。几只早来的黄莺争着飞向向阳的树，谁家的燕子衔着春泥筑巢。繁多杂乱的花渐渐要迷住人的眼睛，浅浅的青草刚刚能遮没马蹄。最爱湖东的美景游览不够，那就是绿杨树荫下的白沙堤。这首诗描写了西湖早春的明媚风光。",
        quiz: [{q:"“钱塘湖”是？",options:["洞庭湖","西湖","鄱阳湖","太湖"],ans:1},{q:"“云脚低”说明？",options:["云很重","云底贴近水面","云跑得快","下雨了"],ans:1},{q:"“暖树”是指？",options:["向阳的树","热的树","着火的树","暖气"],ans:0},{q:"“没马蹄”的“没”读？",options:["méi","mò(淹没/遮盖)","mā","mú"],ans:1},{q:"这首诗描写的季节是？",options:["早春","盛夏","深秋","严冬"],ans:0}]
    },
    {
        id: 144, category: '六年级', title: "江南逢李龟年", author: "唐 · 杜甫", image: "江南逢李龟年.png",
        content: [{t:"岐王宅里寻常见，",m:"当年在岐王宅里经常见到你。"},{t:"崔九堂前几度闻。",m:"在崔九堂前也听过几次你的歌。"},{t:"正是江南好风景，",m:"现在正是江南风景大好的时候。"},{t:"落花时节又逢君。",m:"在落花时节又遇到了你。"}],
        translation: "当年在岐王宅里经常见到你，在崔九堂前也听过几次你的歌。现在正是江南风景大好的时候，在这落花时节又遇到了你。这首诗通过今昔对比，表达了对国事衰败、身世飘零的感伤。",
        quiz: [{q:"李龟年是？",options:["诗人","画家","著名歌唱家/乐师","官员"],ans:2},{q:"“寻常”的意思是？",options:["寻找","经常","长度","平常"],ans:1},{q:"“落花时节”象征？",options:["春天","花谢了","国运衰败/身世飘零","风景好"],ans:2},{q:"这首诗表达了？",options:["久别重逢的喜悦","今昔盛衰的感伤","江南风景好","想听歌"],ans:1},{q:"“君”指的是？",options:["杜甫","岐王","崔九","李龟年"],ans:3}]
    },
    {
        id: 145, category: '六年级', title: "春望", author: "唐 · 杜甫", image: "春望.png",
        content: [{t:"国破山河在，",m:"京城沦陷，只有山河依旧。"},{t:"城春草木深。",m:"春天来了，城里草木丛生。"},{t:"感时花溅泪，",m:"感伤国事，看到花儿都流泪。"},{t:"恨别鸟惊心。",m:"怨恨离别，听到鸟鸣都惊心。"},{t:"烽火连三月，",m:"战火连续三个月不熄。"},{t:"家书抵万金。",m:"一封家书抵得上万两黄金。"},{t:"白头搔更短，",m:"愁白的头发越抓越少。"},{t:"浑欲不胜簪。",m:"简直插不上簪子了。"}],
        translation: "京城沦陷，只有山河依旧，春天来了，城里荒草丛生。感伤国事，看到花儿都忍不住流泪；怨恨离别，听到鸟鸣都感到惊心。战火连续三个月不熄，一封家书抵得上万两黄金。愁白的头发越抓越少，简直插不上簪子了。这首诗表达了诗人忧国忧民的深厚感情。",
        quiz: [{q:"“国破”是指？",options:["国家破烂","京城沦陷/国家破碎","破产","国旗破了"],ans:1},{q:"“草木深”说明？",options:["草木茂盛","荒凉/无人居住","春天来了","绿化好"],ans:1},{q:"“花溅泪”运用了？",options:["拟人/移情","比喻","夸张","排比"],ans:0},{q:"“抵万金”说明？",options:["信很贵","信里有钱","消息珍贵/盼信","金子便宜"],ans:2},{q:"“不胜簪”是因为？",options:["簪子坏了","头发太少/衰老忧愁","没钱买","不想戴"],ans:1}]
    },
    {
        id: 146, category: '六年级', title: "赤壁", author: "唐 · 杜牧", image: "赤壁.png",
        content: [{t:"折戟沉沙铁未销，",m:"折断的戟沉在沙里还没销蚀。"},{t:"自将磨洗认前朝。",m:"拿起来磨洗辨认出是前朝之物。"},{t:"东风不与周郎便，",m:"如果当年东风不给周瑜方便。"},{t:"铜雀春深锁二乔。",m:"铜雀台深处就要锁住大乔二乔了。"}],
        translation: "折断的戟沉在沙里还没销蚀，拿起来磨洗辨认出是前朝的遗物。如果当年东风不给周瑜方便，那么东吴灭亡，大乔二乔就要被锁进铜雀台了。这首诗借古讽今，认为历史机遇非常重要，也表达了诗人怀才不遇的感慨。",
        quiz: [{q:"“折戟”是指？",options:["断了的武器","一种鱼","折断的树","沉船"],ans:0},{q:"“周郎”是指？",options:["周润发","周瑜","姓周的郎中","周文王"],ans:1},{q:"“东风”是指？",options:["春风","火烧赤壁的风/机遇","麻将","汽车"],ans:1},{q:"“二乔”是指？",options:["两座桥","大乔小乔(美女)","两棵树","两个人"],ans:1},{q:"这首诗属于？",options:["咏史诗","山水诗","田园诗","送别诗"],ans:0}]
    },
    {
        id: 147, category: '六年级', title: "泊秦淮", author: "唐 · 杜牧", image: "泊秦淮.png",
        content: [{t:"烟笼寒水月笼沙，",m:"烟雾笼罩着寒水，月光笼罩着沙滩。"},{t:"夜泊秦淮近酒家。",m:"夜晚把船停在秦淮河畔靠近酒家的地方。"},{t:"商女不知亡国恨，",m:"卖唱的歌女不知道亡国的悲恨。"},{t:"隔江犹唱后庭花。",m:"隔着江还在唱《玉树后庭花》。"}],
        translation: "迷离的烟雾笼罩着寒冷的水面，淡白的月光笼罩着沙滩。夜晚我把船停在秦淮河畔靠近酒家的地方。卖唱的歌女不知道亡国的悲恨，隔着江还在唱着亡国之音《玉树后庭花》。这首诗讽刺了晚唐统治者沉溺声色，不理朝政。",
        quiz: [{q:"“秦淮”在现在的？",options:["北京","南京","西安","杭州"],ans:1},{q:"“商女”是指？",options:["经商的女子","歌女","商朝女子","伤心的女子"],ans:1},{q:"“后庭花”被称为？",options:["好听的歌","流行歌曲","亡国之音","花的名字"],ans:2},{q:"诗人真正讽刺的是？",options:["商女","听歌的权贵/统治者","酒家","月亮"],ans:1},{q:"这首诗表达了？",options:["忧国忧民","喜欢听歌","夜景很美","同情商女"],ans:0}]
    },
    {
        id: 148, category: '六年级', title: "行路难(其一)", author: "唐 · 李白", image: "行路难.png",
        content: [{t:"金樽清酒斗十千，",m:"金杯里的清酒一斗价值十千钱。"},{t:"玉盘珍羞直万钱。",m:"玉盘里的珍馐值万钱。"},{t:"停杯投箸不能食，",m:"放下杯筷不想吃。"},{t:"拔剑四顾心茫然。",m:"拔剑四处看心中茫然。"},{t:"欲渡黄河冰塞川，",m:"想渡黄河，冰堵塞了河流。"},{t:"将登太行雪满山。",m:"想登太行山，大雪封山。"},{t:"闲来垂钓碧溪上，",m:"闲来在碧溪上垂钓。"},{t:"忽复乘舟梦日边。",m:"忽又梦见乘船在太阳边。"},{t:"行路难，行路难，",m:"行路难啊，行路难。"},{t:"多歧路，今安在？",m:"岔路那么多，路在哪里？"},{t:"长风破浪会有时，",m:"终有一天能乘长风破万里浪。"},{t:"直挂云帆济沧海。",m:"高挂云帆渡过大海。"}],
        translation: "金杯里的清酒一斗价值十千钱，玉盘里的珍馐值万钱。但我放下杯筷不想吃，拔剑四处看心中茫然。想渡黄河，冰堵塞了河流；想登太行山，大雪封山。闲来在碧溪上垂钓，忽又梦见乘船在太阳边。行路难啊，行路难，岔路那么多，路在哪里？相信终有一天能乘长风破万里浪，高挂云帆渡过沧海。这首诗表达了诗人怀才不遇的愤懑和对理想的执着追求。",
        quiz: [{q:"“斗十千”形容？",options:["酒少","酒贵/宴席豪华","打架","很多"],ans:1},{q:"“投箸”的意思是？",options:["扔掉筷子/放下筷子","投降","吃饭","写书"],ans:0},{q:"“冰塞川”“雪满山”比喻？",options:["天气冷","风景好","人生仕途的艰难阻碍","想去滑雪"],ans:2},{q:"“垂钓”和“梦日”用了？",options:["姜子牙和伊尹的典故","夸张","比喻","拟人"],ans:0},{q:"千古名句是？",options:["金樽清酒","停杯投箸","长风破浪会有时","行路难"],ans:2}]
    },
    {
        id: 149, category: '六年级', title: "破阵子·为陈同甫赋壮词以寄之", author: "宋 · 辛弃疾", image: "破阵子.png",
        content: [{t:"醉里挑灯看剑，",m:"醉梦里挑亮油灯观看宝剑。"},{t:"梦回吹角连营。",m:"梦醒时听到军营号角吹响。"},{t:"八百里分麾下炙，",m:"把牛肉分给部下吃。"},{t:"五十弦翻塞外声，",m:"乐器奏起雄壮的军乐。"},{t:"沙场秋点兵。",m:"秋天在战场上检阅军队。"},{t:"马作的卢飞快，",m:"战马像的卢马一样飞快。"},{t:"弓如霹雳弦惊。",m:"弓箭像霹雳一样震响。"},{t:"了却君王天下事，",m:"完成君王统一天下的大业。"},{t:"赢得生前身后名。",m:"赢得生前死后的美名。"},{t:"可怜白发生！",m:"可惜我已经满头白发了！"}],
        translation: "醉梦里挑亮油灯观看宝剑，梦醒时听到连绵军营里号角吹响。把牛肉分给部下享用，乐器奏起雄壮的边塞军乐，秋天在战场上检阅军队。战马像的卢马一样飞快，弓箭像霹雳一样震响。我一心想完成君王统一天下的大业，赢得生前死后的美名。可惜啊，我已经满头白发了！这首词表达了作者杀敌报国的雄心和壮志难酬的悲愤。",
        quiz: [{q:"“八百里”在这里指？",options:["路程","牛/牛肉","山名","人名"],ans:1},{q:"“麾下”是指？",options:["旗下/部下","挥手","麾下的旗","放下"],ans:0},{q:"“的卢”是指？",options:["一种快马","芦苇","路","人名"],ans:0},{q:"“天下事”是指？",options:["所有事","国家大事","收复中原/统一大业","家事"],ans:2},{q:"最后一句表达了？",options:["开心","壮志难酬的悲愤","觉得自己老了","头发白了好看"],ans:1}]
    },
    {
        id: 150, category: '六年级', title: "如梦令", author: "宋 · 李清照", image: "如梦令.png",
        content: [{t:"常记溪亭日暮，",m:"时常记起溪亭日暮时分。"},{t:"沉醉不知归路。",m:"沉醉得忘记了回家的路。"},{t:"兴尽晚回舟，",m:"玩得尽兴晚归划船。"},{t:"误入藕花深处。",m:"不小心闯入藕花深处。"},{t:"争渡，争渡，",m:"抢着划船，抢着划船。"},{t:"惊起一滩鸥鹭。",m:"惊起满滩的鸥鹭。"}],
        translation: "时常记起那次在溪亭游玩，直到日暮时分，我喝醉了，忘记了回家的路。玩得尽兴了，晚归划船，不小心闯入了藕花深处。怎么划出去？怎么划出去？划船声惊起了满滩的鸥鹭。这首词回忆了作者少女时代的快乐生活。",
        quiz: [{q:"“沉醉”的意思是？",options:["喝醉了大醉","沉迷","睡觉","掉水里"],ans:0},{q:"“兴尽”是指？",options:["高兴完了","兴致满足","没兴趣","尽头"],ans:1},{q:"“藕花”是指？",options:["莲藕","荷花","花名","藕"],ans:1},{q:"“争渡”的意思是？",options:["争吵","抢着渡河/奋力划船","渡口","比赛"],ans:1},{q:"这首词表达了？",options:["悲伤","少女时代的快乐","惊吓","后悔"],ans:1}]
    },
    {
        id: 151, category: '六年级', title: "卜算子·送鲍浩然之浙东", author: "宋 · 王观", image: "卜算子_送鲍浩然.png",
        content: [{t:"水是眼波横，",m:"水像美人的眼波流动。"},{t:"山是眉峰聚。",m:"山像美人的眉峰聚在一起。"},{t:"欲问行人去那边？",m:"想问你要去哪里？"},{t:"眉眼盈盈处。",m:"去那山水交汇、眉眼盈盈的地方。"},{t:"才始送春归，",m:"刚把春天送走。"},{t:"又送君归去。",m:"又要送你回去。"},{t:"若到江南赶上春，",m:"如果到了江南赶上春天。"},{t:"千万和春住。",m:"千万要把春天留住。"}],
        translation: "水像美人的眼波流动，山像美人的眉峰聚在一起。想问你要去哪里？去那山水交汇、眉眼盈盈的地方。刚把春天送走，又要送你回去。如果到了江南赶上春天，千万要把春天留住。这首词是一首送别词，比喻新奇，充满情趣。",
        quiz: [{q:"“眼波横”比喻？",options:["眼睛","水波/水流","横着看","波浪"],ans:1},{q:"“眉峰聚”比喻？",options:["眉毛","山峦","聚会","峰顶"],ans:1},{q:"“眉眼盈盈处”是指？",options:["美人脸","浙东山水秀丽的地方","眼睛里","眉毛里"],ans:1},{q:"“和春住”的意思是？",options:["和春天住一起/享受美好春光","住在春天","和春姑娘住","留住"],ans:0},{q:"这是一首？",options:["送别词","咏物词","思乡词","边塞词"],ans:0}]
    },
    {
        id: 152, category: '六年级', title: "山坡羊·潼关怀古", author: "元 · 张养浩", image: "山坡羊_潼关怀古.png",
        content: [{t:"峰峦如聚，",m:"华山群峰好像在聚会。"},{t:"波涛如怒，",m:"黄河波涛汹涌好像在发怒。"},{t:"山河表里潼关路。",m:"潼关外有黄河，内有华山，地势险要。"},{t:"望西都，意踌躇。",m:"遥望长安，心情沉重。"},{t:"伤心秦汉经行处，",m:"伤心曾是秦汉繁华之地。"},{t:"宫阙万间都做了土。",m:"万间宫殿都变成了泥土。"},{t:"兴，百姓苦；",m:"朝代兴盛，百姓受苦。"},{t:"亡，百姓苦。",m:"朝代灭亡，百姓也受苦。"}],
        translation: "华山群峰好像在聚会，黄河波涛汹涌好像在发怒，潼关外有黄河，内有华山，地势险要。遥望长安，心情沉重。伤心曾是秦汉繁华之地，万间宫殿都变成了泥土。朝代兴盛，百姓受苦；朝代灭亡，百姓也受苦。这首曲借古讽今，表达了对百姓疾苦的深切同情。",
        quiz: [{q:"“如怒”形容？",options:["人生气","波涛汹涌","声音大","发火"],ans:1},{q:"“表里”是指？",options:["表面和里面","外有黄河内有华山","衣服","表情"],ans:1},{q:"“西都”是指？",options:["西安","长安","西边的城市","成都"],ans:1},{q:"“踌躇”在这里意思是？",options:["犹豫","得意","心情沉重/感慨万千","走路慢"],ans:2},{q:"“兴，百姓苦”是因为？",options:["兴建宫殿劳民伤财","人多了","没饭吃","高兴"],ans:0}]
    },
    {
        id: 153, category: '六年级', title: "菩萨蛮·书江西造口壁", author: "宋 · 辛弃疾", image: "菩萨蛮.png",
        content: [{t:"郁孤台下清江水，",m:"郁孤台下的清江水。"},{t:"中间多少行人泪。",m:"中间流淌着多少逃难人的眼泪。"},{t:"西北望长安，",m:"向西北遥望长安。"},{t:"可怜无数山。",m:"可惜被无数青山遮挡。"},{t:"青山遮不住，",m:"青山遮不住江水。"},{t:"毕竟东流去。",m:"它毕竟向东流去。"},{t:"江晚正愁余，",m:"傍晚江边我正满怀忧愁。"},{t:"山深闻鹧鸪。",m:"深山里传来鹧鸪的叫声。"}],
        translation: "郁孤台下的清江水，中间流淌着多少当年逃难人的眼泪。向西北遥望长安，可惜被无数青山遮挡。青山虽然遮得住视线，却遮不住江水，它毕竟浩浩荡荡向东流去。傍晚江边我正满怀忧愁，深山里传来鹧鸪“行不得也哥哥”的悲啼。这首词表达了作者对国家山河破碎的悲愤。",
        quiz: [{q:"“行人泪”是指？",options:["走路人的泪","逃难百姓的泪","作者的泪","雨水"],ans:1},{q:"“长安”代指？",options:["西安","故都/中原失地","长期平安","北方"],ans:1},{q:"“东流去”象征？",options:["水流方向","大势所趋/复国志愿","东边","流走"],ans:1},{q:"“鹧鸪”叫声谐音？",options:["咕咕咕","行不得也哥哥","快回家","不想走"],ans:1},{q:"这首词表达了？",options:["快乐","忧国忧民/悲愤","看风景","听鸟叫"],ans:1}]
    },
    {
        id: 154, category: '六年级', title: "题乌江亭", author: "唐 · 杜牧", image: "题乌江亭.png",
        content: [{t:"胜败兵家事不期，",m:"胜败是兵家常事，难以预料。"},{t:"包羞忍耻是男儿。",m:"能忍受耻辱才是真正的男儿。"},{t:"江东子弟多才俊，",m:"江东子弟才俊众多。"},{t:"卷土重来未可知。",m:"如果卷土重来，胜负还不知道呢。"}],
        translation: "胜败是兵家常事，难以预料，能忍受耻辱才是真正的男儿。江东子弟才俊众多，如果项羽当年渡江回去，卷土重来，胜负还不知道呢。这首诗是对项羽兵败自刎的惋惜和批评，认为他应该忍辱负重。",
        quiz: [{q:"“不期”的意思是？",options:["不期待","不准时","难以预料","不去"],ans:2},{q:"“包羞忍耻”是指？",options:["不知羞耻","忍受耻辱/能屈能伸","包饺子","害羞"],ans:1},{q:"“江东子弟”是指？",options:["项羽的家乡人","江边的孩子","学生","士兵"],ans:0},{q:"“卷土重来”比喻？",options:["尘土飞扬","失败后重新组织力量","卷铺盖","回来"],ans:1},{q:"作者对项羽的态度是？",options:["赞赏","惋惜/批评他不能忍辱","讨厌","无所谓"],ans:1}]
    },
    {
        id: 155, category: '五年级', title: "病牛", author: "宋 · 李纲", image: "病牛.png",
        content: [{t:"耕犁千亩实千箱，",m:"耕种千亩田地，收获千箱粮食。"},{t:"力尽筋疲谁爱惜？",m:"力尽筋疲了有谁来爱惜？"},{t:"但得众生皆得饱，",m:"只要众生都能吃饱。"},{t:"不辞羸病卧残阳。",m:"不推辞在残阳下瘦弱病倒。"}],
        translation: "耕种千亩田地，换来了千箱粮食的丰收，可是当牛力尽筋疲时，有谁来爱惜它呢？只要能让众生都吃饱，即使瘦弱病倒在残阳下，也绝不推辞。这首诗咏物言志，赞美了牛的奉献精神，也表达了诗人甘愿为民牺牲的志向。",
        quiz: [{q:"“实”的意思是？",options:["诚实","充实/装满","果实","实在"],ans:1},{q:"“羸(léi)病”是指？",options:["生病","瘦弱多病","雷电","累了"],ans:1},{q:"“残阳”烘托了？",options:["景色美","悲壮/凄凉的气氛","热","天黑"],ans:1},{q:"这首诗赞美了？",options:["牛的奉献精神","粮食多","风景好","阳光好"],ans:0},{q:"“谁爱惜”表达了？",options:["很多人爱惜","无人爱惜的愤慨","疑问","想人爱"],ans:1}]
    },
    {
        id: 156, category: '六年级', title: "少年行(其一)", author: "唐 · 王维", image: "少年行.png",
        content: [{t:"新丰美酒斗十千，",m:"新丰的美酒一斗价值十千钱。"},{t:"咸阳游侠多少年。",m:"咸阳的游侠大多是少年。"},{t:"相逢意气为君饮，",m:"相逢意气相投，为你痛饮。"},{t:"系马高楼垂柳边。",m:"把马系在系在垂柳边的高楼下。"}],
        translation: "新丰的美酒一斗价值十千钱，咸阳的游侠大多是风华正茂的少年。相逢意气相投，我愿意为你痛饮，把马系在垂柳边的高楼下。这首诗描写了少年游侠豪放洒脱的形象。",
        quiz: [{q:"“斗十千”形容？",options:["酒多","酒名贵","打架","很多"],ans:1},{q:"“游侠”是指？",options:["游客","侠客/豪侠","游泳的人","下棋"],ans:1},{q:"“意气”是指？",options:["生气","情投意合/豪情","意思","空气"],ans:1},{q:"“系马”是为了？",options:["怕马跑了","停车喝酒","休息","看风景"],ans:1},{q:"这首诗充满了？",options:["悲伤","豪情/青春气息","恐惧","无聊"],ans:1}]
    },
    {
        id: 157, category: '六年级', title: "虞美人", author: "五代 · 李煜", image: "虞美人.png",
        content: [{t:"春花秋月何时了？",m:"春花秋月的日子什么时候才能结束？"},{t:"往事知多少。",m:"往事知道有多少。"},{t:"小楼昨夜又东风，",m:"小楼昨夜又吹来了东风。"},{t:"故国不堪回首月明中。",m:"在月明中不堪回首故国。"},{t:"雕栏玉砌应犹在，",m:"精雕的栏杆，玉石的台阶应该还在。"},{t:"只是朱颜改。",m:"只是人的容颜已改。"},{t:"问君能有几多愁？",m:"问你心里有多少忧愁？"},{t:"恰似一江春水向东流。",m:"就像那一江春水向东流。"}],
        translation: "春花秋月的美好日子什么时候才能结束？往事不堪回首。小楼昨夜又吹来了东风，在月明中我实在不堪回首故国。故宫精雕的栏杆，玉石的台阶应该还在，只是朱红的颜色已经改变（或指人已衰老）。要问我心里有多少忧愁？就像那一江春水浩浩荡荡向东流。这首词是李煜的绝命词，抒发了深切的故国之思。",
        quiz: [{q:"“何时了”表达了？",options:["想结束生命/痛苦","想过节","想看花","不知道时间"],ans:0},{q:"“故国”是指？",options:["老家","南唐","故乡","中国"],ans:1},{q:"“朱颜改”是指？",options:["颜色变了","容颜衰老/江山易主","改名字","红脸"],ans:1},{q:"“一江春水向东流”比喻？",options:["水流急","忧愁无穷无尽","风景美","水多"],ans:1},{q:"李煜被称为？",options:["词圣","千古词帝","诗仙","词仙"],ans:1}]
    },
    {
        id: 158, category: '六年级', title: "临江仙·滚滚长江东逝水", author: "明 · 杨慎", image: "临江仙.png",
        content: [{t:"滚滚长江东逝水，",m:"滚滚长江向东流去。"},{t:"浪花淘尽英雄。",m:"浪花淘尽了千古英雄。"},{t:"是非成败转头空。",m:"是非成败转眼成空。"},{t:"青山依旧在，",m:"只有青山依然存在。"},{t:"几度夕阳红。",m:"夕阳依旧一次次变红。"},{t:"白发渔樵江渚上，",m:"白发渔翁樵夫在江中小洲上。"},{t:"惯看秋月春风。",m:"习惯了看秋月春风。"},{t:"一壶浊酒喜相逢。",m:"拿着一壶浊酒喜相逢。"},{t:"古今多少事，",m:"古今多少兴亡事。"},{t:"都付笑谈中。",m:"都在笑谈之中。"}],
        translation: "滚滚长江向东流去，浪花淘尽了千古英雄。是非成败转眼成空，只有青山依然存在，夕阳依旧一次次变红。白发渔翁樵夫在江中小洲上，习惯了看秋月春风。拿着一壶浊酒喜相逢，古今多少兴亡事，都在笑谈之中。这首词是《三国演义》的开篇词，表现了作者豪放旷达、看破红尘的宇宙观。",
        quiz: [{q:"“淘尽”意思是？",options:["洗干净","冲刷/冲走","淘宝","淘气"],ans:1},{q:"“转头空”说明？",options:["头晕","短暂/虚无","转头就没了","空虚"],ans:1},{q:"“渔樵”是指？",options:["渔夫和樵夫/隐士","姓渔和姓樵","鱼和桥","看鱼"],ans:0},{q:"“都付笑谈中”表达了？",options:["喜欢聊天","旷达/看淡历史兴亡","好笑","谈话"],ans:1},{q:"这首词被用作哪部名著的开篇？",options:["水浒传","西游记","三国演义","红楼梦"],ans:2}]
    },
    {
        id: 159, category: '六年级', title: "早梅", author: "唐 · 张谓", image: "早梅.png",
        content: [{t:"一树寒梅白玉条，",m:"一树寒梅像白玉条一样洁白。"},{t:"迥临村路傍溪桥。",m:"远离村路旁临溪桥。"},{t:"不知近水花先发，",m:"不知道因为靠近水边花先开了。"},{t:"疑是经冬雪未销。",m:"还以为是经过冬天雪还没化。"}],
        translation: "一树寒梅像白玉条一样洁白，远离村路，旁临溪桥。人们不知道因为它靠近水边，所以花先开了，还以为是经过冬天，枝头上的雪还没融化呢。这首诗赞美了早梅的洁白和早开。",
        quiz: [{q:"“白玉条”比喻？",options:["玉石","梅花枝条","白纸","面条"],ans:1},{q:"“迥(jiǒng)”的意思是？",options:["近","远","回","窘迫"],ans:1},{q:"为什么“花先发”？",options:["近水/温度高","阳光好","施肥了","品种好"],ans:0},{q:"“疑”的意思是？",options:["怀疑/以为","疑问","迟疑","疑似"],ans:0},{q:"“销”的意思是？",options:["销售","融化/消融","销毁","小"],ans:1}]
    },
    // 一年级
    {
        id: 160, category: '一年级', title: "江上", author: "宋 · 王安石", image: "江上.png",
        content: [{t:"江北秋阴一半开，",m:"江北的秋天阴云散开了一半。"},{t:"晚云含雨却低徊。",m:"傍晚的云彩带着雨意低低地徘徊。"},{t:"青山缭绕疑无路，",m:"青山缭绕，让人怀疑前面没有路。"},{t:"忽见千帆隐映来。",m:"忽然看见成百上千的帆船隐约驶来。"}],
        translation: "江北的秋天，阴云散开了一半，傍晚的云彩带着雨意低低地徘徊。重重叠叠的青山让人怀疑前面没有路了，忽然看见成百上千的帆船在山影中隐约驶来。这首诗描写了江上雨后初晴的景色。",
        quiz: [{q:"“秋阴”是指？",options:["秋天的阴雨天/阴云","树荫","阴冷","心情不好"],ans:0},{q:"“低徊”形容？",options:["飞得很低","云彩低垂移动缓慢","心情低落","走路慢"],ans:1},{q:"“疑无路”是因为？",options:["路断了","青山缭绕遮挡视线","天黑了","迷路了"],ans:1},{q:"“千帆”是指？",options:["一千个帆布","很多船","一千个人","风很大"],ans:1},{q:"这首诗的作者是？",options:["李白","王安石","杜甫","苏轼"],ans:1}]
    },
    {
        id: 161, category: '一年级', title: "绝句", author: "宋 · 僧志南", image: "绝句_僧志南.png",
        content: [{t:"古木阴中系短篷，",m:"在古树的树荫下系住小船。"},{t:"杖藜扶我过桥东。",m:"拄着拐杖扶持我走过桥东。"},{t:"沾衣欲湿杏花雨，",m:"杏花开时的蒙蒙细雨沾衣欲湿。"},{t:"吹面不寒杨柳风。",m:"吹在脸上不觉寒冷的是杨柳风。"}],
        translation: "在古树的树荫下系住小船，拄着拐杖走过桥的东面。杏花开时的蒙蒙细雨沾在身上湿润了衣服，吹在脸上不觉得寒冷的是春天的杨柳风。这首诗描写了春天漫步的惬意心情。",
        quiz: [{q:"“短篷”是指？",options:["帐篷","小船","帽子","衣服"],ans:1},{q:"“杖藜”是指？",options:["拐杖","老爷爷","梨树","离开"],ans:0},{q:"“杏花雨”是指？",options:["下杏花","春雨","花瓣","雷雨"],ans:1},{q:"“杨柳风”给人什么感觉？",options:["寒冷","温暖/不寒","刺骨","狂暴"],ans:1},{q:"这首诗描写的季节是？",options:["春天","夏天","秋天","冬天"],ans:0}]
    },

    // 二年级
    {
        id: 162, category: '二年级', title: "春游湖", author: "宋 · 徐俯", image: "春游湖.png",
        content: [{t:"双飞燕子几时回？",m:"双飞的燕子是什么时候回来的？"},{t:"夹岸桃花蘸水开。",m:"两岸的桃花贴着水面盛开。"},{t:"春雨断桥人不渡，",m:"春雨淹没了断桥，人过不去。"},{t:"小舟撑出柳阴来。",m:"一只小船从柳阴深处撑了出来。"}],
        translation: "双飞的燕子是什么时候回来的？两岸的桃花贴着水面盛开。春雨涨水淹没了断桥，人过不去，正在焦急时，一只小船从柳阴深处撑了出来。这首诗描写了春游遇雨、富有情趣的画面。",
        quiz: [{q:"“蘸水”形容桃花？",options:["掉水里了","开得很低/贴着水面","喝水","洗澡"],ans:1},{q:"“几时回”是在问？",options:["桃花","燕子","小船","行人"],ans:1},{q:"“断桥”是因为？",options:["桥坏了","水涨淹没桥面","地名","桥断了"],ans:1},{q:"人为什么“不渡”？",options:["不想过河","没船","水漫过桥","怕水"],ans:2},{q:"最后一句给人什么感觉？",options:["害怕","惊喜","失望","悲伤"],ans:1}]
    },
    {
        id: 163, category: '二年级', title: "渡汉江", author: "唐 · 宋之问", image: "渡汉江.png",
        content: [{t:"岭外音书断，",m:"流放岭南期间与家乡音讯隔绝。"},{t:"经冬复历春。",m:"经过了一个冬天又一个春天。"},{t:"近乡情更怯，",m:"越接近家乡心情越胆怯。"},{t:"不敢问来人。",m:"甚至不敢问遇到的家乡人。"}],
        translation: "流放岭南期间与家乡音讯隔绝，经过了一个冬天又一个春天。越接近家乡，心情反而越胆怯，因为害怕听到坏消息，甚至不敢问遇到的家乡人。这首诗刻画了游子归乡时复杂矛盾的心理。",
        quiz: [{q:"“岭外”是指？",options:["五岭之外/岭南","山顶","国外","野外"],ans:0},{q:"“音书断”的意思是？",options:["书读完了","音讯隔绝/没信","音乐停了","电话挂了"],ans:1},{q:"“复”的意思是？",options:["报复","又","复杂","恢复"],ans:1},{q:"为什么“情更怯”？",options:["怕见人","近乡情怯/怕听到家里的坏消息","没钱","生病了"],ans:1},{q:"这首诗表达了？",options:["开心","思乡与担忧","愤怒","无聊"],ans:1}]
    },

    // 三年级
    {
        id: 164, category: '三年级', title: "回乡偶书(其二)", author: "唐 · 贺知章", image: "回乡偶书_其二.png",
        content: [{t:"离别家乡岁月多，",m:"离别家乡的岁月已经很久了。"},{t:"近来人事半消磨。",m:"近来家乡的人和事变化了一半。"},{t:"惟有门前镜湖水，",m:"只有门前镜湖的碧水。"},{t:"春风不改旧时波。",m:"春风吹起波澜，还和旧时一样。"}],
        translation: "离别家乡的岁月已经很久了，回家后发现许多人事都已变化消逝。只有门前镜湖的碧水，在春风吹拂下泛起的波澜，还和年轻时看到的一样。这首诗感叹人事变迁，寄托了对故乡的深情。",
        quiz: [{q:"“消磨”的意思是？",options:["磨刀","消失/变化","浪费时间","折磨"],ans:1},{q:"“镜湖”在哪里？",options:["北京","绍兴","杭州","南京"],ans:1},{q:"什么东西“不改”？",options:["人","房子","镜湖水/自然景物","岁月"],ans:2},{q:"这首诗表达了？",options:["物是人非的感叹","由于搬家开心","想去游泳","春风很大"],ans:0},{q:"作者贺知章是？",options:["“饮中八仙”之一","画圣","书圣","皇帝"],ans:0}]
    },
    {
        id: 165, category: '三年级', title: "题都城南庄", author: "唐 · 崔护", image: "题都城南庄.png",
        content: [{t:"去年今日此门中，",m:"去年的今天就在这扇门里。"},{t:"人面桃花相映红。",m:"姑娘的脸庞和桃花互相映衬得绯红。"},{t:"人面不知何处去，",m:"如今姑娘不知去向何处。"},{t:"桃花依旧笑春风。",m:"只有桃花依旧在春风中绽放。"}],
        translation: "去年的今天，就在这扇门里，姑娘的脸庞和桃花互相映衬，显得格外红润美丽。如今姑娘不知去向何处，只有桃花依旧在春风中含笑绽放。这首诗写出了寻访不遇的怅惘心情。",
        quiz: [{q:"“人面”是指？",options:["人的脸","面具","姑娘","路人"],ans:2},{q:"“相映红”形容？",options:["桃花红","人脸红","互相映衬美丽","衣服红"],ans:2},{q:"“笑春风”用了什么修辞？",options:["比喻","拟人","夸张","排比"],ans:1},{q:"这首诗表达了？",options:["开心","物是人非的怅惘","愤怒","桃花很贵"],ans:1},{q:"这个故事后来演变成成语？",options:["人面桃花","桃花流水","桃红柳绿","世外桃源"],ans:0}]
    },
    {
        id: 166, category: '三年级', title: "大风歌", author: "汉 · 刘邦", image: "大风歌.png",
        content: [{t:"大风起兮云飞扬，",m:"大风刮起啊，乌云翻滚飞扬。"},{t:"威加海内兮归故乡，",m:"威信传遍天下啊，荣归故乡。"},{t:"安得猛士兮守四方！",m:"怎样才能得到勇士啊，镇守四方！"}],
        translation: "大风刮起啊，乌云翻滚飞扬；威信传遍天下啊，荣归故乡。怎样才能得到勇士啊，为我镇守国家的四方！这首诗是刘邦平定天下回乡时所作，表现了他的豪情和对国家安定的忧虑。",
        quiz: [{q:"“兮”是？",options:["叹词/语气词","西边","稀少","希望"],ans:0},{q:"“海内”是指？",options:["大海里","国内/天下","海边","家里"],ans:1},{q:"“安得”的意思是？",options:["安全","哪里得到/怎样得到","安心","安定"],ans:1},{q:"作者最担心的是？",options:["天气不好","没有猛士守四方","回不去故乡","风太大"],ans:1},{q:"这是一首？",options:["骚体诗/歌行","律诗","绝句","词"],ans:0}]
    },

    // 四年级
    {
        id: 167, category: '四年级', title: "登科后", author: "唐 · 孟郊", image: "登科后.png",
        content: [{t:"昔日肮脏不足夸，",m:"往日困顿不得志，不值一提。"},{t:"今朝放荡思无涯。",m:"今天考中进士，心情愉悦思绪无边。"},{t:"春风得意马蹄疾，",m:"沐浴春风，得意洋洋，马跑得飞快。"},{t:"一日看尽长安花。",m:"一天之内就能把长安城的名花看遍。"}],
        translation: "往日困顿不得志的日子不值一提，今天考中进士，心情愉悦思绪无边。迎着春风，得意洋洋，马跑得飞快，好像一天之内就能把长安城的名花全部看遍。这首诗描写了诗人考中进士后狂喜的心情。",
        quiz: [{q:"“肮脏”古意是指？",options:["不干净","困顿挫折/不顺利","骂人","泥土"],ans:1},{q:"“登科”是指？",options:["登山","考中进士","科学","上课"],ans:1},{q:"“马蹄疾”是因为？",options:["马受惊了","心情高兴","有急事","马跑得快"],ans:1},{q:"“一日看尽”运用了？",options:["比喻","夸张","拟人","排比"],ans:1},{q:"成语“走马观花”源自？",options:["本诗","春望","大风歌","村居"],ans:0}]
    },
    {
        id: 168, category: '四年级', title: "淮上与友人别", author: "唐 · 郑谷", image: "淮上与友人别.png",
        content: [{t:"扬子江头杨柳春，",m:"扬子江头，杨柳青青，春意盎然。"},{t:"杨花愁杀渡江人。",m:"漫天飞舞的杨花让渡江的人愁死了。"},{t:"数声风笛离亭晚，",m:"驿亭晚别，传来几声随风飘荡的笛声。"},{t:"君向潇湘我向秦。",m:"你要去潇湘，我要去秦地。"}],
        translation: "扬子江头，杨柳青青，春意盎然。漫天飞舞的杨花，让准备渡江离别的人愁绪满怀。驿亭晚别，传来几声随风飘荡的笛声，我们就要各奔东西，你要去潇湘，我要去秦地。这首诗描写了江头送别的愁苦。",
        quiz: [{q:"“愁杀”的意思是？",options:["杀人","愁得要死/极度忧愁","杀毒","仇恨"],ans:1},{q:"“杨花”象征？",options:["春天","离别/漂泊","美丽","白色"],ans:1},{q:"“离亭”是指？",options:["离开亭子","送别的驿亭","亭子名字","远处的亭子"],ans:1},{q:"“秦”代指？",options:["秦朝","长安","秦国","姓秦"],ans:1},{q:"这首诗是关于？",options:["游玩","送别","战争","种树"],ans:1}]
    },

    // 五年级
    {
        id: 169, category: '五年级', title: "夜雨寄北", author: "唐 · 李商隐", image: "夜雨寄北.png",
        content: [{t:"君问归期未有期，",m:"你问我何时回去，我还没有定日子。"},{t:"巴山夜雨涨秋池。",m:"巴山的夜雨下个不停，秋池水涨。"},{t:"何当共剪西窗烛，",m:"什么时候才能一起在西窗下剪烛夜谈？"},{t:"却话巴山夜雨时。",m:"再来回忆今天巴山夜雨的情景。"}],
        translation: "你问我何时回去，我还没有确定的日子。今晚巴山下着大雨，雨水涨满了秋天的池塘。什么时候才能和你一起在西窗下剪烛夜谈，再来诉说今天巴山夜雨时的思念之情呢？这首诗表达了诗人对亲友的深切思念和渴望重逢的心情。",
        quiz: [{q:"“未有期”的意思是？",options:["没有期望","没有确定的日期","没有欺骗","未来"],ans:1},{q:"“涨秋池”说明？",options:["池塘坏了","雨下得大","秋天水多","在游泳"],ans:1},{q:"“剪烛”是指？",options:["做蜡烛","剪去烛芯/秉烛夜谈","灭灯","买蜡烛"],ans:1},{q:"“却话”的意思是？",options:["却说话","拒绝说话","回头重述/回忆","退却"],ans:2},{q:"这首诗写给？",options:["北方亲友/妻子","皇帝","陌生人","农民"],ans:0}]
    },
    {
        id: 170, category: '五年级', title: "秋词(其一)", author: "唐 · 刘禹锡", image: "秋词.png",
        content: [{t:"自古逢秋悲寂寥，",m:"自古以来人们遇到秋天都悲叹寂寥。"},{t:"我言秋日胜春朝。",m:"我却说秋天比春天还要好。"},{t:"晴空一鹤排云上，",m:"晴空中一只白鹤冲破云层飞向蓝天。"},{t:"便引诗情到碧霄。",m:"激发我的诗情飞到了九霄云外。"}],
        translation: "自古以来，人们提到秋天总是悲叹寂寥，我却说秋天比春天还要好。你看，晴空中一只白鹤冲破云层，矫健地飞向蓝天，这壮丽的景象激发了我的诗情，随它飞到了九霄云外。这首诗表现了诗人豪迈乐观的情怀。",
        quiz: [{q:"古人对秋天的态度通常是？",options:["高兴","悲寂寥","无所谓","愤怒"],ans:1},{q:"作者对秋天的态度是？",options:["悲伤","胜春朝/赞美","厌恶","恐惧"],ans:1},{q:"“排云上”形容鹤？",options:["飞不动","冲破云层/矫健","排队","在云上面"],ans:1},{q:"“碧霄”是指？",options:["碧绿的草","蓝天","碧玉","晚上"],ans:1},{q:"这首诗体现了作者？",options:["悲观厌世","昂扬向上/乐观","孤独","想家"],ans:1}]
    },
    {
        id: 171, category: '五年级', title: "望月怀远", author: "唐 · 张九龄", image: "望月怀远.png",
        content: [{t:"海上生明月，",m:"茫茫海上升起一轮明月。"},{t:"天涯共此时。",m:"远在天涯你也和我此刻共赏。"},{t:"情人怨遥夜，",m:"有情之人怨恨长夜漫漫。"},{t:"竟夕起相思。",m:"整夜不眠生起相思之情。"},{t:"灭烛怜光满，",m:"吹灭蜡烛喜爱这满屋月光。"},{t:"披衣觉露滋。",m:"披上衣服感到露水沾湿。"},{t:"不堪盈手赠，",m:"可惜不能捧起月光送给你。"},{t:"还寝梦佳期。",m:"还是回去睡觉梦中相会吧。"}],
        translation: "茫茫海上升起一轮明月，你我相隔天涯却在此时共赏月色。有情之人怨恨长夜漫漫，整夜不眠生起相思之情。吹灭蜡烛是因为喜爱这满屋月光，披上衣服走到户外感到露水沾湿。可惜不能捧起月光送给你，还是回去睡觉，希望能做个好梦与你相会。这首诗是望月怀人的千古名篇。",
        quiz: [{q:"千古名句是？",options:["海上生明月，天涯共此时","情人怨遥夜","灭烛怜光满","还寝梦佳期"],ans:0},{q:"“情人”古意指？",options:["情侣","有情之人/亲友","敌人","陌生人"],ans:1},{q:"“竟夕”的意思是？",options:["竟然","通宵/整夜","傍晚","除夕"],ans:1},{q:"为什么“灭烛”？",options:["省油","喜爱月光(怜光满)","睡觉","风吹灭"],ans:1},{q:"“不堪盈手赠”是指？",options:["手太小","月光抓不住","不想送","东西太重"],ans:1}]
    },
    {
        id: 172, category: '五年级', title: "宣州谢朓楼饯别校书叔云", author: "唐 · 李白", image: "宣州谢朓楼.png",
        content: [{t:"弃我去者，昨日之日不可留；",m:"弃我而去的，是昨天的日子不可挽留。"},{t:"乱我心者，今日之日多烦忧。",m:"扰乱我心的，是今天的日子烦忧。"},{t:"长风万里送秋雁，对此可以酣高楼。",m:"长风万里送走秋雁，面对美景可以在高楼痛饮。"},{t:"蓬莱文章建安骨，中间小谢又清发。",m:"你的文章有建安风骨，我的诗篇像谢朓一样清秀。"},{t:"俱怀逸兴壮思飞，欲上青天揽明月。",m:"我们都怀有豪情壮志，想飞上青天摘取明月。"},{t:"抽刀断水水更流，举杯消愁愁更愁。",m:"抽刀切断水流，水流得更急；举杯饮酒消愁，愁绪却更深。"},{t:"人生在世不称意，明朝散发弄扁舟。",m:"人生在世如果不如意，明天就披头散发驾船归隐。"}],
        translation: "弃我而去的昨日已不可挽留，扰乱我心的今日充满了烦忧。长风万里送走秋雁，面对美景可以在高楼畅怀痛饮。我们都怀有豪情壮志，想飞上青天摘取明月。抽刀切断水流，水流得更急；举杯饮酒消愁，愁绪却更深。人生在世如果不如意，明天我就披头散发驾船归隐江湖。这首诗表达了诗人怀才不遇的激愤和豪放不羁的性格。",
        quiz: [{q:"“酣高楼”是指？",options:["在高楼睡觉","在高楼痛饮","盖高楼","看高楼"],ans:1},{q:"“揽明月”表现了？",options:["手长","豪情壮志/理想","月亮低","想睡觉"],ans:1},{q:"“抽刀断水”的结果是？",options:["水断了","水更流","刀断了","手湿了"],ans:1},{q:"“举杯消愁”的结果是？",options:["愁没了","醉了","愁更愁","没酒了"],ans:2},{q:"“弄扁舟”是指？",options:["做船","归隐江湖","去玩","修船"],ans:1}]
    },
    {
        id: 173, category: '五年级', title: "月下独酌(其一)", author: "唐 · 李白", image: "月下独酌.png",
        content: [{t:"花间一壶酒，",m:"花丛中摆下一壶好酒。"},{t:"独酌无相亲。",m:"独自饮酒没有亲友陪伴。"},{t:"举杯邀明月，",m:"举起酒杯邀请明月。"},{t:"对影成三人。",m:"对着影子凑成了三个人。"},{t:"月既不解饮，",m:"明月既然不懂得饮酒。"},{t:"影徒随我身。",m:"影子也徒然跟随着我。"},{t:"暂伴月将影，",m:"暂时伴随明月和影子。"},{t:"行乐须及春。",m:"及时行乐要趁着春光。"}],
        translation: "花丛中摆下一壶好酒，独自饮酒没有亲友陪伴。我举起酒杯邀请明月，对着影子凑成了三个人（我、月、影）。明月既不懂得饮酒，影子也只是徒然跟随着我。但还是暂时伴随明月和影子，及时行乐要趁着美好的春光。这首诗表现了诗人孤独中的狂放和对自由的追求。",
        quiz: [{q:"“独酌”的意思是？",options:["独自斟酒/喝酒","毒酒","斟酌","倒酒"],ans:0},{q:"“三人”是指？",options:["三个人","李白、明月、影子","三个朋友","三杯酒"],ans:1},{q:"“不解饮”意思是？",options:["不解渴","不懂得喝酒","不想喝","没解决"],ans:1},{q:"“徒”的意思是？",options:["徒弟","徒然/白白地","走路","徒刑"],ans:1},{q:"这首诗表达了诗人？",options:["热闹","孤独寂寞/旷达","醉了","喜欢影子"],ans:1}]
    },
    {
        id: 174, category: '五年级', title: "赠卫八处士", author: "唐 · 杜甫", image: "赠卫八处士.png",
        content: [{t:"人生不相见，",m:"人生在世很难相见。"},{t:"动如参与商。",m:"就像参星和商星一样此出彼没。"},{t:"今夕复何夕，",m:"今晚是什么好日子？"},{t:"共此灯烛光。",m:"能一起在这灯烛光下叙谈。"},{t:"少壮能几时，",m:"青春年少能维持多久？"},{t:"鬓发各已苍。",m:"你我的鬓发都已经斑白了。"},{t:"访旧半为鬼，",m:"打听故友大半都已成鬼。"},{t:"惊呼热中肠。",m:"听到惊呼，内心热流涌动。"}],
        translation: "人生在世很难相见，就像参星和商星一样此出彼没。今晚是什么好日子？能一起在这灯烛光下叙谈。青春年少能维持多久？你我的鬓发都已经斑白了。打听故友大半都已离世，听到这消息不由惊呼，内心热流涌动悲伤不已。这首诗描写了与老友重逢的悲喜交集。",
        quiz: [{q:"“参与商”是指？",options:["参加商业","两颗星(此出彼没，很难相见)","两个人","做生意"],ans:1},{q:"“复何夕”表达了？",options:["今晚是哪天","重逢的惊喜","忘记时间","问日期"],ans:1},{q:"“苍”形容鬓发？",options:["苍老","斑白/灰白","茂盛","长"],ans:1},{q:"“访旧”是指？",options:["访问旧居","打听老朋友","买旧东西","看旧书"],ans:1},{q:"这首诗的情感是？",options:["纯粹快乐","悲喜交集/世事沧桑","愤怒","平静"],ans:1}]
    },
    {
        id: 175, category: '五年级', title: "天净沙·秋", author: "元 · 白朴", image: "天净沙_秋.png",
        content: [{t:"孤村落日残霞，",m:"孤立的村庄，落日余晖，晚霞消散。"},{t:"轻烟老树寒鸦，",m:"轻烟袅袅，老树枯枝，寒鸦栖息。"},{t:"一点飞鸿影下。",m:"一只大雁的影子掠过天际。"},{t:"青山绿水，",m:"青山耸立，绿水长流。"},{t:"白草红叶黄花。",m:"白草凄凄，红叶飘零，黄花盛开。"}],
        translation: "孤立的村庄，落日余晖，晚霞消散。轻烟袅袅，老树枯枝，寒鸦栖息，一只大雁的影子掠过天际。青山耸立，绿水长流，还有那白草凄凄，红叶飘零，黄花盛开。这首曲描绘了一幅色彩绚丽的秋景图。",
        quiz: [{q:"“飞鸿”是指？",options:["红色的鸟","大雁","飞行的红云","信件"],ans:1},{q:"这首曲描写的季节是？",options:["春","夏","秋","冬"],ans:2},{q:"“白草红叶黄花”特点是？",options:["色彩绚丽","颜色单调","枯萎","只有三种"],ans:0},{q:"这首曲的体裁是？",options:["诗","词","元曲/散曲","赋"],ans:2},{q:"与马致远的《秋思》相比，这首曲？",options:["更悲伤","色彩更明丽/意境较开阔","更短","不好听"],ans:1}]
    },

    // 六年级及古诗经典
    {
        id: 176, category: '六年级', title: "送杜少府之任蜀州", author: "唐 · 王勃", image: "送杜少府.png",
        content: [{t:"城阙辅三秦，",m:"雄伟的长安城由三秦之地护卫。"},{t:"风烟望五津。",m:"透过风烟遥望蜀地五津。"},{t:"与君离别意，",m:"和你离别的心情。"},{t:"同是宦游人。",m:"我们都是离乡做官的人。"},{t:"海内存知己，",m:"四海之内只要有知己。"},{t:"天涯若比邻。",m:"即使远在天涯也像邻居一样。"},{t:"无为在歧路，",m:"不要在岔路口分手时。"},{t:"儿女共沾巾。",m:"像小儿女那样哭湿佩巾。"}],
        translation: "雄伟的长安城由三秦之地护卫，透过风烟遥望蜀地五津。和你离别的心情，我们都是离乡做官的人。四海之内只要有知己，即使远在天涯也像邻居一样亲近。不要在岔路口分手时，像小儿女那样哭哭啼啼沾湿佩巾。这首诗是送别诗的名篇，格调高昂，慰藉友人。",
        quiz: [{q:"“宦游人”是指？",options:["游泳的人","离乡做官的人","旅游的人","宦官"],ans:1},{q:"千古名句是？",options:["城阙辅三秦","海内存知己，天涯若比邻","风烟望五津","儿女共沾巾"],ans:1},{q:"“比邻”的意思是？",options:["比如","邻居/近邻","比较","邻国"],ans:1},{q:"“无为”在这里意思是？",options:["无所作为","道家思想","不要","没有"],ans:2},{q:"“儿女”是指？",options:["儿子女儿","小辈","青年男女/小儿女态","子女"],ans:2}]
    },
    {
        id: 177, category: '六年级', title: "过故人庄", author: "唐 · 孟浩然", image: "过故人庄.png",
        content: [{t:"故人具鸡黍，",m:"老朋友准备了丰盛的饭菜。"},{t:"邀我至田家。",m:"邀请我到农家做客。"},{t:"绿树村边合，",m:"绿树环绕着村庄。"},{t:"青山郭外斜。",m:"青山在城郭外隐约横斜。"},{t:"开轩面场圃，",m:"打开窗户面对打谷场和菜园。"},{t:"把酒话桑麻。",m:"端着酒杯闲谈农事。"},{t:"待到重阳日，",m:"等到重阳节那天。"},{t:"还来就菊花。",m:"还要再来赏菊花。"}],
        translation: "老朋友准备了丰盛的饭菜，邀请我到农家做客。绿树环绕着村庄，青山在城郭外隐约横斜。打开窗户面对打谷场和菜园，端着酒杯闲谈农事。等到重阳节那天，我还要再来和你一起赏菊花。这首诗描写了淳朴的田园风光和真挚的友情。",
        quiz: [{q:"“具”的意思是？",options:["工具","具有","准备","具体"],ans:2},{q:"“鸡黍”是指？",options:["鸡和小米/饭菜","杀鸡","喂鸡","一种植物"],ans:0},{q:"“话桑麻”是指？",options:["说粗话","谈论农事","说桑树","说麻烦"],ans:1},{q:"“就菊花”是指？",options:["就着菊花吃","欣赏菊花","变成菊花","就是菊花"],ans:1},{q:"这首诗属于？",options:["边塞诗","田园诗","送别诗","咏史诗"],ans:1}]
    },
    {
        id: 178, category: '六年级', title: "十一月四日风雨大作", author: "宋 · 陆游", image: "十一月四日.png",
        content: [{t:"僵卧孤村不自哀，",m:"僵卧在孤寂的村庄里并不感到悲哀。"},{t:"尚思为国戍轮台。",m:"还想着为国家守卫边疆。"},{t:"夜阑卧听风吹雨，",m:"深夜里躺在床上听着风雨声。"},{t:"铁马冰河入梦来。",m:"梦见自己骑着披甲战马跨过冰河。"}],
        translation: "我直挺挺地躺在孤寂的村庄里，并不为自己的处境感到悲哀，心中还想着为国家守卫边疆。深夜里躺在床上听着风吹雨打的声音，梦见自己骑着披甲战马跨过冰封的河流去杀敌。这首诗表达了诗人至死不渝的爱国情怀。",
        quiz: [{q:"“僵卧”形容？",options:["睡觉","年老体弱/行动不便","僵硬","躺平"],ans:1},{q:"“戍轮台”是指？",options:["修轮子","守卫边疆","去轮台旅游","上台表演"],ans:1},{q:"“夜阑”是指？",options:["夜深","栏杆","难过","夜晚"],ans:0},{q:"“铁马冰河”出现在？",options:["现实中","梦境中","电视里","画里"],ans:1},{q:"这首诗表达了？",options:["悲哀","爱国情怀/壮志未酬","喜欢下雨","想骑马"],ans:1}]
    },
    {
        id: 179, category: '六年级', title: "白雪歌送武判官归京", author: "唐 · 岑参", image: "白雪歌.png",
        content: [{t:"北风卷地白草折，",m:"北风席卷大地，白草被吹折。"},{t:"胡天八月即飞雪。",m:"塞北八月就飘起了大雪。"},{t:"忽如一夜春风来，",m:"忽然好像一夜春风吹来。"},{t:"千树万树梨花开。",m:"千树万树的梨花都开了。"},{t:"散入珠帘湿罗幕，",m:"雪花飘入珠帘打湿了罗幕。"},{t:"狐裘不暖锦衾薄。",m:"穿狐皮袄不暖，盖锦被也嫌薄。"},{t:"将军角弓不得控，",m:"将军的角弓冻得拉不开。"},{t:"都护铁衣冷难着。",m:"都护的铁甲冷得穿不上。"}],
        translation: "(节选)北风席卷大地，白草被吹折，塞北八月就飘起了大雪。忽然好像一夜春风吹来，千树万树的梨花都开了。这首诗描写了边塞奇丽的雪景和送别的情景。",
        quiz: [{q:"“梨花”比喻？",options:["真正的梨花","雪花","棉花","白云"],ans:1},{q:"“胡天”是指？",options:["胡乱的天","北方/塞外","阴天","夏天"],ans:1},{q:"“八月”下雪说明？",options:["气候反常","边塞气候寒冷","记错了","下雨"],ans:1},{q:"千古名句是？",options:["北风卷地","忽如一夜春风来，千树万树梨花开","狐裘不暖","铁衣冷"],ans:1},{q:"这是一首？",options:["送别诗/边塞诗","田园诗","山水诗","闺怨诗"],ans:0}]
    },
    {
        id: 180, category: '六年级', title: "茅屋为秋风所破歌", author: "唐 · 杜甫", image: "茅屋为秋风.png",
        content: [{t:"八月秋高风怒号，",m:"八月秋深，狂风怒号。"},{t:"卷我屋上三重茅。",m:"卷走了我屋顶上好几层茅草。"},{t:"安得广厦千万间，",m:"怎样才能得到千万间宽敞的高楼。"},{t:"大庇天下寒士俱欢颜！",m:"庇护天下寒苦的人都开颜欢笑！"},{t:"风雨不动安如山。",m:"在风雨中安稳如山。"}],
        translation: "(节选)八月秋深，狂风怒号，卷走了我屋顶上好几层茅草。怎样才能得到千万间宽敞的高楼，庇护天下寒苦的人，让他们都开颜欢笑，在风雨中安稳如山！这首诗表现了诗人推己及人、忧国忧民的崇高思想。",
        quiz: [{q:"“怒号”运用了？",options:["拟人","比喻","夸张","排比"],ans:0},{q:"“三重茅”形容？",options:["三根茅草","茅草很重","很多层茅草/屋顶厚","三斤"],ans:2},{q:"“安得”的意思是？",options:["安全","如何能得到","安心","安定"],ans:1},{q:"“寒士”是指？",options:["冷的人","贫寒的读书人/穷苦人","韩信","士兵"],ans:1},{q:"诗人的愿望是？",options:["修好屋顶","大庇天下寒士/大家都有房住","发财","天气好"],ans:1}]
    },
    {
        id: 181, category: '六年级', title: "饮酒(其五)", author: "东晋 · 陶渊明", image: "饮酒_其五.png",
        content: [{t:"结庐在人境，",m:"在人世间建造房舍。"},{t:"而无车马喧。",m:"却没有车马的喧嚣。"},{t:"问君何能尔？",m:"问我怎么能做到这样？"},{t:"心远地自偏。",m:"心志高远，地方自然偏僻。"},{t:"采菊东篱下，",m:"在东篱下采摘菊花。"},{t:"悠然见南山。",m:"无意间抬眼望见南山。"},{t:"山气日夕佳，",m:"山中气息夕阳时分很好。"},{t:"飞鸟相与还。",m:"飞鸟结伴飞回。"}],
        translation: "在人世间建造房舍，却没有车马的喧嚣。问我怎么能做到这样？只要心志高远，地方自然显得偏僻幽静。在东篱下采摘菊花，无意间抬眼望见南山。山中气息在夕阳时分特别美好，飞鸟结伴飞回巢穴。这首诗描写了归隐田园的闲适生活。",
        quiz: [{q:"“结庐”是指？",options:["结婚","建造房子/居住","芦苇","结伴"],ans:1},{q:"为什么“无车马喧”？",options:["没人来","路断了","心远地自偏/心静","耳朵聋"],ans:2},{q:"“悠然”形容？",options:["忧愁","闲适自得的样子","悠远","突然"],ans:1},{q:"千古名句是？",options:["结庐在人境","采菊东篱下，悠然见南山","山气日夕佳","飞鸟相与还"],ans:1},{q:"“见”南山读作？",options:["jiàn(看见)","xiàn(出现)","jiān","xiān"],ans:0}]
    },
    {
        id: 182, category: '六年级', title: "短歌行", author: "东汉 · 曹操", image: "短歌行.png",
        content: [{t:"对酒当歌，人生几何！",m:"一边喝酒一边高歌，人生有多少日子！"},{t:"譬如朝露，去日苦多。",m:"好比早晨的露水，过去的日子太多。"},{t:"慨当以慷，忧思难忘。",m:"气氛激昂慷慨，忧愁难以忘怀。"},{t:"何以解忧？唯有杜康。",m:"靠什么来排解忧愁？只有喝酒。"},{t:"青青子衿，悠悠我心。",m:"那穿着青领的学子，令我朝思暮想。"},{t:"周公吐哺，天下归心。",m:"像周公那样礼贤下士，天下人心归附。"}],
        translation: "(节选)一边喝酒一边高歌，人生有多少日子！好比早晨的露水一样短暂，过去的日子实在太多。靠什么来排解忧愁？只有喝酒。那穿着青领的贤才，令我朝思暮想。我要像周公那样礼贤下士，让天下人心都归附于我。这首诗抒发了曹操渴望招纳贤才、建功立业的宏愿。",
        quiz: [{q:"“几何”的意思是？",options:["数学","多少/没多久","几个","什么形状"],ans:1},{q:"“朝露”比喻？",options:["露水","人生短暂","早晨","露面"],ans:1},{q:"“杜康”代指？",options:["人名","酒","药","食物"],ans:1},{q:"“青青子衿”出自？",options:["诗经","论语","楚辞","汉书"],ans:0},{q:"“周公吐哺”是为了？",options:["吃饭","呕吐","接待贤才","说话"],ans:2}]
    },
    {
        id: 183, category: '六年级', title: "水调歌头", author: "宋 · 苏轼", image: "水调歌头.png",
        content: [
            {t:"明月几时有？把酒问青天。", m:"明月什么时候才有？举着酒杯询问青天。"},
            {t:"不知天上宫阙，今夕是何年。", m:"不知道天上的宫殿，今晚是哪一年。"},
            {t:"我欲乘风归去，又恐琼楼玉宇，", m:"我想驾着风回到天上去，又怕那美玉砌成的楼宇。"},
            {t:"高处不胜寒。", m:"那里太高太冷，让人受不了。"},
            {t:"起舞弄清影，何似在人间。", m:"在月下翩翩起舞，玩赏着自己的清影，哪里像在人间呢！"},
            {t:"转朱阁，低绮户，照无眠。", m:"月光转过朱红的楼阁，低低地穿过雕花的窗户，照着没有睡意的人。"},
            {t:"不应有恨，何事长向别时圆？", m:"月亮不该对人有什么怨恨吧，为什么偏偏在人们离别时变圆呢？"},
            {t:"人有悲欢离合，月有阴晴圆缺，", m:"人有悲欢离合的变迁，月有阴晴圆缺的转换。"},
            {t:"此事古难全。", m:"这种事自古以来就很难周全。"},
            {t:"但愿人长久，千里共婵娟。", m:"只希望亲人能平安健康，虽然相隔千里，也能共享这美好的月光。"}
        ],
        translation: "这首词是苏轼中秋望月怀人之作。此时他喝得大醉，举杯向天，想象天上的宫阙虽好却不胜寒冷，不如在人间起舞弄影。月光照着无眠的人，引发了对离别的感伤。最后悟出人生哲理：悲欢离合自古难全，只愿亲人平安长久，隔着千里共赏明月。全词意境豪放而阔大，充满浪漫主义色彩。",
        quiz: [
            {q:"这首词是苏轼在哪个节日写的？", options:["元宵节", "中秋节", "端午节", "重阳节"], ans: 1},
            {q:"“婵娟”在词中代指？", options:["美女", "月亮", "嫦娥", "鲜花"], ans: 1},
            {q:"“此事古难全”的“此事”指？", options:["考取功名", "人有悲欢离合，月有阴晴圆缺", "长生不老", "修建楼阁"], ans: 1},
            {q:"这首词主要是怀念谁？", options:["父亲", "妻子", "弟弟苏辙(子由)", "朋友"], ans: 2},
            {q:"“高处不胜寒”蕴含了什么寓意？", options:["山上很冷", "出世与入世的矛盾/孤高之寒", "衣服穿少了", "冬天到了"], ans: 1}
        ]
    },
    {
        id: 184, category: '六年级', title: "念奴娇·赤壁怀古", author: "宋 · 苏轼", image: "念奴娇.png",
        content: [{t:"大江东去，浪淘尽，千古风流人物。",m:"大江向东流去，浪花淘尽了千古英雄。"},{t:"故垒西边，人道是，三国周郎赤壁。",m:"旧营垒西边，人说是三国周瑜大败曹军的赤壁。"},{t:"乱石穿空，惊涛拍岸，卷起千堆雪。",m:"陡峭石壁刺破天空，巨浪拍岸，卷起千堆雪白浪花。"},{t:"江山如画，一时多少豪杰。",m:"江山如画，一时涌现多少豪杰。"},{t:"人生如梦，一尊还酹江月。",m:"人生就像一场梦，倒一杯酒祭奠江中明月。"}],
        translation: "(节选)大江浩浩荡荡向东流去，浪花淘尽了千古以来的风流人物。旧营垒的西边，人们说是三国周瑜大败曹军的赤壁。陡峭的石壁刺破天空，巨浪拍打着江岸，卷起千堆雪白的浪花。江山如画，一时涌现了多少英雄豪杰。人生就像一场梦，倒一杯酒祭奠江中明月。这首词抒发了对往昔英雄的缅怀和时光流逝的感叹。",
        quiz: [{q:"“风流人物”是指？",options:["不正经的人","英雄豪杰","文人","帅哥"],ans:1},{q:"“千堆雪”比喻？",options:["雪花","浪花","棉花","石头"],ans:1},{q:"“周郎”是指？",options:["周瑜","周润发","周公","姓周的郎中"],ans:0},{q:"“酹(lèi)”的意思是？",options:["流泪","把酒洒在地上祭奠","累了","雷"],ans:1},{q:"这首词属于？",options:["婉约派","豪放派","田园派","花间派"],ans:1}]
    },
    {
        id: 185, category: '六年级', title: "满江红", author: "宋 · 岳飞", image: "满江红.png",
        content: [{t:"怒发冲冠，凭栏处、潇潇雨歇。",m:"愤怒得头发直竖冲开帽子，独自登高凭栏，雨刚刚停。"},{t:"三十功名尘与土，",m:"三十年的功名如同尘土。"},{t:"八千里路云和月。",m:"八千里征途只有云月相伴。"},{t:"莫等闲、白了少年头，空悲切。",m:"不要虚度年华，等到白了少年头，白白悲伤。"}],
        translation: "(节选)愤怒得头发直竖冲开帽子，独自登高凭栏，骤雨刚刚停歇。三十年的功名如同尘土微不足道，八千里征途只有云和月相伴。千万不要虚度年华，等到头发白了，才后悔悲伤。这首词表现了岳飞精忠报国的英雄气概。",
        quiz: [{q:"“怒发冲冠”形容？",options:["头发长","帽子小","极度愤怒","发型乱"],ans:2},{q:"“尘与土”意思是？",options:["灰尘和泥土","微不足道","很脏","土地"],ans:1},{q:"“莫等闲”的意思是？",options:["不要等人","不要闲着","不要虚度光阴/轻易","不要等"],ans:2},{q:"这首词的主题是？",options:["报国/爱国","看雨","跑步","理发"],ans:0},{q:"岳飞是哪个朝代的名将？",options:["唐朝","宋朝","元朝","明朝"],ans:1}]
    },
    {
        id: 186, category: '六年级', title: "江城子·密州出猎", author: "宋 · 苏轼", image: "江城子.png",
        content: [{t:"老夫聊发少年狂，",m:"我姑且发一发少年的狂劲。"},{t:"左牵黄，右擎苍，",m:"左手牵着黄犬，右手托着苍鹰。"},{t:"锦帽貂裘，千骑卷平冈。",m:"戴锦帽穿貂裘，率几千骑兵席卷山冈。"},{t:"会挽雕弓如满月，",m:"定要拉开雕弓像满月一样。"},{t:"西北望，射天狼。",m:"对准西北方，射落天狼星。"}],
        translation: "(节选)我姑且发一发少年的狂劲，左手牵着黄犬，右手托着苍鹰。戴锦帽穿貂裘，率领几千骑兵像风一样席卷山冈。我定要拉开雕弓像满月一样，对准西北方，射落那天狼星（喻指敌人）。这首词表达了词人渴望报效国家、抗击敌人的豪情。",
        quiz: [{q:"“聊”的意思是？",options:["聊天","姑且/暂且","无聊","依靠"],ans:1},{q:"“黄”和“苍”指？",options:["黄色和苍老","黄犬和苍鹰","颜色","黄天"],ans:1},{q:"“卷平冈”形容？",options:["卷起来","风大","气势雄壮/速度快","山冈平坦"],ans:2},{q:"“天狼”喻指？",options:["星星","狼","西北方的敌人/侵略者","天上的狼"],ans:2},{q:"这首词的风格是？",options:["婉约","豪放","悲伤","幽默"],ans:1}]
    },
    {
        id: 187, category: '六年级', title: "无题", author: "唐 · 李商隐", image: "无题.png",
        content: [{t:"相见时难别亦难，",m:"相见多么困难，离别更是难堪。"},{t:"东风无力百花残。",m:"东风无力，百花凋残。"},{t:"春蚕到死丝方尽，",m:"春蚕直到死，丝才吐尽。"},{t:"蜡炬成灰泪始干。",m:"蜡烛烧成灰，蜡泪才干。"}],
        translation: "(节选)相见多么困难，离别更是难堪，东风无力，百花凋残。春蚕直到死，丝才吐尽；蜡烛烧成灰，蜡泪才干。这首诗描写了坚贞不渝的爱情，现在的“春蚕”句也常用来形容奉献精神。",
        quiz: [{q:"“别亦难”是因为？",options:["路难走","难舍难分","被人阻拦","天气不好"],ans:1},{q:"“丝”谐音？",options:["死","思(相思)","似","私"],ans:1},{q:"“泪”是指？",options:["眼泪","烛泪","雨水","露水"],ans:1},{q:"这首诗主要描写？",options:["养蚕","做蜡烛","坚贞的爱情/相思","春天"],ans:2},{q:"现在常用来赞美？",options:["老师/奉献者","蚕农","工人","医生"],ans:0}]
    },
    {
        id: 188, category: '六年级', title: "相见欢", author: "五代 · 李煜", image: "相见欢.png",
        content: [{t:"无言独上西楼，月如钩。",m:"默默无言独自登上西楼，月亮像弯钩。"},{t:"寂寞梧桐深院锁清秋。",m:"寂寞的梧桐，深院锁住了清秋。"},{t:"剪不断，理还乱，是离愁。",m:"剪不断，理还乱的是离愁。"},{t:"别是一般滋味在心头。",m:"别有一番滋味在心头。"}],
        translation: "默默无言独自登上西楼，月亮像弯钩一样。寂寞的梧桐树，深深的庭院锁住了清冷的秋色。剪不断，理还乱的是离愁，别有一番滋味在心头。这首词抒发了亡国之君的离愁别绪。",
        quiz: [{q:"“无言”表现了？",options:["不想说话","哑巴","孤独沉重的心情","没人说话"],ans:2},{q:"“锁清秋”形容？",options:["把秋天锁住","凄凉孤寂的秋意","锁门","秋天很美"],ans:1},{q:"“剪不断，理还乱”比喻？",options:["头发","丝线","离愁/愁绪","杂草"],ans:2},{q:"“滋味”是指？",options:["味道","愁苦的滋味","好吃的","酸味"],ans:1},{q:"作者李煜是？",options:["南唐后主","唐太宗","宋徽宗","清朝皇帝"],ans:0}]
    },
    {
        id: 189, category: '六年级', title: "丑奴儿·书博山道中壁", author: "宋 · 辛弃疾", image: "丑奴儿.png",
        content: [{t:"少年不识愁滋味，",m:"少年时不知道什么是愁苦的滋味。"},{t:"爱上层楼。",m:"喜欢登上高楼。"},{t:"为赋新词强说愁。",m:"为了写新词勉强说自己很忧愁。"},{t:"而今识尽愁滋味，",m:"现在尝尽了愁苦的滋味。"},{t:"欲说还休。",m:"想说却又不想说了。"},{t:"却道天凉好个秋。",m:"却说：“好凉爽的一个秋天啊！”"}],
        translation: "少年时不知道什么是愁苦的滋味，喜欢登上高楼，为了写新词勉强说自己很忧愁。现在尝尽了愁苦的滋味，想说却又不想说了，只好说：“好凉爽的一个秋天啊！”这首词表现了词人备受压抑、有苦难言的深沉情感。",
        quiz: [{q:"“不识”的意思是？",options:["不认识","不知道/不懂","不识字","不喜欢"],ans:1},{q:"少年为什么“强说愁”？",options:["真的愁","为了写诗/无病呻吟","模仿别人","心情不好"],ans:1},{q:"“识尽”的意思是？",options:["认识完了","尝够了/体验深","学识渊博","尽头"],ans:1},{q:"为什么“欲说还休”？",options:["忘了","有苦难言/深沉","没话说","怕人听见"],ans:1},{q:"最后一句表达了？",options:["天气凉爽","开心","含蓄的悲凉/无奈","喜欢秋天"],ans:2}]
    },
    {
        id: 190, category: '六年级', title: "朝天子·咏喇叭", author: "明 · 王磐", image: "朝天子_咏喇叭.png",
        content: [{t:"喇叭，唢呐，",m:"喇叭，唢呐。"},{t:"曲儿小腔儿大。",m:"曲子虽小，腔调却很大。"},{t:"官船来往乱如麻，",m:"官船来来往往乱得像麻一样。"},{t:"全仗你抬声价。",m:"全靠你去抬高声价。"},{t:"眼见的吹翻了这家，",m:"眼看着吹翻了这一家。"},{t:"吹伤了那家，",m:"吹伤了那一家。"},{t:"只吹的水尽鹅飞罢！",m:"直吹得水流干、鹅飞跑才罢休！"}],
        translation: "喇叭，唢呐，曲子虽小，腔调却很大。官船来来往往乱得像麻一样，全靠你去吹吹打打抬高声价。眼看着吹翻了这一家，吹伤了那一家，直吹得水流干、鹅飞跑才罢休！这首散曲借咏喇叭讽刺了宦官作威作福、鱼肉百姓的罪行。",
        quiz: [{q:"“腔儿大”比喻？",options:["声音大","官威大/架子大","乐器大","嘴巴大"],ans:1},{q:"“乱如麻”形容？",options:["麻绳乱","官船多且乱","心情乱","头发乱"],ans:1},{q:"“抬声价”是指？",options:["卖得贵","虚张声势/摆谱","唱歌","抬东西"],ans:1},{q:"“吹翻、吹伤”是指？",options:["风大","乐器声音大","害得百姓倾家荡产","吹牛"],ans:2},{q:"“水尽鹅飞”比喻？",options:["风景不好","百姓被榨干/破产","鹅飞走了","水干了"],ans:1}]
    },
    {
        id: 191, category: '六年级', title: "关雎", author: "诗经", image: "关雎.png",
        content: [{t:"关关雎鸠，在河之洲。",m:"关关鸣叫的雎鸠鸟，在河中的小洲上。"},{t:"窈窕淑女，君子好逑。",m:"美丽贤淑的女子，是君子的好配偶。"},{t:"求之不得，寤寐思服。",m:"追求她却得不到，日夜都在思念。"},{t:"悠哉悠哉，辗转反侧。",m:"思念深长啊，翻来覆去睡不着。"}],
        translation: "(节选)关关鸣叫的雎鸠鸟，在河中的小洲上。美丽贤淑的女子，是君子的好配偶。追求她却得不到，日夜都在思念。思念深长啊，翻来覆去睡不着。这是《诗经》的第一篇，描写了男子对女子的爱慕和追求。",
        quiz: [{q:"“关关”是？",options:["关门","鸟叫声","地名","难关"],ans:1},{q:"“洲”是指？",options:["大洲","水中陆地","稀饭","周围"],ans:1},{q:"“淑女”是指？",options:["熟人","美丽贤淑的女子","书女","数数"],ans:1},{q:"“寤寐”是指？",options:["醒着和睡着/日夜","屋美","妩媚","睡觉"],ans:0},{q:"这首诗表达了？",options:["友情","爱情/相思","亲情","爱鸟"],ans:1}]
    },
    {
        id: 192, category: '六年级', title: "蒹葭", author: "诗经", image: "蒹葭.png",
        content: [{t:"蒹葭苍苍，白露为霜。",m:"芦苇密密苍苍，白露凝结成霜。"},{t:"所谓伊人，在水一方。",m:"我心爱的那个人，在河的那一边。"},{t:"溯洄从之，道阻且长。",m:"逆流而上去找她，道路艰难又漫长。"},{t:"溯游从之，宛在水中央。",m:"顺流而下去找她，仿佛就在水中央。"}],
        translation: "(节选)芦苇密密苍苍，白露凝结成霜。我心爱的那个人，在河的那一边。逆流而上去找她，道路艰难又漫长。顺流而下去找她，仿佛就在水中央。这首诗描写了对意中人深深的思念和求而不得的惆怅。",
        quiz: [{q:"“蒹葭(jiān jiā)”是指？",options:["芦苇","宝剑","加法","家乡"],ans:0},{q:"“伊人”是指？",options:["那个人/意中人","伊拉克人","依恋","一人"],ans:0},{q:"“在水一方”是指？",options:["在水里","在水的另一边","在水房","玩水"],ans:1},{q:"“溯洄”的意思是？",options:["顺流而下","逆流而上","回家","来回"],ans:1},{q:"这首诗的意境是？",options:["热闹","朦胧/凄迷","恐怖","开心"],ans:1}]
    },
    {
        id: 193, category: '六年级', title: "青玉案·元夕", author: "宋 · 辛弃疾", image: "青玉案.png",
        content: [{t:"东风夜放花千树，",m:"东风吹开了千树银花(灯火)。"},{t:"更吹落，星如雨。",m:"还吹落了如雨的繁星(烟火)。"},{t:"宝马雕车香满路。",m:"宝马雕车行驶在香气弥漫的路上。"},{t:"众里寻他千百度，",m:"在人群中寻找她千百回。"},{t:"蓦然回首，",m:"猛然回头一看。"},{t:"那人却在，灯火阑珊处。",m:"那人却在灯火稀疏的地方。"}],
        translation: "(节选)东风吹开了千树银花（元宵灯火），还吹落了如雨的繁星（烟火）。宝马雕车行驶在香气弥漫的路上。在人群中寻找她千百回，猛然回头一看，那人却在灯火稀疏冷落的地方。这首词描写了元宵节的盛况，最后一句寓意高洁自守，不与世俗同流合污。",
        quiz: [{q:"“花千树”形容？",options:["真的花","元宵节的灯火/烟花","种树","花钱"],ans:1},{q:"“星如雨”形容？",options:["流星雨","烟花/灯火","下雨","星星掉下来"],ans:1},{q:"“元夕”是指？",options:["元旦","除夕","元宵节","七夕"],ans:2},{q:"“阑珊”的意思是？",options:["灿烂","稀疏/零落","栏杆","蓝色"],ans:1},{q:"“那人”代表？",options:["普通人","作者/高洁自守的人","坏人","家人"],ans:1}]
    },
    {
        id: 194, category: '六年级', title: "游园不值", author: "宋 · 叶绍翁", image: "游园不值.png",
        content: [{t:"应怜屐齿印苍苔，",m:"大概是爱惜园中的青苔怕被木鞋踩坏。"},{t:"小扣柴扉久不开。",m:"轻轻敲那柴门很久也没人来开。"},{t:"春色满园关不住，",m:"可是满园的春色是关不住的。"},{t:"一枝红杏出墙来。",m:"一枝红色的杏花已经伸出墙外来了。"}],
        translation: "大概是主人爱惜园中的青苔，怕被我的木鞋踩坏了，所以我轻轻敲那柴门，很久也没人来开。但是，这满园的春色是关不住的，你看，一枝红艳艳的杏花已经伸出墙外来了。这首诗告诉我们要有发现美的眼睛，新事物是阻挡不住的。",
        quiz: [{q:"“不值”的意思是？",options:["不值得","不值钱","没有遇到(主人)","不值班"],ans:2},{q:"“小扣”是？",options:["扣子","轻轻敲","小气","扣分"],ans:1},{q:"为什么不开门？",options:["主人不在","诗人猜测是为了护苔","主人不想见","听不见"],ans:1},{q:"“红杏出墙”说明？",options:["杏树长歪了","春色关不住/生命力旺盛","墙倒了","杏子熟了"],ans:1},{q:"这首诗写的是哪个季节？",options:["春","夏","秋","冬"],ans:0}]
    },
    {
        id: 195, category: '六年级', title: "别云间", author: "明 · 夏完淳", image: "别云间.png",
        content: [{t:"三年羁旅客，",m:"三年来我在外漂泊做客。"},{t:"今日又南冠。",m:"今天又成了囚徒。"},{t:"无限河山泪，",m:"面对无限河山流下泪水。"},{t:"谁言天地宽！",m:"谁说天地宽广无边！"},{t:"已知泉路近，",m:"已经知道黄泉路近了。"},{t:"欲别故乡难。",m:"想离别故乡却很难。"},{t:"毅魄归来日，",m:"当我的魂魄归来之日。"},{t:"灵旗空际看。",m:"看那抗清的义旗在空中飘扬。"}],
        translation: "三年来我在外漂泊做客，今天又成了囚徒。面对无限破碎的河山流下泪水，谁说天地宽广无边（竟无我容身之地）！已经知道死期将近，想离别故乡却很难。当我的魂魄归来之日，我要在空中看那抗清的义旗飘扬。这首诗是少年英雄夏完淳的绝命诗，表达了誓死不屈的爱国精神。",
        quiz: [{q:"“南冠”是指？",options:["南方的帽子","囚徒/俘虏","南方冠军","做官"],ans:1},{q:"“泉路”是指？",options:["泉水路","黄泉路/死期","山路","权路"],ans:1},{q:"“毅魄”是指？",options:["坚毅的魂魄","一种鬼","害怕","一个人"],ans:0},{q:"作者夏完淳是？",options:["少年英雄","老头","唐朝人","宋朝人"],ans:0},{q:"这首诗表达了？",options:["怕死","誓死不屈/爱国","想回家","风景"],ans:1}]
    },
    {
        id: 196, category: '六年级', title: "送元二使安西", author: "唐 · 王维", image: "送元二使安西.png",
        content: [{t:"渭城朝雨浥轻尘，",m:"清晨的细雨打湿了渭城的尘土。"},{t:"客舍青青柳色新。",m:"客舍边的柳树呈现出清新的绿色。"},{t:"劝君更尽一杯酒，",m:"真诚地劝您再干一杯酒。"},{t:"西出阳关无故人。",m:"向西出了阳关，就再也没有老朋友了。"}],
        translation: "清晨的细雨打湿了渭城的尘土，客舍旁的柳树被雨水洗刷得格外清新。请您再干了这杯酒吧，因为向西出了阳关之后，就再也见不到老朋友了。这首诗是千古传诵的送别名篇。",
        quiz: [{q:"“浥”的意思是？",options:["湿润","干燥","淹没","哭泣"],ans:0},{q:"“更尽”的意思是？",options:["倒掉","喝完/再喝","尽头","更加"],ans:1},{q:"“故人”是指？",options:["敌人","死去的人","老朋友","故意的人"],ans:2},{q:"这是一首什么诗？",options:["写景诗","送别诗","战争诗","咏物诗"],ans:1},{q:"诗人送朋友去哪里？",options:["安西","渭城","阳关","江南"],ans:0}]
    },
    {
        id: 197, category: '五年级', title: "凉州词", author: "唐 · 王之涣", image: "凉州词_王之涣.png",
        content: [{t:"黄河远上白云间，",m:"黄河远远流去，好像通向了白云之间。"},{t:"一片孤城万仞山。",m:"一座孤单的城池耸立在万仞高山之中。"},{t:"羌笛何须怨杨柳，",m:"羌笛何必吹奏哀怨的《折杨柳》曲呢？"},{t:"春风不度玉门关。",m:"春风是吹不过这荒凉的玉门关的。"}],
        translation: "黄河远远流去，仿佛通向了白云之间；一座孤城耸立在万仞高山之中。羌笛何必吹奏哀怨的《折杨柳》曲呢？因为春风根本吹不到这荒凉的玉门关啊。这首诗描写了边塞荒凉的景色，含蓄地表达了对戍边将士的同情。",
        quiz: [{q:"“万仞”形容？",options:["一万个人","山非常高","刀很快","路很远"],ans:1},{q:"“孤城”指的是？",options:["孤独的城市","玉门关","北京","长安"],ans:1},{q:"“杨柳”在这里指？",options:["柳树","杨树","《折杨柳》曲调","姓杨和姓柳"],ans:2},{q:"“春风不度”意味着？",options:["风太小","这里荒凉寒冷","春天没来","关门了"],ans:1},{q:"这首诗也是一首？",options:["边塞诗","田园诗","讽刺诗","情诗"],ans:0}]
    },
    {
        id: 198, category: '四年级', title: "清平乐·村居", author: "宋 · 辛弃疾", image: "清平乐_村居.png",
        content: [{t:"茅檐低小，",m:"草屋的屋檐又低又小。"},{t:"溪上青青草。",m:"溪边长满了青翠的小草。"},{t:"醉里吴音相媚好，",m:"带着醉意听到吴地口音的对话好温柔。"},{t:"白发谁家翁媪？",m:"那是谁家的白发老翁和老妇？"},{t:"大儿锄豆溪东，",m:"大儿子在小溪东边的豆田锄草。"},{t:"中儿正织鸡笼。",m:"二儿子正在编织鸡笼。"},{t:"最喜小儿亡赖，",m:"最令人喜爱的是顽皮的小儿子。"},{t:"溪头卧剥莲蓬。",m:"趴在溪头剥着莲蓬吃。"}],
        translation: "草屋的屋檐低小，溪边长满了青草。带着醉意听到吴地口音的对话是那样温柔，原来是那满头白发的老翁和老妇。大儿子在溪东锄草，二儿子在编织鸡笼。最可爱的是那顽皮的小儿子，正趴在溪头剥着莲蓬吃。这首词描绘了农村和平宁静的生活。",
        quiz: [{q:"“翁媪”指的是？",options:["老翁和老妇","主人和客人","翁姑","鸟叫声"],ans:0},{q:"“亡赖”通“无赖”，意思是？",options:["坏蛋","流氓","顽皮/可爱","不讲理"],ans:2},{q:"“相媚好”形容？",options:["互相讨好","声音柔和亲切","长得好看","天气好"],ans:1},{q:"小儿子在做什么？",options:["锄地","织鸡笼","剥莲蓬","睡觉"],ans:2},{q:"这首词表达了作者？",options:["对农村生活的喜爱","对城市的向往","对贫穷的抱怨","想喝酒"],ans:0}]
    },
    {
        id: 199, category: '六年级', title: "天净沙·秋思", author: "元 · 马致远", image: "天净沙_秋思.png",
        content: [{t:"枯藤老树昏鸦，",m:"枯藤缠绕着老树，黄昏时乌鸦栖息。"},{t:"小桥流水人家，",m:"小桥下流水潺潺，旁边有几户人家。"},{t:"古道西风瘦马。",m:"古老的道路上，秋风萧瑟，一匹瘦马。"},{t:"夕阳西下，",m:"夕阳向西落下。"},{t:"断肠人在天涯。",m:"漂泊的游子在遥远的天涯。"}],
        translation: "枯藤缠绕着老树，黄昏时的乌鸦在树上栖息。小桥下流水潺潺，旁边有几户人家。在古老的道路上，秋风萧瑟，诗人骑着一匹瘦马艰难前行。夕阳西下，悲伤断肠的游子漂泊在遥远的天涯。这首曲被誉为“秋思之祖”。",
        quiz: [{q:"“天净沙”是？",options:["诗题","曲牌名","地名","沙子"],ans:1},{q:"“昏鸦”是指？",options:["昏倒的乌鸦","黄昏时的乌鸦","黑色的鸭子","老鹰"],ans:1},{q:"“断肠人”形容？",options:["肚子疼","极度悲伤思乡的人","受伤的人","生病的人"],ans:1},{q:"这首曲主要表达了？",options:["秋天的美","游子的思乡之情","马很瘦","树很老"],ans:1},{q:"一共列举了多少种景物？",options:["3种","5种","9种","12种"],ans:2}]
    },
    // 一年级
    {
        id: 200, category: '一年级', title: "苔", author: "清 · 袁枚", image: "苔.png",
        content: [{t:"白日不到处，",m:"阳光照不到的地方。"},{t:"青春恰自来。",m:"春天依然悄悄地来了。"},{t:"苔花如米小，",m:"苔藓的花虽然像米粒一样小。"},{t:"也学牡丹开。",m:"也学着牡丹花那样傲然绽放。"}],
        translation: "在阳光照不到的阴暗角落，春天依然悄悄地来了。苔藓的花虽然像米粒一样微小，但它也学着雍容华贵的牡丹那样傲然绽放。这首诗赞美了微小生命顽强的生命力和自信。",
        quiz: [{q:"“白日”是指？",options:["白天","阳光","白色日子","太阳神"],ans:1},{q:"“青春”在这里指？",options:["青年时期","春天/生机","青色的春草","年轻"],ans:1},{q:"苔花的大小像？",options:["豆子","米粒","牡丹","芝麻"],ans:1},{q:"这首诗赞美了？",options:["牡丹的美丽","阳光的温暖","平凡生命的顽强与自信","阴暗的角落"],ans:2},{q:"“恰”的意思是？",options:["恰好/恰恰","卡住","融洽","惊讶"],ans:0}]
    },
    {
        id: 201, category: '一年级', title: "哥舒歌", author: "唐 · 西鄙人", image: "哥舒歌.png",
        content: [{t:"北斗七星高，",m:"天上的北斗七星高高挂。"},{t:"哥舒夜带刀。",m:"哥舒翰将军夜里佩带宝刀。"},{t:"至今窥牧马，",m:"到现在吐蕃族还来牧马窥探。"},{t:"不敢过临洮。",m:"但从来不敢越过临洮。"}],
        translation: "天上的北斗七星高高挂，哥舒翰将军夜里佩带宝刀守卫边疆。到现在吐蕃族虽然还来牧马窥探，但从来不敢越过临洮一步。这首民歌赞颂了哥舒翰将军的威名和守边的功绩。",
        quiz: [{q:"“西鄙人”是指？",options:["西部卑鄙的人","西部边境的民歌作者","人名","西方人"],ans:1},{q:"“哥舒”是指？",options:["哥哥舒服","哥舒翰将军","一种兵器","地名"],ans:1},{q:"“窥”的意思是？",options:["偷看/窥探","规矩","盔甲","亏损"],ans:0},{q:"敌人为什么“不敢过临洮”？",options:["路不好走","怕迷路","惧怕哥舒翰将军","临洮没草"],ans:2},{q:"这首诗赞颂了？",options:["北斗七星","宝刀","名将守边","牧马人"],ans:2}]
    },
    {
        id: 202, category: '二年级', title: "雨晴", author: "唐 · 王驾", image: "雨晴.png",
        content: [{t:"雨前初见花间蕊，",m:"雨前初次见到花间露出花蕊。"},{t:"雨后全无叶底花。",m:"雨后叶子底下竟然再也找不到花了。"},{t:"蜂蝶纷纷过墙去，",m:"蜜蜂和蝴蝶纷纷飞过墙去。"},{t:"却疑春色在邻家。",m:"让人怀疑春色是不是跑到了邻居家。"}],
        translation: "雨前初次见到花间露出花蕊，雨后叶子底下竟然再也找不到花了。蜜蜂和蝴蝶纷纷飞过墙去，让人怀疑春色是不是跑到了邻居家。这首诗描写了春雨过后的景色，充满了生活情趣。",
        quiz: [{q:"雨后花怎么样了？",options:["开得更好","全没了/落尽","变色了","长大了"],ans:1},{q:"蜂蝶为什么要过墙？",options:["逃跑","追逐春色/邻家有花","墙那边暖和","迷路了"],ans:1},{q:"“却疑”的意思是？",options:["退却","反而怀疑","确定","迟疑"],ans:1},{q:"这首诗表达了诗人？",options:["对春逝的惋惜和情趣","对蜜蜂的讨厌","对邻居的嫉妒","对下雨的愤怒"],ans:0},{q:"诗中哪个字体现了“雨晴”？",options:["见","无","疑","纷纷"],ans:1}]
    },
    {
        id: 203, category: '二年级', title: "拜新月", author: "唐 · 李端", image: "拜新月.png",
        content: [{t:"开帘见新月，",m:"打开帘子看见新月。"},{t:"便即下阶拜。",m:"立即走下台阶去拜月。"},{t:"细语人不闻，",m:"小声低语别人听不见。"},{t:"北风吹裙带。",m:"北风吹动着她的裙带。"}],
        translation: "打开帘子看见新月，立即走下台阶去拜月。她小声低语祈祷，别人都听不见，只有北风吹动着她的裙带。这首诗描写了少女拜月祈祷时的情态。",
        quiz: [{q:"“新月”是指？",options:["满月","农初的弯月","半月","月饼"],ans:1},{q:"“便即”的意思是？",options:["便利","立即/马上","即使","便饭"],ans:1},{q:"少女为什么“细语”？",options:["嗓子疼","怕人听见心事/祈祷","自言自语","没说话"],ans:1},{q:"这首诗描写的人物是？",options:["老妇人","少女","将军","儿童"],ans:1},{q:"“北风吹裙带”衬托了？",options:["天气冷","衣服漂亮","少女的专注和姿态","风很大"],ans:2}]
    },
    {
        id: 204, category: '三年级', title: "晚春", author: "唐 · 韩愈", image: "晚春.png",
        content: [{t:"草树知春不久归，",m:"花草树木知道春天不久就要归去。"},{t:"百般红紫斗芳菲。",m:"想尽办法吐艳争芳。"},{t:"杨花榆荚无才思，",m:"杨花榆荚虽然没有才思。"},{t:"惟解漫天作雪飞。",m:"也只懂得像雪花一样漫天飞舞。"}],
        translation: "花草树木知道春天不久就要归去，所以想尽办法吐艳争芳。杨花榆荚虽然没有才思，但也只懂得像雪花一样漫天飞舞，想留住春天。这首诗运用拟人手法，描写了晚春时节万物争春的景象。",
        quiz: [{q:"“不久归”是指？",options:["不回家","春天快要结束","马上回来","死去"],ans:1},{q:"“百般”的意思是？",options:["一百种","各种各样/想尽办法","一般","搬东西"],ans:1},{q:"“无才思”是指？",options:["笨","没有才情/不会开花","没思想","没材料"],ans:1},{q:"杨花榆荚在做什么？",options:["睡觉","漫天飞舞/珍惜春天","打架","枯萎"],ans:1},{q:"这首诗运用了什么修辞？",options:["拟人","比喻","夸张","排比"],ans:0}]
    },
    {
        id: 205, category: '三年级', title: "春夜洛城闻笛", author: "唐 · 李白", image: "春夜洛城闻笛.png",
        content: [{t:"谁家玉笛暗飞声，",m:"谁家的玉笛在暗夜里传来声音。"},{t:"散入春风满洛城。",m:"散落在春风里，飘满了洛阳城。"},{t:"此夜曲中闻折柳，",m:"今夜在曲子中听到了《折杨柳》。"},{t:"何人不起故园情。",m:"谁能不勾起思念故乡的情怀呢。"}],
        translation: "谁家的玉笛在暗夜里传来声音，散落在春风里，飘满了洛阳城。今夜在曲子中听到了《折杨柳》的离别之音，谁能不勾起思念故乡的情怀呢？这首诗表达了诗人客居洛阳时的思乡之情。",
        quiz: [{q:"“暗飞声”是指？",options:["声音很小","夜间传来的声音/不知何处来","暗号","飞鸟的声音"],ans:1},{q:"“洛城”是指？",options:["洛阳","长安","扬州","成都"],ans:0},{q:"“折柳”是指？",options:["折断柳树","《折杨柳》曲/代表离别","种柳树","柳条断了"],ans:1},{q:"“故园情”是指？",options:["想去公园","思乡之情","园丁","爱情"],ans:1},{q:"听到笛声，诗人感到？",options:["快乐","伤感/思乡","愤怒","吵闹"],ans:1}]
    },

    // 四年级
    {
        id: 206, category: '四年级', title: "逢入京使", author: "唐 · 岑参", image: "逢入京使.png",
        content: [{t:"故园东望路漫漫，",m:"向东遥望故园，路途漫长。"},{t:"双袖龙钟泪不干。",m:"双袖沾满了擦不干的眼泪。"},{t:"马上相逢无纸笔，",m:"在马上相逢没有纸笔。"},{t:"凭君传语报平安。",m:"托你带个口信家里报个平安。"}],
        translation: "向东遥望故园，路途漫长，思乡的眼泪沾湿了双袖，怎么擦也擦不干。在马上匆匆相逢，没有纸笔写信，只好托你带个口信给家里报个平安。这首诗描写了诗人在西行途中偶遇入京使者，托其捎口信回家的情景。",
        quiz: [{q:"“故园”在诗人的哪边？",options:["东边","西边","南边","北边"],ans:0},{q:"“龙钟”在这里形容？",options:["老态龙钟","身体重","沾湿/泪流不止的样子","钟声"],ans:2},{q:"为什么“无纸笔”？",options:["买不起","行军匆忙/马上相逢","忘了带","丢了"],ans:1},{q:"“传语”的意思是？",options:["传说","传达口信","说话","外语"],ans:1},{q:"诗人想报什么？",options:["发财","升官","平安","生病"],ans:2}]
    },
    {
        id: 207, category: '四年级', title: "登飞来峰", author: "宋 · 王安石", image: "登飞来峰.png",
        content: [{t:"飞来山上千寻塔，",m:"飞来峰上耸立着高高的宝塔。"},{t:"闻说鸡鸣见日升。",m:"听说鸡叫时就能看见太阳升起。"},{t:"不畏浮云遮望眼，",m:"不怕浮云遮住远望的视线。"},{t:"自缘身在最高层。",m:"只因为身在塔的最高层。"}],
        translation: "飞来峰上耸立着高高的宝塔，听说鸡叫时就能看见太阳升起。我不怕浮云遮住远望的视线，只因为我身在塔的最高层。这首诗表现了诗人高瞻远瞩、对前途充满信心的豪情和抱负。",
        quiz: [{q:"“千寻”形容？",options:["寻找一千次","极高","一千个人","很长"],ans:1},{q:"“闻说”的意思是？",options:["听说","闻到","说话","新闻"],ans:0},{q:"“浮云”比喻？",options:["天上的云","困难/奸佞小人","灰尘","雾气"],ans:1},{q:"为什么“不畏浮云”？",options:["视力好","有眼镜","身在最高层/站得高","云散了"],ans:2},{q:"这首诗蕴含了什么道理？",options:["要早起","站得高看得远","塔很高","云很美"],ans:1}]
    },
    {
        id: 208, category: '四年级', title: "劝学", author: "唐 · 颜真卿", image: "劝学.png",
        content: [{t:"三更灯火五更鸡，",m:"半夜三更还在读书，五更鸡叫又起。"},{t:"正是男儿读书时。",m:"这正是男儿读书的大好时光。"},{t:"黑发不知勤学早，",m:"少年黑发时不知道早起勤学。"},{t:"白首方悔读书迟。",m:"老了白头时才后悔读书太迟。"}],
        translation: "半夜三更还在读书，五更鸡叫又起床，这正是男儿读书的大好时光。少年时不知道早起勤学，等到老了白头时才后悔读书太迟了。这首诗勉励青少年要珍惜时光，勤奋学习。",
        quiz: [{q:"“三更”和“五更”形容？",options:["时间晚和早/勤奋","吃三顿和五顿","三只鸡和五只鸡","更替"],ans:0},{q:"“黑发”代指？",options:["头发黑","少年时期","染发","黑人"],ans:1},{q:"“白首”代指？",options:["白头发","老年时期","首领","白手起家"],ans:1},{q:"“方”的意思是？",options:["方向","才","方形","药方"],ans:1},{q:"这首诗的主题是？",options:["劝人睡觉","劝人养鸡","劝人勤学","劝人洗头"],ans:2}]
    },
    {
        id: 209, category: '四年级', title: "题破山寺后禅院", author: "唐 · 常建", image: "题破山寺后禅院.png",
        content: [{t:"清晨入古寺，",m:"清晨我走进这座古老的寺院。"},{t:"初日照高林。",m:"初升的太阳照耀着高高的树林。"},{t:"曲径通幽处，",m:"弯曲的小路通向幽静的地方。"},{t:"禅房花木深。",m:"禅房掩映在花草树木深处。"},{t:"山光悦鸟性，",m:"山中美景使鸟儿天性欢悦。"},{t:"潭影空人心。",m:"潭水倒影让人心底空灵沉静。"},{t:"万籁此都寂，",m:"此时万物声音都寂静下来。"},{t:"但余钟磬音。",m:"只留下钟磬的声音在回荡。"}],
