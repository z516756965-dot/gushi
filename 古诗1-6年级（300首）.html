        translation: "清晨我走进这座古老的寺院，初升的太阳照耀着高高的树林。弯曲的小路通向幽静的地方，禅房掩映在花草树木深处。山中美景使鸟儿天性欢悦，潭水倒影让人心底空灵沉静。此时万物声音都寂静下来，只留下钟磬的声音在回荡。这首诗描写了寺院幽静的环境。",
        quiz: [{q:"“曲径”是指？",options:["直路","弯曲的小路","大路","死路"],ans:1},{q:"“幽处”是指？",options:["幽灵","幽静的地方","黑暗","远处"],ans:1},{q:"“悦”的意思是？",options:["音乐","使...高兴","跳跃","阅读"],ans:1},{q:"“万籁”是指？",options:["一万个人","各种声音/大自然的声音","赖皮","万物"],ans:1},{q:"千古名句是？",options:["清晨入古寺","曲径通幽处，禅房花木深","山光悦鸟性","万籁此都寂"],ans:1}]
    },

    // 五年级
    {
        id: 210, category: '五年级', title: "望岳", author: "唐 · 杜甫", image: "望岳.png",
        content: [{t:"岱宗夫如何？",m:"泰山到底怎么样呢？"},{t:"齐鲁青未了。",m:"在齐鲁大地上苍翠连绵不断。"},{t:"造化钟神秀，",m:"大自然汇聚了神奇秀丽。"},{t:"阴阳割昏晓。",m:"山南山北将清晨黄昏割开。"},{t:"荡胸生层云，",m:"层云升腾荡涤胸怀。"},{t:"决眦入归鸟。",m:"睁大眼睛看着归鸟飞入。"},{t:"会当凌绝顶，",m:"一定要登上泰山的最高峰。"},{t:"一览众山小。",m:"俯瞰群山都显得渺小。"}],
        translation: "泰山到底怎么样呢？在齐鲁大地上苍翠连绵不断。大自然汇聚了神奇秀丽，山南山北如同将清晨黄昏割开。层云升腾荡涤胸怀，睁大眼睛看着归鸟飞入。我一定要登上泰山的最高峰，俯瞰群山，它们都会显得那么渺小。这首诗表现了青年杜甫的雄心壮志。",
        quiz: [{q:"“岱宗”是指？",options:["祖宗","泰山","大山","代号"],ans:1},{q:"“未了”的意思是？",options:["没完/不尽","未来","没得","不了了之"],ans:0},{q:"“钟”的意思是？",options:["钟表","聚集/赋予","喜欢","终点"],ans:1},{q:"“割”字形容？",options:["割草","山高遮挡阳光/明暗分明","分割线","受伤"],ans:1},{q:"千古名句是？",options:["齐鲁青未了","造化钟神秀","会当凌绝顶，一览众山小","决眦入归鸟"],ans:2}]
    },
    {
        id: 211, category: '五年级', title: "渡荆门送别", author: "唐 · 李白", image: "渡荆门送别.png",
        content: [{t:"渡远荆门外，",m:"乘船远行出了荆门。"},{t:"来从楚国游。",m:"来到楚地游览。"},{t:"山随平野尽，",m:"山峦随着平原出现而尽头。"},{t:"江入大荒流。",m:"长江流进入广阔的原野。"},{t:"月下飞天镜，",m:"月影倒映像飞下的明镜。"},{t:"云生结海楼。",m:"云彩升起像海市蜃楼。"},{t:"仍怜故乡水，",m:"依然怜爱故乡的水。"},{t:"万里送行舟。",m:"万里迢迢送我行舟。"}],
        translation: "乘船远行出了荆门，来到楚地游览。山峦随着平原的出现而到了尽头，长江流进入广阔的原野。月影倒映像飞下的明镜，云彩升起结成了海市蜃楼。我依然怜爱故乡的水，万里迢迢送我行舟。这首诗描写了长江的壮丽景色，表达了对故乡的留恋。",
        quiz: [{q:"“大荒”是指？",options:["荒地","广阔的原野","灾荒","大慌"],ans:1},{q:"“天镜”比喻？",options:["镜子","月亮倒影","天空","太阳"],ans:1},{q:"“海楼”是指？",options:["海边的楼","海市蜃楼","大海","楼房"],ans:1},{q:"“怜”的意思是？",options:["可怜","爱/留恋","邻居","连结"],ans:1},{q:"这首诗的视角是？",options:["静止","移动/行舟","空中","水底"],ans:1}]
    },
    {
        id: 212, category: '五年级', title: "野望", author: "唐 · 王绩", image: "野望.png",
        content: [{t:"东皋薄暮望，",m:"傍晚在东皋伫立眺望。"},{t:"徙倚欲何依。",m:"徘徊无依不知道该归向哪里。"},{t:"树树皆秋色，",m:"层层树林都染上秋色。"},{t:"山山唯落晖。",m:"重重山岭只有落日余晖。"},{t:"牧人驱犊返，",m:"牧人赶着牛群回家。"},{t:"猎马带禽归。",m:"猎人骑马带着猎物归来。"},{t:"相顾无相识，",m:"大家相对看着却互不相识。"},{t:"长歌怀采薇。",m:"高声长啸思念古代隐士。"}],
        translation: "傍晚在东皋伫立眺望，徘徊无依不知道该归向哪里。层层树林都染上秋色，重重山岭只有落日余晖。牧人赶着牛群回家，猎人骑马带着猎物归来。大家相对看着却互不相识，我只好高声长啸，思念古代的隐士伯夷叔齐。这首诗描写了秋日山野恬静的景色，流露出孤独抑郁的心情。",
        quiz: [{q:"“薄暮”是指？",options:["早上","傍晚/黄昏","薄雾","看不清"],ans:1},{q:"“徙倚”的意思是？",options:["洗衣服","徘徊/流连","依靠","椅子"],ans:1},{q:"“落晖”是指？",options:["落叶","落日余晖","灰尘","光辉"],ans:1},{q:"“犊”是指？",options:["小牛","肚子","孤独","毒药"],ans:0},{q:"“采薇”典故涉及？",options:["李白","杜甫","伯夷叔齐(隐士)","屈原"],ans:2}]
    },
    {
        id: 213, category: '五年级', title: "黄鹤楼", author: "唐 · 崔颢", image: "黄鹤楼_崔颢.png",
        content: [{t:"昔人已乘黄鹤去，",m:"昔日的仙人已乘黄鹤离去。"},{t:"此地空余黄鹤楼。",m:"这里只留下一座黄鹤楼。"},{t:"黄鹤一去不复返，",m:"黄鹤一去再也没有回来。"},{t:"白云千载空悠悠。",m:"千百年来只有白云悠悠飘浮。"},{t:"晴川历历汉阳树，",m:"晴日川上汉阳的树木清晰可见。"},{t:"芳草萋萋鹦鹉洲。",m:"鹦鹉洲上芳草长得茂盛。"},{t:"日暮乡关何处是？",m:"日暮时分家乡在哪里？"},{t:"烟波江上使人愁。",m:"江上烟波浩渺让人生出乡愁。"}],
        translation: "昔日的仙人已乘黄鹤离去，这里只留下一座空荡荡的黄鹤楼。黄鹤一去再也没有回来，千百年来只有白云悠悠飘浮。晴日川上汉阳的树木清晰可见，鹦鹉洲上芳草长得十分茂盛。日暮时分家乡在哪里呢？江上烟波浩渺让人生出无限乡愁。这首诗被推崇为题咏黄鹤楼的绝唱。",
        quiz: [{q:"“空余”的意思是？",options:["空间","只剩下","空闲","多余"],ans:1},{q:"“悠悠”形容？",options:["白云飘动/久远","忧愁","悠闲","有人"],ans:0},{q:"“历历”的意思是？",options:["经历","分明可数/清晰","厉害","历史"],ans:1},{q:"“萋萋”形容？",options:["凄凉","草木茂盛","哭泣","妻子"],ans:1},{q:"“乡关”是指？",options:["关口","家乡/故乡","关系","乡下"],ans:1}]
    },
    {
        id: 214, category: '五年级', title: "使至塞上", author: "唐 · 王维", image: "使至塞上.png",
        content: [{t:"单车欲问边，",m:"乘单车想去慰问边关。"},{t:"属国过居延。",m:"路经的属国已过居延。"},{t:"征蓬出汉塞，",m:"像蓬草随风飘出汉塞。"},{t:"归雁入胡天。",m:"像归雁一样进入胡天。"},{t:"大漠孤烟直，",m:"浩瀚沙漠中孤烟直上。"},{t:"长河落日圆。",m:"黄河边上落日正圆。"},{t:"萧关逢候骑，",m:"在萧关遇到侦察兵。"},{t:"都护在燕然。",m:"说都护还在燕然前线。"}],
        translation: "乘单车想去慰问边关，路经的属国已过居延。我像蓬草随风飘出汉塞，像归雁一样进入胡天。浩瀚沙漠中孤烟直上，黄河边上落日正圆。在萧关遇到侦察兵，他说都护还在燕然前线。这首诗描写了塞外奇特壮丽的风光。",
        quiz: [{q:"“单车”是指？",options:["自行车","一辆车/轻车简从","孤单的车","单轮车"],ans:1},{q:"“征蓬”比喻？",options:["蓬草","远行的诗人自己","帐篷","士兵"],ans:1},{q:"千古名句是？",options:["单车欲问边","大漠孤烟直，长河落日圆","萧关逢候骑","归雁入胡天"],ans:1},{q:"“孤烟”通常指？",options:["做饭的烟","烽烟/狼烟","孤单的烟","香烟"],ans:1},{q:"这首诗描写的地点是？",options:["江南","塞外/边塞","海边","山林"],ans:1}]
    },
    {
        id: 215, category: '五年级', title: "酬乐天扬州初逢席上见赠", author: "唐 · 刘禹锡", image: "酬乐天.png",
        content: [{t:"巴山楚水凄凉地，",m:"在巴山楚水这些凄凉的地方。"},{t:"二十三年弃置身。",m:"度过了二十三年被贬的日子。"},{t:"怀旧空吟闻笛赋，",m:"怀念故友空吟《闻笛赋》。"},{t:"到乡翻似烂柯人。",m:"回到家乡好像是烂柯人。"},{t:"沉舟侧畔千帆过，",m:"沉船旁边千帆竞发。"},{t:"病树前头万木春。",m:"病树前头万木争春。"},{t:"今日听君歌一曲，",m:"今天听你唱了一首歌。"},{t:"暂凭杯酒长精神。",m:"暂借杯酒振作精神。"}],
        translation: "在巴山楚水这些凄凉的地方，度过了二十三年被贬弃的日子。怀念故友空吟《闻笛赋》，回到家乡物是人非，好像是烂柯人。沉船旁边千帆竞发，病树前头万木争春。今天听你唱了一首歌，暂借杯酒振作精神。这首诗表现了诗人坚毅豁达的胸怀。",
        quiz: [{q:"“酬”的意思是？",options:["报酬","酬答/回赠","仇恨","筹备"],ans:1},{q:"“弃置身”说明？",options:["身体不好","被贬谪/不受重用","放弃","身子轻"],ans:1},{q:"“烂柯人”典故比喻？",options:["砍柴人","离家很久，世事变迁","烂掉的斧头","下棋人"],ans:1},{q:"千古名句是？",options:["巴山楚水","沉舟侧畔千帆过，病树前头万木春","今日听君歌一曲","二十三年"],ans:1},{q:"这首诗蕴含的哲理是？",options:["要喝酒","新事物必将取代旧事物","要保护树木","要坐船"],ans:1}]
    },
    {
        id: 216, category: '五年级', title: "观刈麦", author: "唐 · 白居易", image: "观刈麦.png",
        content: [{t:"田家少闲月，",m:"农家很少有清闲的月份。"},{t:"五月人倍忙。",m:"五月的时候人加倍忙碌。"},{t:"夜来南风起，",m:"夜里吹起了南风。"},{t:"小麦覆陇黄。",m:"小麦覆盖田垄一片金黄。"},{t:"妇姑荷箪食，",m:"妇女挑着盛饭的竹篮。"},{t:"童稚携壶浆。",m:"小孩子提着水壶。"},{t:"相随饷田去，",m:"互相跟随送饭到田里。"},{t:"丁壮在南冈。",m:"壮丁们在南山冈干活。"}],
        translation: "(节选)农家很少有清闲的月份，五月的时候人加倍忙碌。夜里吹起了南风，小麦覆盖田垄一片金黄。妇女挑着盛饭的竹篮，小孩子提着水壶，互相跟随送饭到田里，壮丁们在南山冈抢收小麦。这首诗描写了农民繁重的劳动，表达了对农民的同情。",
        quiz: [{q:"“刈(yì)”的意思是？",options:["种植","割/收割","吃","看见"],ans:1},{q:"“倍忙”是因为？",options:["人少","五月麦收/农忙","天热","没饭吃"],ans:1},{q:"“荷箪食”是指？",options:["荷花吃","挑着盛饭的篮子","担心吃饭","荷叶"],ans:1},{q:"“饷田”的意思是？",options:["给在田里劳动的人送饭","享受田野","向着田里","想念田"],ans:0},{q:"这首诗表达了？",options:["丰收的喜悦","对农民繁重劳动的同情","风景优美","喜欢吃麦子"],ans:1}]
    },
    {
        id: 217, category: '五年级', title: "雁门太守行", author: "唐 · 李贺", image: "雁门太守行.png",
        content: [{t:"黑云压城城欲摧，",m:"黑云压着城楼，城楼好像要崩塌。"},{t:"甲光向日金鳞开。",m:"铠甲在阳光下像金鳞一样闪光。"},{t:"角声满天秋色里，",m:"秋色中号角声响彻满天。"},{t:"塞上燕脂凝夜紫。",m:"塞上泥土像胭脂一样，夜色凝成紫色。"},{t:"半卷红旗临易水，",m:"半卷着红旗临近易水。"},{t:"霜重鼓寒声不起。",m:"霜重鼓寒，鼓声沉闷不响。"},{t:"报君黄金台上意，",m:"为了报答君王黄金台招贤的厚意。"},{t:"提携玉龙为君死。",m:"手提宝剑愿为君王战死。"}],
        translation: "黑云压着城楼，城楼好像要崩塌，铠甲在阳光下像金鳞一样闪光。秋色中号角声响彻满天，塞上泥土像胭脂一样鲜红，夜色凝成紫色。半卷着红旗临近易水，霜重鼓寒，鼓声沉闷不响。为了报答君王黄金台招贤的厚意，手提宝剑愿为君王战死。这首诗描写了战争的惨烈和将士报国的决心。",
        quiz: [{q:"“黑云”比喻？",options:["乌云","敌军的气势","烟雾","天黑"],ans:1},{q:"“金鳞”比喻？",options:["金色的鱼","铠甲的反光","龙","金子"],ans:1},{q:"“燕脂”是指？",options:["燕子脂肪","胭脂(血迹)","燕国","红色"],ans:1},{q:"“玉龙”是指？",options:["龙","宝剑","玉石","玉佩"],ans:1},{q:"这首诗的色彩特点是？",options:["平淡","浓艳斑驳","黑白","只有红色"],ans:1}]
    },

    // 六年级
    {
        id: 218, category: '六年级', title: "浣溪沙·一曲新词酒一杯", author: "宋 · 晏殊", image: "浣溪沙_晏殊.png",
        content: [{t:"一曲新词酒一杯，",m:"听一支新曲，喝一杯美酒。"},{t:"去年天气旧亭台。",m:"还是去年的天气，还是旧日的亭台。"},{t:"夕阳西下几时回？",m:"夕阳西下，什么时候才能回来？"},{t:"无可奈何花落去，",m:"花儿凋落是无可奈何的事。"},{t:"似曾相识燕归来。",m:"似曾相识的燕子又飞回来了。"},{t:"小园香径独徘徊。",m:"在小园花径中独自徘徊。"}],
        translation: "听一支新曲，喝一杯美酒，还是去年的天气，还是旧日的亭台。夕阳西下，什么时候才能回来？花儿凋落是无可奈何的事，似曾相识的燕子又飞回来了。我在小园花径中独自徘徊。这首词抒发了伤春惜时、怀旧之情。",
        quiz: [{q:"“几时回”是在问？",options:["酒","新词","夕阳/时光","亭台"],ans:2},{q:"千古名句是？",options:["一曲新词","无可奈何花落去，似曾相识燕归来","夕阳西下","小园香径"],ans:1},{q:"“无可奈何”是因为？",options:["没花钱","花落去(自然规律)","燕子来了","天气不好"],ans:1},{q:"“似曾相识”是因为？",options:["燕子长得像","去年的燕子又回来了","看错了","朋友来了"],ans:1},{q:"这首词表达了？",options:["快乐","伤春惜时/对时光流逝的感叹","喝酒","看花"],ans:1}]
    },
    {
        id: 219, category: '六年级', title: "渔家傲·秋思", author: "宋 · 范仲淹", image: "渔家傲_范仲淹.png",
        content: [{t:"塞下秋来风景异，",m:"边塞秋天来了，风景与中原不同。"},{t:"衡阳雁去无留意。",m:"大雁飞向衡阳，没有留恋之意。"},{t:"四面边声连角起，",m:"四面边塞的声音伴着号角响起。"},{t:"千嶂里，长烟落日孤城闭。",m:"重峦叠嶂里，长烟落日，孤城紧闭。"},{t:"浊酒一杯家万里，",m:"喝一杯浊酒，家乡在万里之外。"},{t:"燕然未勒归无计。",m:"战功未建，回家没有指望。"},{t:"羌管悠悠霜满地。",m:"羌笛悠悠，寒霜满地。"},{t:"人不寐，将军白发征夫泪。",m:"人睡不着，将军白了头，征夫流下泪。"}],
        translation: "边塞秋天来了，风景与中原不同。大雁飞向衡阳，没有留恋之意。四面边塞的声音伴着号角响起。重峦叠嶂里，长烟落日，孤城紧闭。喝一杯浊酒，家乡在万里之外，战功未建，回家没有指望。羌笛悠悠，寒霜满地。人睡不着，将军白了头，征夫流下泪。这首词表达了守边将士的思乡之情和建功立业的壮志。",
        quiz: [{q:"“风景异”是指？",options:["风景好看","风景奇怪","边塞风光与中原不同","风景一样"],ans:2},{q:"“边声”是指？",options:["边疆的声音(风声/马鸣等)","鞭炮声","说话声","乐器声"],ans:0},{q:"“燕然未勒”典故指？",options:["燕子没来","没有建立战功","勒住马","燕子飞走"],ans:1},{q:"“人不寐”的意思是？",options:["人不美","人没睡着","人没味","人不多"],ans:1},{q:"这首词表达了？",options:["开心","思乡与报国的矛盾","想去旅游","喜欢喝酒"],ans:1}]
    },
    {
        id: 220, category: '六年级', title: "定风波", author: "宋 · 苏轼", image: "定风波.png",
        content: [{t:"莫听穿林打叶声，",m:"不要听穿林打叶的雨声。"},{t:"何妨吟啸且徐行。",m:"不妨一边吟诗长啸，一边从容慢行。"},{t:"竹杖芒鞋轻胜马，",m:"拄着竹杖穿着草鞋，比骑马还轻快。"},{t:"谁怕？一蓑烟雨任平生。",m:"谁怕？披着蓑衣在烟雨中过一辈子。"},{t:"料峭春风吹酒醒，",m:"料峭的春风吹醒了酒意。"},{t:"微冷，山头斜照却相迎。",m:"微微感到冷，山头斜阳却来相迎。"},{t:"回首向来萧瑟处，",m:"回头看刚才风雨萧瑟的地方。"},{t:"归去，也无风雨也无晴。",m:"回去吧，既无所谓风雨，也无所谓天晴。"}],
        translation: "不要听穿林打叶的雨声，不妨一边吟诗长啸，一边从容慢行。拄着竹杖穿着草鞋，比骑马还轻快。谁怕？披着蓑衣在烟雨中过一辈子也无妨。料峭的春风吹醒了酒意，微微感到冷，山头斜阳却来相迎。回头看刚才风雨萧瑟的地方，回去吧，不管它是风雨还是天晴。这首词表现了苏轼旷达超脱的胸襟。",
        quiz: [{q:"“吟啸”是指？",options:["吟诗长啸/不在乎","尖叫","哭","笑"],ans:0},{q:"“芒鞋”是指？",options:["忙碌的鞋","草鞋","皮鞋","新鞋"],ans:1},{q:"“一蓑烟雨任平生”表达了？",options:["喜欢下雨","想当渔夫","旷达超脱/无所畏惧","没带伞"],ans:2},{q:"“萧瑟处”是指？",options:["风景好的地方","刚才遇雨的地方/风雨","萧条","瑟瑟发抖"],ans:1},{q:"“也无风雨也无晴”意味着？",options:["天气变了","超脱于顺境逆境之上/宠辱不惊","不知道天气","没有风雨"],ans:1}]
    },
    {
        id: 221, category: '六年级', title: "卜算子·我住长江头", author: "宋 · 李之仪", image: "卜算子_李之仪.png",
        content: [{t:"我住长江头，",m:"我住在长江上游。"},{t:"君住长江尾。",m:"你住在长江下游。"},{t:"日日思君不见君，",m:"天天思念你却见不到你。"},{t:"共饮长江水。",m:"共同喝着长江的水。"},{t:"此水几时休，",m:"这江水什么时候流完？"},{t:"此恨何时已。",m:"这离愁什么时候结束？"},{t:"只愿君心似我心，",m:"只愿你的心像我的心一样。"},{t:"定不负相思意。",m:"定然不辜负这相思的情意。"}],
        translation: "我住在长江上游，你住在长江下游。天天思念你却见不到你，只能共同喝着长江的水。这江水什么时候流完？这离愁什么时候结束？只愿你的心像我的心一样，定然不辜负这相思的情意。这首词以长江之水为线索，表达了深挚的相思之情。",
        quiz: [{q:"“长江头”和“长江尾”指？",options:["距离远/两地相思","头和尾巴","长","短"],ans:0},{q:"“共饮长江水”说明？",options:["水好喝","空间相连/情感相通","没水了","一起喝水"],ans:1},{q:"“休”和“已”的意思是？",options:["休息","停止/结束","已经","开始"],ans:1},{q:"“恨”在这里指？",options:["仇恨","离愁别恨/相思之苦","遗憾","狠心"],ans:1},{q:"最后两句表达了？",options:["怀疑","对爱情的坚定信念","负心","不想想了"],ans:1}]
    },
    {
        id: 222, category: '六年级', title: "南乡子·登京口北固亭有怀", author: "宋 · 辛弃疾", image: "南乡子.png",
        content: [{t:"何处望神州？",m:"从哪里遥望中原故土？"},{t:"满眼风光北固楼。",m:"满眼风光都在北固楼上。"},{t:"千古兴亡多少事？",m:"千古兴亡有多少事？"},{t:"悠悠。",m:"悠悠长久。"},{t:"不尽长江滚滚流。",m:"就像长江水滚滚流不尽。"},{t:"年少万兜鍪，",m:"当年孙权率领万千大军。"},{t:"坐断东南战未休。",m:"占据东南战事未休。"},{t:"天下英雄谁敌手？",m:"天下英雄谁是对手？"},{t:"曹刘。",m:"只有曹操和刘备。"},{t:"生子当如孙仲谋。",m:"生儿子就像孙权那样。"}],
        translation: "从哪里遥望中原故土？满眼风光都在北固楼上。千古兴亡有多少事？悠悠长久，就像长江水滚滚流不尽。当年孙权年轻时统率万千大军，占据东南战事未休。天下英雄谁是对手？只有曹操和刘备。生儿子就要像孙权那样。这首词借咏史抒发了抗金救国的抱负。",
        quiz: [{q:"“神州”是指？",options:["神仙住的地方","中原故土","外国","广州"],ans:1},{q:"“悠悠”形容？",options:["悠闲","时间久远","忧愁","水流慢"],ans:1},{q:"“兜鍪(dōu móu)”是指？",options:["头盔/士兵","兜风","计谋","钱"],ans:0},{q:"“孙仲谋”是指？",options:["孙悟空","孙权","孙策","孙子"],ans:1},{q:"最后一句引用了谁的话？",options:["刘备","曹操","诸葛亮","辛弃疾"],ans:1}]
    },
    {
        id: 223, category: '六年级', title: "登高", author: "唐 · 杜甫", image: "登高.png",
        content: [{t:"风急天高猿啸哀，",m:"风急天高，猿猴啼叫悲哀。"},{t:"渚清沙白鸟飞回。",m:"水清沙白，鸟儿盘旋飞回。"},{t:"无边落木萧萧下，",m:"无边无际的落叶萧萧飘下。"},{t:"不尽长江滚滚来。",m:"无穷无尽的长江滚滚流来。"},{t:"万里悲秋常作客，",m:"悲对秋景，万里漂泊常做异乡客。"},{t:"百年多病独登台。",m:"一生多病，独自登上高台。"},{t:"艰难苦恨繁霜鬓，",m:"艰难苦恨，白发增多。"},{t:"潦倒新停浊酒杯。",m:"衰颓潦倒，最近又停了酒。"}],
        translation: "风急天高，猿猴啼叫悲哀，水清沙白，鸟儿盘旋飞回。无边无际的落叶萧萧飘下，无穷无尽的长江滚滚流来。悲对秋景，万里漂泊常做异乡客，一生多病，独自登上高台。艰难苦恨，白发增多，衰颓潦倒，最近因病又停了酒。这首诗被誉为“古今七律第一”，表达了诗人身世飘零的悲凉。",
        quiz: [{q:"“落木”是指？",options:["木头掉下来","落叶","伐木","枯树"],ans:1},{q:"千古名句是？",options:["风急天高","无边落木萧萧下，不尽长江滚滚来","万里悲秋","艰难苦恨"],ans:1},{q:"“百年”是指？",options:["一百年","晚年/一生","很久","百年纪念"],ans:1},{q:"“作客”是指？",options:["做客人","漂泊他乡","请客","做客气"],ans:1},{q:"这首诗的情感基调是？",options:["喜悦","沉郁悲凉","豪放","平静"],ans:1}]
    },
    {
        id: 224, category: '六年级', title: "蜀相", author: "唐 · 杜甫", image: "蜀相.png",
        content: [{t:"丞相祠堂何处寻？",m:"丞相的祠堂在哪里寻找？"},{t:"锦官城外柏森森。",m:"锦官城外柏树茂密的地方。"},{t:"映阶碧草自春色，",m:"映照石阶的碧草徒自春色。"},{t:"隔叶黄鹂空好音。",m:"隔着树叶的黄鹂空有好音。"},{t:"三顾频烦天下计，",m:"三顾茅庐频繁商讨天下大计。"},{t:"两朝开济老臣心。",m:"辅佐两朝开创基业尽显老臣忠心。"},{t:"出师未捷身先死，",m:"出师没有获胜就先病死。"},{t:"长使英雄泪满襟。",m:"长久让后世英雄泪湿衣襟。"}],
        translation: "丞相的祠堂在哪里寻找？锦官城外柏树茂密的地方。映照石阶的碧草徒自春色，隔着树叶的黄鹂空有好音。三顾茅庐频繁商讨天下大计，辅佐两朝开创基业尽显老臣忠心。出师没有获胜就先病死，长久让后世英雄泪湿衣襟。这首诗咏怀诸葛亮，表达了对他的崇敬和惋惜。",
        quiz: [{q:"“蜀相”是指？",options:["曹操","诸葛亮","刘备","孙权"],ans:1},{q:"“锦官城”是？",options:["成都","重庆","南京","洛阳"],ans:0},{q:"“自”和“空”表达了？",options:["自由和空间","景色虽美但无人欣赏的寂寞","自己和天空","自信和空虚"],ans:1},{q:"“三顾”是指？",options:["看三次","三顾茅庐","照顾三次","三个顾客"],ans:1},{q:"千古名句是？",options:["丞相祠堂","出师未捷身先死，长使英雄泪满襟","三顾频烦","两朝开济"],ans:1}]
    },
    {
        id: 225, category: '六年级', title: "书愤", author: "宋 · 陆游", image: "书愤.png",
        content: [{t:"早岁那知世事艰，",m:"年轻时哪知道世事艰难。"},{t:"中原北望气如山。",m:"北望中原气概像山一样豪迈。"},{t:"楼船夜雪瓜洲渡，",m:"夜雪中率领楼船在瓜洲渡。"},{t:"铁马秋风大散关。",m:"秋风中跨着铁马在大散关。"},{t:"塞上长城空自许，",m:"空自许诺像塞上长城一样保卫国家。"},{t:"镜中衰鬓已先斑。",m:"镜中看到衰老的鬓发已经斑白。"},{t:"出师一表真名世，",m:"《出师表》真是名扬后世。"},{t:"千载谁堪伯仲间！",m:"千载以来谁能和诸葛亮相比！"}],
        translation: "年轻时哪知道世事艰难，北望中原气概像山一样豪迈。曾记夜雪中率领楼船在瓜洲渡，秋风中跨着铁马在大散关。空自许诺像塞上长城一样保卫国家，镜中看到衰老的鬓发已经斑白。《出师表》真是名扬后世，千载以来谁能和诸葛亮相比！这首诗抒发了诗人壮志未酬、岁月虚度的悲愤。",
        quiz: [{q:"“气如山”形容？",options:["生气","气概豪迈","空气好","山高"],ans:1},{q:"“楼船”和“铁马”回忆了？",options:["旅游经历","当年的抗金战斗生活","梦境","看戏"],ans:1},{q:"“塞上长城”比喻？",options:["真正的长城","卫国名将/自己","边塞","城墙"],ans:1},{q:"“空自许”表达了？",options:["谦虚","壮志难酬的悲愤/落空","许诺","空闲"],ans:1},{q:"最后借谁自比？",options:["曹操","诸葛亮","岳飞","孙权"],ans:1}]
    },
    {
        id: 226, category: '六年级', title: "声声慢", author: "宋 · 李清照", image: "声声慢.png",
        content: [{t:"寻寻觅觅，冷冷清清，",m:"寻寻觅觅，冷冷清清。"},{t:"凄凄惨惨戚戚。",m:"凄凄惨惨戚戚。"},{t:"乍暖还寒时候，最难将息。",m:"忽暖忽冷的时候，最难保养。"},{t:"三杯两盏淡酒，",m:"喝几杯淡酒。"},{t:"怎敌他、晚来风急？",m:"怎能抵挡晚来的急风？"},{t:"雁过也，正伤心，",m:"大雁飞过，正伤心。"},{t:"却是旧时相识。",m:"却是旧时相识。"}],
        translation: "(节选)苦苦寻觅，却只落得冷冷清清，凄凄惨惨戚戚。忽暖忽冷的时候，最难保养休息。喝几杯淡酒，怎能抵挡晚来的急风？大雁飞过，正令人伤心，因为它是我旧时相识。这首词抒发了词人晚年流离失所、孤独悲苦的心情。",
        quiz: [{q:"开篇连用叠词的作用是？",options:["凑字数","渲染悲凉气氛/加强语势","好听","好背"],ans:1},{q:"“将息”的意思是？",options:["休息/调养","停止","利息","呼吸"],ans:0},{q:"“怎敌他”的意思是？",options:["怎么打敌人","怎能抵挡","怎么对他","怎么是敌人"],ans:1},{q:"为什么看到大雁“伤心”？",options:["大雁飞走了","大雁是旧时相识/勾起乡愁和往事","想吃雁肉","大雁叫声难听"],ans:1},{q:"这首词的作者李清照是？",options:["豪放派","婉约派","田园派","边塞派"],ans:1}]
    },
    {
        id: 227, category: '六年级', title: "雨霖铃", author: "宋 · 柳永", image: "雨霖铃.png",
        content: [{t:"寒蝉凄切，对长亭晚，骤雨初歇。",m:"寒蝉凄凉地叫着，对着长亭晚景，骤雨刚停。"},{t:"都门帐饮无绪，",m:"在京城门外设帐送别，没有心情喝酒。"},{t:"留恋处，兰舟催发。",m:"正在留恋时，船家催促出发。"},{t:"执手相看泪眼，",m:"握着手互相看着，泪眼朦胧。"},{t:"竟无语凝噎。",m:"竟然哽咽得说不出话来。"},{t:"多情自古伤离别，",m:"自古以来多情的人都感伤离别。"},{t:"更那堪、冷落清秋节！",m:"更何况是在这冷落的清秋时节！"}],
        translation: "(节选)寒蝉凄凉地叫着，对着长亭晚景，骤雨刚停。在京城门外设帐送别，没有心情喝酒。正在留恋时，船家催促出发。握着手互相看着，泪眼朦胧，竟然哽咽得说不出话来。自古以来多情的人都感伤离别，更何况是在这冷落的清秋时节！这首词是宋词婉约派的代表作，描写了恋人送别的场景。",
        quiz: [{q:"“凄切”形容？",options:["寒蝉叫声凄凉","切东西","急切","一切"],ans:0},{q:"“无绪”的意思是？",options:["没有头绪","没有心情/情绪","没有继续","没有胡须"],ans:1},{q:"“兰舟”是指？",options:["兰花","船的美称","蓝色的船","人名"],ans:1},{q:"“凝噎”是指？",options:["吃噎住了","嗓子堵住/哭不出声","凝结","冰冷"],ans:1},{q:"千古名句是？",options:["寒蝉凄切","多情自古伤离别","骤雨初歇","兰舟催发"],ans:1}]
    },
    {
        id: 228, category: '六年级', title: "蝶恋花", author: "宋 · 柳永", image: "蝶恋花.png",
        content: [{t:"伫倚危楼风细细，",m:"久久倚靠在高楼栏杆上，微风细细。"},{t:"望极春愁，黯黯生天际。",m:"望尽天涯，春愁黯然生起。"},{t:"草色烟光残照里，",m:"草色烟光在落日残照里。"},{t:"无言谁会凭栏意。",m:"默默无言，谁能领会我凭栏远眺的心意？"},{t:"拟把疏狂图一醉，",m:"打算放纵疏狂大醉一场。"},{t:"对酒当歌，强乐还无味。",m:"对着酒歌唱，勉强行乐觉得没滋味。"},{t:"衣带渐宽终不悔，",m:"衣服渐渐宽大我始终不后悔。"},{t:"为伊消得人憔悴。",m:"为了她值得我日渐憔悴。"}],
        translation: "久久倚靠在高楼栏杆上，微风细细。望尽天涯，春愁黯然生起。草色烟光在落日残照里，默默无言，谁能领会我凭栏远眺的心意？打算放纵疏狂大醉一场，对着酒歌唱，勉强行乐觉得没滋味。衣服渐渐宽大我始终不后悔，为了她值得我日渐憔悴。这首词表达了对意中人的坚贞之爱。",
        quiz: [{q:"“危楼”是指？",options:["危险的楼","高楼","快倒的楼","旧楼"],ans:1},{q:"“望极”的意思是？",options:["望不到","看到尽头/远望","极其","极点"],ans:1},{q:"“强乐”的意思是？",options:["强壮快乐","勉强寻欢作乐","很强","强迫"],ans:1},{q:"“衣带渐宽”意味着？",options:["衣服买大了","人瘦了/憔悴","衣服松了","减肥成功"],ans:1},{q:"千古名句是？",options:["衣带渐宽终不悔，为伊消得人憔悴","伫倚危楼","对酒当歌","草色烟光"],ans:0}]
    },
    {
        id: 229, category: '六年级', title: "鹊桥仙", author: "宋 · 秦观", image: "鹊桥仙.png",
        content: [{t:"纤云弄巧，飞星传恨，",m:"纤薄的云彩变幻多端，流星传递着离恨。"},{t:"银汉迢迢暗度。",m:"悄悄渡过遥远的银河。"},{t:"金风玉露一相逢，",m:"在秋风白露的七夕相逢一次。"},{t:"便胜却人间无数。",m:"就胜过人间无数朝朝暮暮。"},{t:"柔情似水，佳期如梦，",m:"柔情像水一样，相会的日子像梦一样。"},{t:"忍顾鹊桥归路。",m:"不忍心回头看鹊桥归路。"},{t:"两情若是久长时，",m:"只要两情至死不渝。"},{t:"又岂在朝朝暮暮。",m:"又岂在乎天天在一起。"}],
        translation: "纤薄的云彩变幻多端，流星传递着离恨，悄悄渡过遥远的银河。在秋风白露的七夕相逢一次，就胜过人间无数朝朝暮暮。柔情像水一样，相会的日子像梦一样，不忍心回头看鹊桥归路。只要两情至死不渝，又岂在乎天天在一起。这首词讴歌了高尚纯洁的爱情。",
        quiz: [{q:"“银汉”是指？",options:["汉朝","银河","银子","男子汉"],ans:1},{q:"“金风玉露”是指？",options:["金子和玉","秋天/七夕景物","风雨","露水"],ans:1},{q:"“忍顾”的意思是？",options:["忍受","忍心回头看","照顾","回顾"],ans:1},{q:"“朝朝暮暮”是指？",options:["早上和晚上/天天","朝代","暮色","朝拜"],ans:0},{q:"千古名句是？",options:["两情若是久长时，又岂在朝朝暮暮","纤云弄巧","柔情似水","佳期如梦"],ans:0}]
    },
    {
        id: 230, category: '六年级', title: "锦瑟", author: "唐 · 李商隐", image: "锦瑟.png",
        content: [{t:"锦瑟无端五十弦，",m:"锦瑟无缘无故有五十根弦。"},{t:"一弦一柱思华年。",m:"每根弦每根柱都让我想起青春年华。"},{t:"庄生晓梦迷蝴蝶，",m:"庄周晓梦中迷迷糊糊变成了蝴蝶。"},{t:"望帝春心托杜鹃。",m:"望帝将美好的心愿寄托给杜鹃。"},{t:"沧海月明珠有泪，",m:"沧海月明，鲛人泣泪成珠。"},{t:"蓝田日暖玉生烟。",m:"蓝田日暖，良玉生烟。"},{t:"此情可待成追忆，",m:"这份情感当时就值得追忆。"},{t:"只是当时已惘然。",m:"只是当时已经迷惘怅然。"}],
        translation: "锦瑟无缘无故有五十根弦，每根弦每根柱都让我想起青春年华。庄周晓梦中迷迷糊糊变成了蝴蝶，望帝将美好的心愿寄托给杜鹃。沧海月明，鲛人泣泪成珠；蓝田日暖，良玉生烟。这份情感当时就值得追忆，只是当时已经迷惘怅然。这首诗意境朦胧，寄托了诗人对华年往事的追忆和感伤。",
        quiz: [{q:"“无端”的意思是？",options:["没有端点","无缘无故/没来由","两端","开始"],ans:1},{q:"“华年”是指？",options:["中华","青春年华","老年","新年"],ans:1},{q:"引用了“庄周梦蝶”典故的是？",options:["第一句","第三句","第五句","第七句"],ans:1},{q:"“惘然”的意思是？",options:["迷惘/失意","网络","往事","自然"],ans:0},{q:"这首诗的特点是？",options:["通俗易懂","意境朦胧/隐晦","豪放","写实"],ans:1}]
    },
    {
        id: 231, category: '六年级', title: "无题·昨夜星辰昨夜风", author: "唐 · 李商隐", image: "无题_昨夜.png",
        content: [{t:"昨夜星辰昨夜风，",m:"昨夜星光灿烂，凉风习习。"},{t:"画楼西畔桂堂东。",m:"在画楼西畔，桂堂之东。"},{t:"身无彩凤双飞翼，",m:"身上没有彩凤那样的双翅飞到你身边。"},{t:"心有灵犀一点通。",m:"心却像灵犀角一样息息相通。"}],
        translation: "(节选)昨夜星光灿烂，凉风习习，在画楼西畔，桂堂之东。身上没有彩凤那样的双翅飞到你身边，心却像灵犀角一样息息相通。这首诗描写了对意中人的深深思念和心灵的默契。",
        quiz: [{q:"“画楼”“桂堂”是指？",options:["画画的地方","精美的楼阁厅堂","学校","食堂"],ans:1},{q:"“双飞翼”比喻？",options:["翅膀/飞到对方身边的手段","飞机","鸟","凤凰"],ans:0},{q:"“灵犀”是指？",options:["犀牛角/心灵相通","灵气","犀利","西边"],ans:0},{q:"千古名句是？",options:["昨夜星辰","身无彩凤双飞翼，心有灵犀一点通","画楼西畔","桂堂东"],ans:1},{q:"这首诗表达了？",options:["心灵的默契/相思","想飞","喜欢犀牛","看星星"],ans:0}]
    },
    {
        id: 232, category: '六年级', title: "题菊花", author: "唐 · 黄巢", image: "题菊花.png",
        content: [{t:"飒飒西风满院栽，",m:"飒飒西风吹满院，菊花盛开。"},{t:"蕊寒香冷蝶难来。",m:"花蕊寒冷香气清冷，蝴蝶很难飞来。"},{t:"他年我若为青帝，",m:"有朝一日我如果当了掌管春天的青帝。"},{t:"报与桃花一处开。",m:"一定要让菊花和桃花在一起开放。"}],
        translation: "飒飒西风吹满院，菊花盛开，花蕊寒冷香气清冷，蝴蝶很难飞来。有朝一日我如果当了掌管春天的青帝，一定要让菊花和桃花在一起开放。这首诗表达了诗人想要改变环境、改造世界的豪情。",
        quiz: [{q:"“飒飒”形容？",options:["风声","雨声","走路声","笑声"],ans:0},{q:"“蝶难来”是因为？",options:["蝴蝶死了","天冷/菊花香气冷","蝴蝶不喜欢菊花","有毒"],ans:1},{q:"“青帝”是指？",options:["皇帝","掌管春天的神","青年","青色"],ans:1},{q:"“报与”的意思是？",options:["报答","告诉/命令/让","报纸","抱住"],ans:1},{q:"这首诗表达了？",options:["想种花","想当神仙","变革现实的豪情","喜欢桃花"],ans:2}]
    },
    {
        id: 233, category: '六年级', title: "不第后赋菊", author: "唐 · 黄巢", image: "不第后赋菊.png",
        content: [{t:"待到秋来九月八，",m:"等到秋天九月重阳节。"},{t:"我花开后百花杀。",m:"我的菊花开后百花都凋谢了。"},{t:"冲天香阵透长安，",m:"冲天的香气渗透长安城。"},{t:"满城尽带黄金甲。",m:"满城就像穿上了金黄色的铠甲。"}],
        translation: "等到秋天九月重阳节，我的菊花开后百花都凋谢了。冲天的香气渗透长安城，满城盛开的菊花就像穿上了金黄色的铠甲。这首诗运用比喻，表现了诗人落第后的愤慨和必胜的信念。",
        quiz: [{q:"“不第”的意思是？",options:["没有弟弟","科举落榜","不错","第一"],ans:1},{q:"“我花”是指？",options:["我的花","菊花","荷花","梅花"],ans:1},{q:"“杀”在这里意思是？",options:["杀人","凋谢/枯萎","杀气","杀虫"],ans:1},{q:"“黄金甲”比喻？",options:["盔甲","金子","黄色的菊花","指甲"],ans:2},{q:"这首诗充满了？",options:["悲伤","战斗精神/豪情","闲适","温柔"],ans:1}]
    },
    {
        id: 234, category: '六年级', title: "己亥杂诗·浩荡离愁", author: "清 · 龚自珍", image: "己亥杂诗_浩荡.png",
        content: [{t:"浩荡离愁白日斜，",m:"浩荡的离愁伴随着夕阳西下。"},{t:"吟鞭东指即天涯。",m:"吟诗挥鞭向东走，从此就是天涯。"},{t:"落红不是无情物，",m:"落花不是没有感情的东西。"},{t:"化作春泥更护花。",m:"化作春泥为了更好地培育新花。"}],
        translation: "浩荡的离愁伴随着夕阳西下，吟诗挥鞭向东走，从此就是天涯。落花不是没有感情的东西，它化作春泥是为了更好地培育新花。这首诗表达了诗人虽然辞官，但仍关心国家、甘于奉献的精神。",
        quiz: [{q:"“浩荡”形容？",options:["水大","离愁之多/广阔","荡秋千","路远"],ans:1},{q:"“吟鞭”是指？",options:["马鞭","唱歌","写诗","兵器"],ans:0},{q:"“落红”是指？",options:["红色","落花","太阳","红叶"],ans:1},{q:"“化作春泥”是为了？",options:["弄脏路","护花/培育新一代","腐烂","睡觉"],ans:1},{q:"这首诗表达了？",options:["消极","奉献精神","想家","喜欢花"],ans:1}]
    },
    {
        id: 235, category: '六年级', title: "秋风词", author: "唐 · 李白", image: "秋风词.png",
        content: [{t:"秋风清，秋月明，",m:"秋风凄清，秋月明朗。"},{t:"落叶聚还散，寒鸦栖复惊。",m:"落叶聚了又散，寒鸦栖息又惊起。"},{t:"相思相见知何日？",m:"想念你，何时才能相见？"},{t:"此时此夜难为情！",m:"此时此夜实在让人难为情怀！"}],
        translation: "秋风凄清，秋月明朗，落叶聚了又散，寒鸦栖息又惊起。想念你，何时才能相见？此时此夜实在让人难为情怀！这首词写出了秋夜相思的凄苦。",
        quiz: [{q:"“寒鸦”是指？",options:["寒冷的乌鸦","耐寒的乌鸦","鸭子","牙齿"],ans:1},{q:"“聚还散”描写？",options:["人","落叶","钱","鸟"],ans:1},{q:"“难为情”是指？",options:["害羞","情怀难以排遣/痛苦","难过","为难"],ans:1},{q:"这是一首？",options:["诗","词","曲","赋"],ans:1},{q:"表达了什么情感？",options:["快乐","相思之苦","恐惧","愤怒"],ans:1}]
    },
    {
        id: 236, category: '六年级', title: "望江南·梳洗罢", author: "唐 · 温庭筠", image: "望江南.png",
        content: [{t:"梳洗罢，独倚望江楼。",m:"梳洗完毕，独自倚靠在望江楼上。"},{t:"过尽千帆皆不是，",m:"看尽了千万只帆船都不是心上人的船。"},{t:"斜晖脉脉水悠悠。",m:"夕阳含情脉脉，江水悠悠流淌。"},{t:"肠断白蘋洲。",m:"在长满白蘋的小洲上伤心断肠。"}],
        translation: "梳洗完毕，独自倚靠在望江楼上。看尽了千万只帆船都不是心上人的船。夕阳含情脉脉，江水悠悠流淌。看着长满白蘋的小洲，真是让人伤心断肠。这首词刻画了一位因等待而失望的思妇形象。",
        quiz: [{q:"“罢”的意思是？",options:["罢工","完毕/完","累","罢了"],ans:1},{q:"“皆不是”是指？",options:["都不是心上人的船","都不是船","都不是好的","都不是钱"],ans:0},{q:"“斜晖”是指？",options:["斜坡","夕阳/落日余晖","光辉","早晨"],ans:1},{q:"“肠断”形容？",options:["肚子疼","极度悲伤","肠子断了","饿了"],ans:1},{q:"这首词的主人公是？",options:["游子","思妇/等待的人","渔夫","将军"],ans:1}]
    },
    {
        id: 237, category: '六年级', title: "浪淘沙令·帘外雨潺潺", author: "五代 · 李煜", image: "浪淘沙_帘外.png",
        content: [{t:"帘外雨潺潺，春意阑珊。",m:"帘外雨声潺潺，春意已经衰残。"},{t:"罗衾不耐五更寒。",m:"丝绸锦被抵挡不住五更的寒冷。"},{t:"梦里不知身是客，",m:"梦里不知道自己是客居他乡。"},{t:"一晌贪欢。",m:"贪得片刻的欢乐。"},{t:"流水落花春去也，天上人间。",m:"流水落花春去也，今昔对比真是一个天上一个入间。"}],
        translation: "(节选)帘外雨声潺潺，春意已经衰残。丝绸锦被抵挡不住五更的寒冷。梦里不知道自己是客居他乡（俘虏），贪得片刻的欢乐。流水落花春去也，今昔对比真是一个天上一个入间。这首词表达了亡国之痛和对往事的追怀。",
        quiz: [{q:"“潺潺”形容？",options:["流水声/雨声","缠绕","大山","走路"],ans:0},{q:"“阑珊”的意思是？",options:["灿烂","衰残/将尽","栅栏","蓝色"],ans:1},{q:"“身是客”是指？",options:["做客","俘虏/囚徒","客人","主人"],ans:1},{q:"“天上人间”表达了？",options:["风景美","今昔对比/巨大的落差","想上天","距离远"],ans:1},{q:"这首词的情调是？",options:["欢快","凄凉悲痛","平静","豪迈"],ans:1}]
    },
    {
        id: 238, category: '六年级', title: "相见欢·林花谢了春红", author: "五代 · 李煜", image: "相见欢_林花.png",
        content: [{t:"林花谢了春红，太匆匆。",m:"树林间的红花谢了，春天离去太匆忙。"},{t:"无奈朝来寒雨晚来风。",m:"无奈早上寒雨，晚上又刮风。"},{t:"胭脂泪，相留醉，几时重。",m:"像胭脂一样的泪，强留人醉，何时重逢？"},{t:"自是人生长恨水长东。",m:"人生长恨就像这江水永远向东流。"}],
        translation: "树林间的红花谢了，春天离去得太匆忙。无奈早上寒雨，晚上又刮风。像胭脂一样的泪，强留人醉，何时才能重逢？人生长恨就像这江水永远向东流。这首词借伤春来抒发亡国的悲痛。",
        quiz: [{q:"“谢了春红”是指？",options:["感谢春天","花谢了","红色","谢谢红花"],ans:1},{q:"“太匆匆”感叹？",options:["走路快","美好时光/春天短暂","匆忙","人多"],ans:1},{q:"“胭脂泪”比喻？",options:["胭脂水","带血的眼泪/伤心之泪","化妆品","洗脸水"],ans:1},{q:"“水长东”比喻？",options:["水向东流","愁恨无穷无尽","长江","东海"],ans:1},{q:"这首词表达了？",options:["快乐","人生长恨/亡国之痛","惜花","醉酒"],ans:1}]
    },
    {
        id: 239, category: '六年级', title: "苏幕遮·怀旧", author: "宋 · 范仲淹", image: "苏幕遮.png",
        content: [{t:"碧云天，黄叶地。",m:"碧蓝的天空，黄叶铺满地。"},{t:"秋色连波，波上寒烟翠。",m:"秋色连着江波，波上弥漫寒烟苍翠。"},{t:"山映斜阳天接水。",m:"夕阳映照着山峦，天边连接着江水。"},{t:"芳草无情，更在斜阳外。",m:"芳草无情，长到了斜阳之外。"}],
        translation: "(节选)碧蓝的天空，黄叶铺满大地。秋色连着江波，波上弥漫寒烟苍翠。夕阳映照着山峦，天边连接着江水。芳草无情，一直长到了斜阳之外（天涯海角）。这首词描写了深秋景色，抒发了羁旅乡思。",
        quiz: [{q:"“碧云天”出自？",options:["范仲淹","王实甫","李白","杜甫"],ans:0},{q:"“寒烟翠”形容？",options:["烟火","江上雾气青翠","翠鸟","寒冷"],ans:1},{q:"“芳草”在诗词中常象征？",options:["离恨/乡愁","草地","春天","香草"],ans:0},{q:"“更在斜阳外”暗示？",options:["太阳下山了","游子在更远的地方/乡愁绵绵","外面热","看不见"],ans:1},{q:"这首词描写的季节是？",options:["春","夏","秋","冬"],ans:2}]
    },
    {
        id: 240, category: '六年级', title: "一剪梅·红藕香残玉簟秋", author: "宋 · 李清照", image: "一剪梅.png",
        content: [{t:"红藕香残玉簟秋。",m:"荷花凋谢，竹席生凉，秋天到了。"},{t:"轻解罗裳，独上兰舟。",m:"轻轻脱下罗裳，独自登上小船。"},{t:"云中谁寄锦书来？",m:"云中谁寄来锦书？"},{t:"雁字回时，月满西楼。",m:"大雁飞回的时候，月光洒满西楼。"},{t:"花自飘零水自流。",m:"花自飘零水自流。"},{t:"一种相思，两处闲愁。",m:"一种相思，两地闲愁。"},{t:"此情无计可消除，",m:"这情怀无法消除。"},{t:"才下眉头，却上心头。",m:"刚从眉头散去，又涌上心头。"}],
        translation: "荷花凋谢，竹席生凉，秋天到了。轻轻脱下罗裳，独自登上小船。云中谁寄来锦书？大雁飞回的时候，月光洒满西楼。花自飘零水自流。一种相思，两地闲愁。这情怀无法消除，刚从眉头散去，又涌上心头。这首词抒发了词人对丈夫的深切思念。",
        quiz: [{q:"“红藕”是指？",options:["红色的藕","荷花","红衣服","红纸"],ans:1},{q:"“玉簟(diàn)”是指？",options:["玉石","精美的竹席","电灯","垫子"],ans:1},{q:"“锦书”是指？",options:["锦缎","书信","书本","地图"],ans:1},{q:"“雁字”是指？",options:["大雁排成的字形","写字","燕子","大雁的名字"],ans:0},{q:"千古名句是？",options:["红藕香残","才下眉头，却上心头","独上兰舟","月满西楼"],ans:1}]
    },
    {
        id: 241, category: '六年级', title: "杂诗", author: "东晋 · 陶渊明", image: "杂诗_陶.png",
        content: [{t:"盛年不重来，",m:"青春壮年不会重来。"},{t:"一日难再晨。",m:"一天之中难有两个早晨。"},{t:"及时当勉励，",m:"应当趁时勉励自己。"},{t:"岁月不待人。",m:"岁月流逝不等人。"}],
        translation: "青春壮年不会重来，一天之中难有两个早晨。应当趁着大好时光勉励自己努力，因为岁月流逝是不会等待人的。这首诗劝勉人们要珍惜时间，奋发向上。",
        quiz: [{q:"“盛年”是指？",options:["盛夏","青壮年时期","过年","丰收年"],ans:1},{q:"“再晨”的意思是？",options:["再次早晨","再见","早晨来了","再沉下去"],ans:0},{q:"“勉励”是指？",options:["免礼","努力/鼓励","厉害","勉强"],ans:1},{q:"“不待人”的意思是？",options:["不接待人","不等人","不待见","不带人"],ans:1},{q:"这首诗的主题是？",options:["惜时/勤奋","看风景","睡觉","种田"],ans:0}]
    },
    {
        id: 242, category: '六年级', title: "菩萨蛮·平林漠漠烟如织", author: "唐 · 李白", image: "菩萨蛮_李白.png",
        content: [{t:"平林漠漠烟如织，",m:"平原上的树林烟雾迷蒙像织成的网。"},{t:"寒山一带伤心碧。",m:"寒山一带呈现出让人伤心的碧绿。"},{t:"暝色入高楼，",m:"暮色照进高楼。"},{t:"有人楼上愁。",m:"有人在楼上独自愁苦。"},{t:"玉阶空伫立，",m:"在玉石台阶上久久伫立。"},{t:"宿鸟归飞急。",m:"归巢的鸟儿急急飞回。"},{t:"何处是归程？",m:"哪里是回家的路程？"},{t:"长亭更短亭。",m:"只有那一座座长亭接短亭。"}],
        translation: "平原上的树林烟雾迷蒙像织成的网，寒山一带呈现出让人伤心的碧绿。暮色照进高楼，有人在楼上独自愁苦。在玉石台阶上久久伫立，归巢的鸟儿急急飞回。哪里是回家的路程？只有那一座座长亭接短亭。这首词描写了深秋暮色下的思乡之情。",
        quiz: [{q:"“漠漠”形容？",options:["沙漠","广阔/迷蒙","冷漠","寂寞"],ans:1},{q:"“伤心碧”运用了？",options:["拟人/移情","比喻","夸张","排比"],ans:0},{q:"“暝色”是指？",options:["脸色","暮色/夜色","明亮","颜色"],ans:1},{q:"“伫立”的意思是？",options:["站立/久立","建立","立刻","倒立"],ans:0},{q:"“长亭更短亭”暗示？",options:["亭子很多","路途遥远","亭子高低不一","修亭子"],ans:1}]
    },
    {
        id: 243, category: '六年级', title: "踏莎行·雾失楼台", author: "宋 · 秦观", image: "踏莎行.png",
        content: [{t:"雾失楼台，月迷津渡。",m:"雾气淹没了楼台，月色迷漫了渡口。"},{t:"桃源望断无寻处。",m:"望眼欲穿也找不到桃花源。"},{t:"可堪孤馆闭春寒，",m:"怎能忍受孤馆中紧闭的春寒。"},{t:"杜鹃声里斜阳暮。",m:"在杜鹃啼声中斜阳迟暮。"},{t:"驿寄梅花，鱼传尺素。",m:"驿站寄来梅花，鱼传读书信。"},{t:"砌成此恨无重数。",m:"堆砌成这无重数的恨意。"},{t:"郴江幸自绕郴山，",m:"郴江幸好绕着郴山流。"},{t:"为谁流下潇湘去。",m:"它是为谁流下潇湘去的呢？"}],
        translation: "(节选)雾气淹没了楼台，月色迷漫了渡口，望眼欲穿也找不到理想的桃花源。驿站寄来梅花，鱼传读书信，堆砌成这无重数的恨意。郴江幸好绕着郴山流，它是为谁流下潇湘去的呢？这首词抒发了词人被贬后的凄苦和离愁。",
        quiz: [{q:"“津渡”是指？",options:["渡口","天津","过河","津津有味"],ans:0},{q:"“桃源”喻指？",options:["桃树林","理想的避世之地","源头","花园"],ans:1},{q:"“尺素”是指？",options:["尺子","素菜","书信","布料"],ans:2},{q:"“砌”字形象地写出了？",options:["砌墙","愁恨的堆积/繁多","整齐","切菜"],ans:1},{q:"“潇湘”代指？",options:["湖南/贬谪之地","潇洒","湘江","两个人"],ans:0}]
    },
    // 一年级
    {
        id: 244, category: '一年级', title: "华山", author: "宋 · 寇准", image: "华山.png",
        content: [{t:"只有天在上，",m:"华山高耸，只有天在它的上面。"},{t:"更无山与齐。",m:"再也没有别的山能和它平齐。"},{t:"举头红日近，",m:"抬头望去，红日离得很近。"},{t:"回首白云低。",m:"回过头看，白云都在脚下飘浮。"}],
        translation: "华山高耸入云，只有青天在它的上面，世间再也没有哪座山能和它平齐。站在山顶抬头望去，红日仿佛近在咫尺；回过头看，连白云都在脚下飘浮。这首诗是寇准七岁时的咏物诗，描绘了华山的雄伟高峻。",
        quiz: [{q:"“齐”的意思是？",options:["整齐","平齐/一样高","一起","奇怪"],ans:1},{q:"“举头”和“回首”表现了？",options:["脖子酸","站在山顶俯仰观察","在做操","找东西"],ans:1},{q:"“红日近”说明？",options:["天气热","山很高/离太阳近","太阳掉下来了","看错了"],ans:1},{q:"“白云低”是因为？",options:["云很少","下雨了","人站在高处","云怕人"],ans:2},{q:"这首诗赞美了？",options:["太阳","白云","华山的高峻","天空"],ans:2}]
    },

    // 二年级
    {
        id: 245, category: '二年级', title: "池上二绝(其一)", author: "唐 · 白居易", image: "池上二绝.png",
        content: [{t:"山僧对棋坐，",m:"山里的僧人对着棋盘而坐。"},{t:"局上竹阴清。",m:"棋局上笼罩着竹影清阴。"},{t:"映竹无人见，",m:"映照在竹林里没人看见。"},{t:"时闻下子声。",m:"只偶尔听到敲击棋子的声音。"}],
        translation: "两个僧人静静地对着棋盘而坐，棋局上笼罩着竹林的清阴。他们在竹林掩映下下棋，没人看见，只能偶尔听到敲击棋子的清脆声音。这首诗描写了山僧下棋的幽静雅致。",
        quiz: [{q:"“对棋坐”是在？",options:["发呆","下棋","吃饭","睡觉"],ans:1},{q:"“竹阴”是指？",options:["竹子的影子/树荫","竹子背面","阴天","竹笋"],ans:0},{q:"“无人见”突出了？",options:["环境幽静/隐蔽","人走了","看不见","天黑了"],ans:0},{q:"“下子声”是指？",options:["下雨声","落棋子的声音","鸟叫声","说话声"],ans:1},{q:"这首诗给人的感觉是？",options:["吵闹","幽静/闲适","悲伤","紧张"],ans:1}]
    },

    // 三年级
    {
        id: 246, category: '三年级', title: "送灵澈上人", author: "唐 · 刘长卿", image: "送灵澈上人.png",
        content: [{t:"苍苍竹林寺，",m:"在苍翠的竹林寺。"},{t:"杳杳钟声晚。",m:"远远传来傍晚的钟声。"},{t:"荷笠带斜阳，",m:"背着斗笠披着斜阳余晖。"},{t:"青山独归远。",m:"独自向着青山深处归去。"}],
        translation: "苍翠的竹林寺，远远传来傍晚深沉的钟声。灵澈上人背着斗笠，披着斜阳的余晖，独自向着青山深处走远了。这首诗构建了一种清远幽微的意境，寄托了诗人对友人的闲情逸致的欣赏。",
        quiz: [{q:"“苍苍”形容？",options:["苍老","深青色/茂盛","白色","天空"],ans:1},{q:"“杳杳(yǎo)”形容？",options:["听不见","声音悠远/深远","要不然","咬人"],ans:1},{q:"“荷笠”是指？",options:["荷花和斗笠","背着斗笠","戴着帽子","拿着荷花"],ans:1},{q:"“独归远”的主角是？",options:["作者","灵澈上人","路人","鸟"],ans:1},{q:"这首诗属于？",options:["送别诗","边塞诗","咏物诗","讽刺诗"],ans:0}]
    },

    // 四年级
    {
        id: 247, category: '四年级', title: "春日偶成", author: "宋 · 程颢", image: "春日偶成.png",
        content: [{t:"云淡风轻近午天，",m:"云儿淡，风儿轻，接近中午时分。"},{t:"傍花随柳过前川。",m:"依着花，顺着柳，走过前面的河川。"},{t:"时人不识余心乐，",m:"当时的人不懂我心里的快乐。"},{t:"将谓偷闲学少年。",m:"还以为我是忙里偷闲学少年游玩。"}],
        translation: "云儿淡，风儿轻，接近中午时分，我穿行在花丛柳林间，走过前面的河川。旁人不懂我此时心里的快乐，还以为我像少年人一样，是忙里偷闲来玩耍呢。这首诗描写了诗人春日郊游的愉快心情。",
        quiz: [{q:"“偶成”的意思是？",options:["偶然写成","做成偶人","成双成对","偶尔成功"],ans:0},{q:"“傍”和“随”表达了？",options:["依靠","亲近自然/随兴游玩","旁边","跟随"],ans:1},{q:"“余”是指？",options:["多余","我","剩下","鱼"],ans:1},{q:"“将谓”的意思是？",options:["将军","只以为/认为","将来","谓语"],ans:1},{q:"诗人真正快乐的原因是？",options:["不用工作","领悟自然理趣","学少年","偷懒"],ans:1}]
    },

    // 五年级
    {
        id: 248, category: '五年级', title: "如梦令·昨夜雨疏风骤", author: "宋 · 李清照", image: "如梦令_昨夜.png",
        content: [{t:"昨夜雨疏风骤，",m:"昨夜雨点稀疏，晚风急骤。"},{t:"浓睡不消残酒。",m:"沉睡一夜也没消解酒意。"},{t:"试问卷帘人，",m:"试探着问正在卷帘的侍女。"},{t:"却道海棠依旧。",m:"她却说海棠花依然如旧。"},{t:"知否，知否？",m:"知道吗？知道吗？"},{t:"应是绿肥红瘦。",m:"应是绿叶繁茂，红花凋零。"}],
        translation: "昨夜雨点稀疏，晚风急骤，我沉睡一夜，醒来也没完全消解酒意。试探着问正在卷帘的侍女窗外情况，她却说海棠花依然如旧。知道吗？知道吗？经过一夜风雨，应该是绿叶繁茂，红花凋零了啊。这首词委婉地表达了惜花伤春之情。",
        quiz: [{q:"“雨疏风骤”是指？",options:["雨大风小","雨点稀疏风刮得急","风雨都停了","天气好"],ans:1},{q:"“浓睡”是指？",options:["睡得很香","假装睡","没睡着","想睡觉"],ans:0},{q:"“卷帘人”是指？",options:["客人","侍女/丫鬟","作者","做窗帘的人"],ans:1},{q:"“绿肥红瘦”形容？",options:["肥肉和瘦肉","绿叶繁茂，红花凋零","颜色深浅","衣服大小"],ans:1},{q:"这首词表达了？",options:["惜花伤春","喜欢喝酒","关心天气","责怪侍女"],ans:0}]
    },
    {
        id: 249, category: '五年级', title: "月夜", author: "唐 · 杜甫", image: "月夜_杜甫.png",
        content: [{t:"今夜鄜州月，",m:"今夜在鄜州的月亮。"},{t:"闺中只独看。",m:"妻子在闺房中只能独自观看。"},{t:"遥怜小儿女，",m:"远方可怜的小儿女。"},{t:"未解忆长安。",m:"还不懂得母亲在思念长安的父亲。"},{t:"香雾云鬟湿，",m:"蒙蒙雾气打湿了她的秀发。"},{t:"清辉玉臂寒。",m:"清冷月光照得她玉臂生寒。"},{t:"何时倚虚幌，",m:"何时才能一起靠在薄帷下。"},{t:"双照泪痕干。",m:"月光照着我们俩，擦干离别泪痕。"}],
        translation: "今夜鄜州的月亮，妻子在闺房中只能独自观看。可怜幼小的儿女，还不懂得母亲在思念被困长安的父亲。蒙蒙雾气打湿了她的秀发，清冷月光照得她玉臂生寒。什么时候才能一起靠在薄帷下，让月光照着我们俩，互诉衷肠，擦干离别的泪痕。这首诗借想象妻子思念自己，表达了对家人的深切思念。",
        quiz: [{q:"“鄜(fū)州”是？",options:["杜甫所在的地方","妻儿所在的地方","长安","杭州"],ans:1},{q:"“闺中”是指？",options:["柜子里","妻子的居室","回家","归来"],ans:1},{q:"“未解”是指？",options:["不懂得","没解开","没解决","不知道"],ans:0},{q:"“双照”表达了？",options:["两个灯","团聚/夫妻重逢","很亮","照镜子"],ans:1},{q:"这首诗独特的写法是？",options:["直抒胸臆","从对方写起/对面落笔","写景","叙事"],ans:1}]
    },

    // 六年级
    {
        id: 250, category: '六年级', title: "采薇(节选)", author: "诗经", image: "采薇.png",
        content: [{t:"昔我往矣，杨柳依依。",m:"回想当初我出征时，杨柳随风轻飏。"},{t:"今我来思，雨雪霏霏。",m:"如今我再回故乡，大雪纷飞。"},{t:"行道迟迟，载渴载饥。",m:"道路泥泞难行，又渴又饥。"},{t:"我心伤悲，莫知我哀。",m:"我内心满怀伤悲，没人知道我的痛苦。"}],
        translation: "(节选)回想当初我出征时，杨柳依依随风飘扬。如今我罢战归来，大雪纷纷扬扬。道路泥泞步履艰难，又渴又饥。我内心满怀伤悲，没有谁知道我的痛苦。这首诗描写了戍卒归乡途中的艰辛和悲伤。",
        quiz: [{q:"“往”和“来”是指？",options:["去和回/出征和归乡","往来","交往","走路"],ans:0},{q:"“依依”形容？",options:["依靠","柳枝随风轻飏/留恋","衣服","很多"],ans:1},{q:"“雨雪霏霏”的“雨”读作？",options:["yǔ","yù(动词，下)","yú","yū"],ans:1},{q:"“迟迟”形容？",options:["迟到","走路缓慢/艰难","晚了","痴呆"],ans:1},{q:"这首诗表达了？",options:["爱国","征夫的艰辛和悲伤","喜欢雪","想吃东西"],ans:1}]
    },
    {
        id: 251, category: '六年级', title: "木兰诗(节选)", author: "北朝民歌", image: "木兰诗.png",
        content: [{t:"唧唧复唧唧，木兰当户织。",m:"织布机声一声接一声，木兰对着门在织布。"},{t:"不闻机杼声，惟闻女叹息。",m:"听不到织布的声音，只听到女儿在叹息。"},{t:"问女何所思，问女何所忆。",m:"问女儿在想什么，问女儿在回忆什么。"},{t:"女亦无所思，女亦无所忆。",m:"女儿也没想什么，女儿也没回忆什么。"},{t:"昨夜见军帖，可汗大点兵。",m:"昨夜看见征兵文书，可汗大规模征兵。"},{t:"军书十二卷，卷卷有爷名。",m:"征兵名册很多卷，卷卷都有父亲的名字。"},{t:"阿爷无大儿，木兰无长兄。",m:"父亲没有大儿子，木兰没有大哥哥。"},{t:"愿为市鞍马，从此替爷征。",m:"愿意为此去买马和鞍具，从此替父亲去出征。"}],
        translation: "(节选)织布机声一声接一声，木兰对着门在织布。听不到织布的声音，只听到女儿在叹息。问女儿在想什么？女儿说：昨夜看见征兵文书，可汗大规模征兵。名册卷卷都有父亲的名字。父亲没有大儿子，木兰没有大哥哥。我愿意去买马和鞍具，从此替父亲去出征。这首民歌讲述了花木兰代父从军的故事。",
        quiz: [{q:"“唧唧”是指？",options:["鸟叫","虫叫","织布机声/叹息声","说话声"],ans:2},{q:"“机杼”是指？",options:["飞机","织布机","机会","柱子"],ans:1},{q:"木兰为什么叹息？",options:["累了","担心父亲/征兵的事","不想织布","生病了"],ans:1},{q:"“市”在这里意思是？",options:["城市","市场","买","卖"],ans:2},{q:"木兰决定做什么？",options:["逃跑","哭泣","替爷征/代父从军","结婚"],ans:2}]
    },
    {
        id: 252, category: '六年级', title: "卖炭翁(节选)", author: "唐 · 白居易", image: "卖炭翁.png",
        content: [{t:"卖炭翁，伐薪烧炭南山中。",m:"卖炭的老翁，在南山砍柴烧炭。"},{t:"满面尘灰烟火色，",m:"满脸灰尘显出被烟熏火烤的颜色。"},{t:"两鬓苍苍十指黑。",m:"两鬓苍白十指漆黑。"},{t:"卖炭得钱何所营？",m:"卖炭得来的钱打算做什么？"},{t:"身上衣裳口中食。",m:"为了身上的衣服和口中的食物。"},{t:"可怜身上衣正单，",m:"可怜他身上衣服正单薄。"},{t:"心忧炭贱愿天寒。",m:"心里担心炭价便宜，反而希望能天寒。"}],
        translation: "(节选)卖炭的老翁，在南山里砍柴烧炭。他满脸灰尘，显出被烟熏火烤的颜色，两鬓苍白十指漆黑。卖炭得来的钱打算做什么？为了买身上的衣服和口中的食物。可怜他身上衣服正单薄，因为担心炭价便宜，反而希望能天更冷一些。这首诗揭露了“宫市”对百姓的掠夺，表达了对劳动人民的深切同情。",
        quiz: [{q:"“伐薪”是指？",options:["发薪水","砍柴","辛苦","新衣服"],ans:1},{q:"“何所营”的意思是？",options:["去哪里兵营","做什么用/谋求什么","怎么营业","哪里赢了"],ans:1},{q:"老翁的外貌特点是？",options:["干净帅气","满面尘灰/苍苍黑","强壮","富有"],ans:1},{q:"最能体现老翁矛盾心理的是？",options:["卖炭得钱何所营","心忧炭贱愿天寒","伐薪烧炭南山中","两鬓苍苍"],ans:1},{q:"这首诗反映了什么社会问题？",options:["环保","宫市掠夺/百姓疾苦","天气寒冷","炭价波动"],ans:1}]
    },
    {
        id: 253, category: '六年级', title: "将进酒(节选)", author: "唐 · 李白", image: "将进酒.png",
        content: [{t:"君不见，黄河之水天上来，",m:"你没看见吗？黄河之水从天上奔腾而来。"},{t:"奔流到海不复回。",m:"奔流到海再也不复回。"},{t:"君不见，高堂明镜悲白发，",m:"你没看见吗？高堂明镜中悲叹白发。"},{t:"朝如青丝暮成雪。",m:"早晨还像青丝，傍晚就成了雪白。"},{t:"人生得意须尽欢，",m:"人生得意时要尽情欢乐。"},{t:"莫使金樽空对月。",m:"不要让金杯空对着月亮。"},{t:"天生我材必有用，",m:"上天生下我这块材料必定有用。"},{t:"千金散尽还复来。",m:"千金散尽了还会再回来。"}],
        translation: "(节选)你没看见吗？黄河之水从天上奔腾而来，奔流到海再也不复回。你没看见吗？高堂明镜中悲叹白发，早晨还像青丝，傍晚就成了雪白。人生得意时要尽情欢乐，不要让金杯空对着月亮。上天生下我这块材料必定有用，千金散尽了还会再回来。这首诗展现了李白豪迈洒脱、怀才不遇却又自信乐观的复杂情怀。",
        quiz: [{q:"“将(qiāng)进酒”意思是？",options:["将来去喝酒","请喝酒","拿着酒","酒进来了"],ans:1},{q:"“朝如青丝暮成雪”运用了？",options:["夸张/比喻","拟人","排比","反问"],ans:0},{q:"“金樽”是指？",options:["金子","酒杯","尊敬","尊贵"],ans:1},{q:"千古名句是？",options:["天生我材必有用","奔流到海不复回","人生得意须尽欢","以上都是"],ans:3},{q:"这首诗的情感基调是？",options:["悲伤绝望","豪迈奔放/自信","平淡","愤怒"],ans:1}]
    },
    {
        id: 254, category: '五年级', title: "贾生", author: "唐 · 李商隐", image: "贾生.png",
        content: [{t:"宣室求贤访逐臣，",m:"汉文帝在宣室求贤，召见被贬臣子。"},{t:"贾生才调更无伦。",m:"贾谊的才华气度更是无与伦比。"},{t:"可怜夜半虚前席，",m:"可惜夜半听得入神，膝盖移向如前。"},{t:"不问苍生问鬼神。",m:"不问苍生百姓之事，只问鬼神之事。"}],
        translation: "汉文帝在宣室求贤，召见被贬臣子贾谊。贾谊的才华气度更是无与伦比。可惜文帝夜半听得入神，虚心向前移席，最后却不是问苍生百姓之事，而是问鬼神之事。这首诗借古讽今，讽刺晚唐统治者求仙访道，不顾民生，也寄托了诗人怀才不遇的感慨。",
        quiz: [{q:"“逐臣”是指？",options:["追赶臣子","被贬谪的臣子/贾谊","大臣","跑步的人"],ans:1},{q:"“才调”是指？",options:["才华气度","调子","才干","调整"],ans:0},{q:"“虚前席”说明？",options:["席子是空的","皇帝听得入神/重视","虚心","前面有席子"],ans:1},{q:"皇帝最后问了什么？",options:["苍生","鬼神","治国之道","身体健康"],ans:1},{q:"这首诗讽刺了？",options:["贾谊","鬼神","统治者不问苍生/不重真才","迷信"],ans:2}]
    },
    {
        id: 255, category: '六年级', title: "寄扬州韩绰判官", author: "唐 · 杜牧", image: "寄扬州.png",
        content: [{t:"青山隐隐水迢迢，",m:"青山隐隐约约，绿水千里迢迢。"},{t:"秋尽江南草未凋。",m:"秋天已尽，江南的草木还没凋落。"},{t:"二十四桥明月夜，",m:"二十四桥明月照耀的晚上。"},{t:"玉人何处教吹箫？",m:"你这位美人现在何处教人吹箫？"}],
        translation: "青山隐隐约约，绿水千里迢迢。虽然秋天已尽，但江南的草木还没有凋落。在二十四桥明月照耀的晚上，老朋友你现在何处教人吹箫作乐呢？这首诗描写了江南秀丽的景色，表达了对友人的思念和调侃。",
        quiz: [{q:"“迢迢”形容？",options:["近","水长路远","跳舞","挑剔"],ans:1},{q:"“草未凋”说明？",options:["江南气候温暖","草死了","秋天没来","草很多"],ans:0},{q:"“二十四桥”在？",options:["杭州","扬州","苏州","北京"],ans:1},{q:"“玉人”是指？",options:["玉做的像","美人/指韩绰","做玉的人","作者"],ans:1},{q:"这首诗的语调是？",options:["严肃","悲伤","轻松/调侃","愤怒"],ans:2}]
    },
    {
        id: 256, category: '六年级', title: "西塞山怀古", author: "唐 · 刘禹锡", image: "西塞山怀古.png",
        content: [{t:"王浚楼船下益州，",m:"王浚率领楼船大军顺流直下益州。"},{t:"金陵王气黯然收。",m:"金陵的王气黯然消散。"},{t:"千寻铁锁沉江底，",m:"千丈长的铁锁沉入江底。"},{t:"一片降幡出石头。",m:"一片投降的旗帜挂在石头城头。"},{t:"人世几回伤往事，",m:"人世间多少次感伤往事。"},{t:"山形依旧枕寒流。",m:"只有山形依旧枕着寒流。"},{t:"从今四海为家日，",m:"从此四海一家，天下统一。"},{t:"故垒萧萧芦荻秋。",m:"旧日的营垒在秋风芦荻中一片萧瑟。"}],
        translation: "王浚率领楼船大军顺流直下益州，金陵的王气黯然消散。千丈长的铁锁沉入江底，一片投降的旗帜挂在石头城头。人世间多少次感伤往事，只有山形依旧枕着寒流。从此四海一家，天下统一，旧日的营垒在秋风芦荻中一片萧瑟。这首诗咏史怀古，感叹历史兴亡，警示后人。",
        quiz: [{q:"“楼船”是指？",options:["楼房","高大的战船","游船","木船"],ans:1},{q:"“金陵”是指？",options:["北京","南京","西安","洛阳"],ans:1},{q:"“降幡”是指？",options:["投降的旗帜","香蕉","降落伞","翻过来"],ans:0},{q:"“枕寒流”运用了？",options:["拟人","比喻","夸张","排比"],ans:0},{q:"这首诗借古喻今，意在？",options:["看风景","怀念王浚","警示统治者/感叹兴亡","想去金陵"],ans:2}]
    },
    {
        id: 257, category: '六年级', title: "江城子·乙卯正月二十日夜记梦", author: "宋 · 苏轼", image: "江城子_记梦.png",
        content: [{t:"十年生死两茫茫，",m:"两人一生一死，隔绝十年，相互茫然。"},{t:"不思量，自难忘。",m:"不去思念，却也终究难忘。"},{t:"千里孤坟，无处话凄凉。",m:"千里之外的孤坟，无处诉说凄凉。"},{t:"纵使相逢应不识，",m:"即使相逢也应该认不出我了。"},{t:"尘满面，鬓如霜。",m:"我满面尘土，两鬓如霜。"},{t:"夜来幽梦忽还乡，",m:"夜里做梦忽然回到了家乡。"},{t:"小轩窗，正梳妆。",m:"在小轩窗前，你正在梳妆。"},{t:"相顾无言，惟有泪千行。",m:"互相看着无话可说，只有泪流千行。"},{t:"料得年年肠断处，",m:"料想年年断肠的地方。"},{t:"明月夜，短松冈。",m:"就是明月夜里的短松冈。"}],
        translation: "(节选)两人一生一死，隔绝十年，相互茫然。不去刻意思念，却也终究难忘。千里之外的孤坟，无处诉说凄凉。即使相逢也应该认不出我了，我满面尘土，两鬓如霜。夜里做梦忽然回到了家乡，在小轩窗前，你正在梳妆。互相看着无话可说，只有泪流千行。这首词是苏轼悼念亡妻的千古绝唱，情真意切，催人泪下。",
        quiz: [{q:"“生死两茫茫”是指？",options:["看不见","生者和死者都不知道对方情况","迷茫","忙碌"],ans:1},{q:"“不思量”是因为？",options:["不想","忘记了","深埋心底/不敢碰触","没时间"],ans:2},{q:"“尘满面，鬓如霜”形容？",options:["脏了","苍老/饱经风霜","下雪了","化妆"],ans:1},{q:"“短松冈”是指？",options:["山冈","松树林","妻子长眠之地/坟墓","地名"],ans:2},{q:"这是一首？",options:["悼亡词","送别词","边塞词","咏物词"],ans:0}]
    },
    {
        id: 258, category: '六年级', title: "沈园(其一)", author: "宋 · 陆游", image: "沈园.png",
        content: [{t:"城上斜阳画角哀，",m:"城墙上斜阳映照，画角声哀怨。"},{t:"沈园非复旧池台。",m:"沈园已不再是旧日的池台。"},{t:"伤心桥下春波绿，",m:"伤心桥下的春水依然碧绿。"},{t:"曾是惊鸿照影来。",m:"曾映照过她像惊鸿一样的倩影。"}],
        translation: "城墙上斜阳映照，画角声哀怨悲凉。沈园已不再是旧日的池台。令人伤心的桥下，春水依然碧绿，曾映照过她（唐婉）像惊鸿一样的倩影。这首诗是陆游晚年重游沈园，怀念前妻唐婉所作，充满了凄凉悲伤之情。",
        quiz: [{q:"“画角”是指？",options:["画画的角","一种乐器/号角","角落","牛角"],ans:1},{q:"“非复”的意思是？",options:["不再是","恢复","非常","重复"],ans:0},{q:"“惊鸿”比喻？",options:["大雁","受惊的鸟","体态轻盈的美女/唐婉","洪水"],ans:2},{q:"“照影来”是指？",options:["照镜子","影子照在水里","拍照","灯光"],ans:1},{q:"这首诗表达了？",options:["快乐","对亡妻的深切怀念/爱情悲剧","看风景","后悔"],ans:1}]
    },
    {
        id: 259, category: '六年级', title: "十五从军征", author: "汉乐府", image: "十五从军征.png",
        content: [{t:"十五从军征，八十始得归。",m:"十五岁去参军，八十岁才回来。"},{t:"道逢乡里人：家中有阿谁？",m:"路上碰到乡里人：家里还有谁？"},{t:"遥看是君家，松柏冢累累。",m:"远远看那就是你家，只有松柏和坟墓。"},{t:"兔从狗窦入，雉从梁上飞。",m:"兔子从狗洞钻进，野鸡在屋梁上飞。"},{t:"中庭生旅谷，井上生旅葵。",m:"院子里长满野谷，井台上长满野葵。"},{t:"舂谷持作饭，采葵持作羹。",m:"舂谷做饭，采葵做汤。"},{t:"羹饭一时熟，不知贻阿谁？",m:"饭菜做好了，不知送给谁吃？"},{t:"出门东向望，泪落沾我衣。",m:"出门向东张望，泪水打湿了衣服。"}],
        translation: "(节选)十五岁去参军，八十岁才回来。路上碰到乡里人问：家里还有谁？远远看那就是你家，只有松柏和坟墓。兔子从狗洞钻进，野鸡在屋梁上飞。饭菜做好了，不知送给谁吃？出门向东张望，泪水打湿了衣服。这首诗控诉了兵役制度给人民带来的深重灾难。",
        quiz: [{q:"“始得归”说明？",options:["刚回来","终于能回来/时间长","开始回来","不想回来"],ans:1},{q:"“冢累累”是指？",options:["累了","很多坟墓","石头","果实"],ans:1},{q:"“兔从狗窦入”描写了？",options:["动物可爱","房屋破败/荒凉","生态好","养宠物"],ans:1},{q:"“贻(yí)”的意思是？",options:["遗留","赠送/给","怀疑","吃"],ans:1},{q:"这首诗的主题是？",options:["战争的残酷/家破人亡","退伍快乐","田园生活","做饭"],ans:0}]
    },
    // 一年级
    {
        id: 260, category: '一年级', title: "春怨", author: "唐 · 金昌绪", image: "春怨.png",
        content: [{t:"打起黄莺儿，",m:"早晨起来赶走树上的黄莺。"},{t:"莫教枝上啼。",m:"不让它在枝头乱叫。"},{t:"啼时惊妾梦，",m:"它的叫声会惊破我的好梦。"},{t:"不得到辽西。",m:"害得我不能在梦里去辽西看望亲人。"}],
        translation: "清晨起来赶走树上的黄莺，不许它们在枝头乱叫。因为它们的叫声会惊醒我的好梦，让我不能在梦中去辽西看望在边疆的亲人。这首诗以清新活泼的语言，含蓄地表达了思妇对征夫的思念。",
        quiz: [{q:"“莫教”的意思是？",options:["不要教书","不要让","莫非","教育"],ans:1},{q:"为什么要“打起黄莺儿”？",options:["想吃鸟","鸟叫声吵醒了梦","练武功","讨厌鸟"],ans:1},{q:"“妾”是指？",options:["作者","女子自称","侍女","客人"],ans:1},{q:"想去“辽西”干什么？",options:["看风景","打仗","看望征夫","旅游"],ans:2},{q:"这首诗的情感是？",options:["快乐","思念","愤怒","害怕"],ans:1}]
    },
    {
        id: 261, category: '一年级', title: "题画", author: "明 · 沈周", image: "题画.png",
        content: [{t:"碧水丹山映杖藜，",m:"碧绿的水，红色的山，映照着拄杖的老人。"},{t:"夕阳犹在小桥西。",m:"夕阳还挂在小桥的西边。"},{t:"微吟不道惊溪鸟，",m:"低声吟诗不觉得惊动了溪边的鸟。"},{t:"飞入乱云深处啼。",m:"鸟儿飞入乱云深处啼叫起来。"}],
        translation: "碧水丹山映照着拄杖游览的老人，夕阳还挂在小桥西边。我低声吟诗，没想到惊动了溪边的水鸟，它们扑棱棱飞入乱云深处啼叫起来。这首诗描写了诗人在山水间吟诗游览的闲情逸致。",
        quiz: [{q:"“丹山”是指？",options:["红色的山/枫叶红了","丹顶鹤","单座山","担子"],ans:0},{q:"“杖藜”是指？",options:["梨树","拐杖/拄杖的老人","离开","篱笆"],ans:1},{q:"“微吟”是在？",options:["喝酒","小声吟诗","微笑","叹气"],ans:1},{q:"鸟儿为什么飞走？",options:["被人抓","被吟诗声惊动","天黑了","下雨了"],ans:1},{q:"这首诗描写了？",options:["战争","游览山水的雅趣","劳动","送别"],ans:1}]
    },

    // 二年级
    {
        id: 262, category: '二年级', title: "雨过山村", author: "唐 · 王建", image: "雨过山村.png",
        content: [{t:"雨里鸡鸣一两家，",m:"雨中传来一两家村舍的鸡叫声。"},{t:"竹溪村路板桥斜。",m:"竹丛溪边，村路蜿蜒，板桥歪斜。"},{t:"妇姑相唤浴蚕去，",m:"婆媳互相呼唤着去浸洗蚕种。"},{t:"闲着中庭栀子花。",m:"只有院子里的栀子花闲着开在雨中。"}],
        translation: "雨中传来一两家村舍的鸡叫声，竹溪穿过村路，板桥歪歪斜斜。婆媳互相呼唤着去浸洗蚕种，只有院子里的栀子花闲着开在雨中。这首诗描写了山村春雨中繁忙而宁静的景象。",
        quiz: [{q:"“浴蚕”是指？",options:["给蚕洗澡","浸洗蚕种","吃蚕豆","养蚕"],ans:1},{q:"“板桥斜”形容？",options:["桥坏了","路和桥蜿蜒曲折","斜坡","看错了"],ans:1},{q:"谁“闲着”？",options:["农夫","妇姑","栀子花","鸡"],ans:2},{q:"这首诗表现了？",options:["农忙","懒惰","花香","雨大"],ans:0},{q:"描写的地点是？",options:["城市","山村","海边","沙漠"],ans:1}]
    },
    {
        id: 263, category: '二年级', title: "社日", author: "唐 · 王驾", image: "社日.png",
        content: [{t:"鹅湖山下稻粱肥，",m:"鹅湖山下稻梁长得肥硕。"},{t:"豚栅鸡栖半掩扉。",m:"猪圈鸡舍的门半掩着。"},{t:"桑柘影斜春社散，",m:"夕阳西斜，桑树影子拉长，春社散场。"},{t:"家家扶得醉人归。",m:"家家户户都搀扶着喝醉的人回家。"}],
        translation: "鹅湖山下稻梁长得肥硕，猪圈鸡舍的门半掩着。夕阳西斜，桑树影子拉长，春社散场了，家家户户都搀扶着喝醉的人回家。这首诗描写了农村社日祭祀后欢宴的场景，反映了丰收的喜悦。",
        quiz: [{q:"“稻粱肥”预示着？",options:["胖了","丰收","肥料","浪费"],ans:1},{q:"“春社”是？",options:["春天的社会","祭祀土地神的节日","出版社","射箭"],ans:1},{q:"为什么“家家扶得醉人归”？",options:["路滑","社日欢宴喝醉了/民风淳朴","生病了","打架了"],ans:1},{q:"“豚栅”是指？",options:["猪圈","栅栏","海豚","吞下"],ans:0},{q:"这首诗表达了？",options:["农民的辛苦","节日欢乐/丰收在望","讨厌喝酒","风景好"],ans:1}]
    },
    {
        id: 264, category: '二年级', title: "花影", author: "宋 · 苏轼", image: "花影.png",
        content: [{t:"重重叠叠上瑶台，",m:"亭台楼阁上花影重重叠叠。"},{t:"几度呼童扫不开。",m:"几次叫童子去打扫都扫不走。"},{t:"刚被太阳收拾去，",m:"傍晚太阳下山，刚把花影收走。"},{t:"又教明月送将来。",m:"明月升起，又把花影送了来。"}],
        translation: "亭台楼阁上花影重重叠叠，几次叫童子去打扫都扫不走。傍晚太阳下山，刚把花影收走，明月升起，又把花影送了来。这首诗表面写花影，实则暗喻了诗人对生活中挥之不去的烦恼（或小人当道）的无奈。",
        quiz: [{q:"为什么“扫不开”？",options:["扫帚坏了","童子偷懒","是影子不是实体","花太多"],ans:2},{q:"“瑶台”是指？",options:["神仙住处/精美的楼台","舞台","阳台","桌子"],ans:0},{q:"谁把花影“收拾去”？",options:["童子","太阳/落日","风","清洁工"],ans:1},{q:"谁又把花影“送将来”？",options:["明月","客人","春风","邻居"],ans:0},{q:"这首诗是一首？",options:["咏物诗/哲理诗","叙事诗","送别诗","边塞诗"],ans:0}]
    },

    // 三年级
    {
        id: 265, category: '三年级', title: "雪梅·其二", author: "宋 · 卢梅坡", image: "雪梅_其二.png",
        content: [{t:"有梅无雪不精神，",m:"只有梅花没有雪，梅花也显得没精神。"},{t:"有雪无诗俗了人。",m:"有了雪没有诗，人也显得俗气。"},{t:"日暮诗成天又雪，",m:"傍晚诗做成了，天又下起了雪。"},{t:"与梅并作十分春。",m:"雪梅诗三者合一，构成了十分的春色。"}],
        translation: "只有梅花没有雪，梅花也显得没精神；有了雪没有诗，人也显得俗气。傍晚诗做成了，天又下起了雪，雪、梅、诗三者结合，才构成了最完美的春色。这首诗阐述了梅、雪、诗三者之间的关系。",
        quiz: [{q:"“不精神”的意思是？",options:["生病了","没有神采/韵味","疯了","不经意"],ans:1},{q:"“俗了人”是指？",options:["人变俗气/缺乏雅趣","人俗家","风俗","人多了"],ans:0},{q:"诗人认为最完美的春色是？",options:["只有梅","只有雪","梅、雪、诗三者结合","只有诗"],ans:2},{q:"“十分春”形容？",options:["十分钟","春天到了","春意正浓/完美","十分钱"],ans:2},{q:"这首诗紧承前一首《雪梅》的主题是？",options:["梅雪争春","梅雪互补","梅雪打架","都不重要"],ans:1}]
    },
    {
        id: 266, category: '三年级', title: "泛舟", author: "宋 · 朱熹", image: "泛舟.png",
        content: [{t:"昨夜江边春水生，",m:"昨夜江边春水大涨。"},{t:"蒙冲巨舰一毛轻。",m:"巨大的战舰也像羽毛一样轻。"},{t:"向来枉费推移力，",m:"往日白白浪费了推移的力气。"},{t:"此日中流自在行。",m:"今天在江心自在地漂行。"}],
        translation: "昨夜江边春水大涨，那一艘艘巨大的战舰，现在浮在水面上就像羽毛一样轻。往日水浅时，我们白白花费了许多力气去推船，今天水涨了，船在江心自在地漂行。这首诗借泛舟讲道理，告诉我们做事要顺应时势，积累力量。",
        quiz: [{q:"“春水生”是指？",options:["春天生孩子","春水上涨","生水","水草生"],ans:1},{q:"“蒙冲”是指？",options:["古代战船","冲动","蒙在鼓里","冲洗"],ans:0},{q:"“一毛轻”用了？",options:["比喻/夸张","拟人","排比","设问"],ans:0},{q:"为什么“自在行”？",options:["船轻","水涨船高/顺势而为","有马达","没人"],ans:1},{q:"这首诗告诉我们？",options:["要锻炼身体","要造大船","顺应规律/厚积薄发","喜欢游泳"],ans:2}]
    },
    {
        id: 267, category: '三年级', title: "闲居初夏午睡起", author: "宋 · 杨万里", image: "闲居初夏.png",
        content: [{t:"梅子留酸软齿牙，",m:"吃过梅子后牙齿酸软。"},{t:"芭蕉分绿上窗纱。",m:"芭蕉的绿色映照在窗纱上。"},{t:"日长睡起无情思，",m:"夏日昼长，午睡醒来慵懒无聊。"},{t:"闲看儿童捉柳花。",m:"闲看着儿童在追捉柳絮。"}],
        translation: "吃过梅子后牙齿酸软，芭蕉的绿色映照在窗纱上。夏日昼长，午睡醒来慵懒无聊，闲看着儿童在追捉柳絮。这首诗描写了初夏午后闲适、慵懒的生活情趣。",
        quiz: [{q:"“软齿牙”是因为？",options:["牙不好","梅子酸","吃糖","睡觉"],ans:1},{q:"“分绿”形容？",options:["分东西","芭蕉叶绿映窗","画画","树叶分叉"],ans:1},{q:"“无情思”是指？",options:["无情无义","没有情绪/慵懒","没思想","不想你"],ans:1},{q:"儿童在做什么？",options:["捉迷藏","捉柳花/柳絮","摘梅子","睡觉"],ans:1},{q:"这首诗的氛围是？",options:["紧张","悲伤","闲适/慵懒","吵闹"],ans:2}]
    },

    // 四年级
    {
        id: 268, category: '四年级', title: "秋夜寄邱员外", author: "唐 · 韦应物", image: "秋夜寄邱员外.png",
        content: [{t:"怀君属秋夜，",m:"在这秋夜里思念着你。"},{t:"散步咏凉天。",m:"独自散步吟咏着凉爽的秋天。"},{t:"空山松子落，",m:"空山寂静，能听到松子落地的声音。"},{t:"幽人应未眠。",m:"我想你这位隐士应该还没睡。"}],
        translation: "在这秋夜里思念着你，我独自散步吟咏着凉爽的秋天。空山寂静，能听到松子落地的声音，我想你这位隐士此刻应该还没睡吧。这首诗抒发了诗人对友人的思念，意境清幽。",
        quiz: [{q:"“属”的意思是？",options:["属于","正值/适逢","下属","嘱咐"],ans:1},{q:"“咏凉天”表现了？",options:["冷","闲情逸致","怕冷","天黑"],ans:1},{q:"“空山松子落”以动衬？",options:["静","吵","闹","乱"],ans:0},{q:"“幽人”是指？",options:["幽灵","隐居的人/邱员外","幽默的人","作者"],ans:1},{q:"这首诗写在？",options:["春天早晨","夏天中午","秋天夜晚","冬天下午"],ans:2}]
    },
    {
        id: 269, category: '四年级', title: "题李凝幽居", author: "唐 · 贾岛", image: "题李凝幽居.png",
        content: [{t:"闲居少邻并，",m:"闲居在此很少有邻居。"},{t:"草径入荒园。",m:"杂草丛生的小路通向荒芜的园子。"},{t:"鸟宿池边树，",m:"鸟儿栖息在池边的树上。"},{t:"僧敲月下门。",m:"僧人在月夜轻轻敲门。"},{t:"过桥分野色，",m:"走过小桥，野色分明。"},{t:"移石动云根。",m:"移动石头，好像触动了云根。"},{t:"暂去还来此，",m:"暂时离开，以后还要到这里来。"},{t:"幽期不负言。",m:"绝不辜负我们隐居的约定。"}],
        translation: "(节选)闲居在此很少有邻居，杂草丛生的小路通向荒芜的园子。鸟儿栖息在池边的树上，僧人在月夜轻轻敲门。这首诗以“推敲”典故闻名，描写了幽居环境的静谧。",
        quiz: [{q:"“推敲”典故出自哪一句？",options:["草径入荒园","鸟宿池边树","僧敲月下门","过桥分野色"],ans:2},{q:"“敲”字比“推”字好在哪里？",options:["声音大","以动衬静/更有礼貌","动作帅","容易写"],ans:1},{q:"“幽居”是指？",options:["幽灵住的地方","幽僻的居所","大房子","监狱"],ans:1},{q:"这首诗的作者贾岛被称为？",options:["诗仙","诗圣","苦吟诗人","诗佛"],ans:2},{q:"诗人去拜访谁？",options:["李白","李凝","和尚","亲戚"],ans:1}]
    },
    {
        id: 270, category: '四年级', title: "听筝", author: "唐 · 李端", image: "听筝.png",
        content: [{t:"鸣筝金粟柱，",m:"弹奏着金粟柱的古筝。"},{t:"素手玉房前。",m:"洁白的手在玉房前拨弄。"},{t:"欲得周郎顾，",m:"为了得到周郎的回顾。"},{t:"时时误拂弦。",m:"故意时时拨错琴弦。"}],
        translation: "弹奏着金粟柱的古筝，洁白的手在玉房前拨弄。为了得到周郎的回顾一盼，她故意时时拨错琴弦。这首诗生动地刻画了弹筝女子微妙的心理。",
        quiz: [{q:"“金粟柱”形容？",options:["古筝的华美","柱子是粟米做的","金子","吃的"],ans:0},{q:"“素手”是指？",options:["平手","洁白的手","吃素","新手"],ans:1},{q:"“周郎”典故是指？",options:["周瑜(精通音律)","周润发","周公","姓周的郎君"],ans:0},{q:"为什么“误拂弦”？",options:["技术不好","琴坏了","故意引人注意","手滑"],ans:2},{q:"这首诗描写的是？",options:["听琴","弹筝女子的心理","修琴","买琴"],ans:1}]
    },
    {
        id: 271, category: '四年级', title: "新嫁娘词", author: "唐 · 王建", image: "新嫁娘词.png",
        content: [{t:"三日入厨下，",m:"婚后第三天走进厨房。"},{t:"洗手作羹汤。",m:"洗手亲自做羹汤。"},{t:"未谙姑食性，",m:"不知道婆婆的口味偏好。"},{t:"先遣小姑尝。",m:"先让小姑子尝一尝。"}],
        translation: "婚后第三天走进厨房，洗手亲自做羹汤。因为不知道婆婆的口味偏好，所以先让小姑子尝一尝。这首诗描写了新媳妇聪明灵巧、善于处理家庭关系的形象。",
        quiz: [{q:"“三日”是指？",options:["三个太阳","三天","古代习俗婚后第三天","生日"],ans:2},{q:"“羹汤”是指？",options:["洗澡水","饭菜/汤","药","茶"],ans:1},{q:"“未谙”的意思是？",options:["未来","不熟悉/不知道","黑暗","没有"],ans:1},{q:"“姑”是指？",options:["姑娘","婆婆","姑姑","尼姑"],ans:1},{q:"为什么要遣“小姑尝”？",options:["小姑贪吃","借小姑试探婆婆口味/聪明","怕有毒","做多了"],ans:1}]
    },

    // 五年级
    {
        id: 272, category: '五年级', title: "除夜作", author: "唐 · 高适", image: "除夜作.png",
        content: [{t:"旅馆寒灯独不眠，",m:"住在旅馆对着寒灯独自不眠。"},{t:"客心何事转凄然？",m:"漂泊的人因何事变得凄凉悲伤？"},{t:"故乡今夜思千里，",m:"故乡亲人今夜一定在思念千里之外的我。"},{t:"霜鬓明朝又一年。",m:"看着鬓边白发，明天就是新的一年了。"}],
        translation: "住在旅馆对着寒灯独自不眠，漂泊的人因何事变得凄凉悲伤？故乡亲人今夜一定在思念千里之外的我。看着鬓边白发，明天就是新的一年了。这首诗描写了除夕夜独在异乡的孤独和思亲之情。",
        quiz: [{q:"“除夜”是指？",options:["除夕夜","除去夜晚","打扫卫生","晚上"],ans:0},{q:"“寒灯”渲染了？",options:["冷","凄清孤独的气氛","灯不亮","省油"],ans:1},{q:"“客心”是指？",options:["客人的心","旅居在外者的心情","请客","客气"],ans:1},{q:"“霜鬓”是指？",options:["霜落在鬓角","白发","发型","冷"],ans:1},{q:"“思千里”用了什么手法？",options:["夸张","对面落笔/想象亲人思念自己","比喻","拟人"],ans:1}]
    },
    {
        id: 273, category: '五年级', title: "夜上受降城闻笛", author: "唐 · 李益", image: "夜上受降城闻笛.png",
        content: [{t:"回乐峰前沙似雪，",m:"回乐峰前的沙地像雪一样白。"},{t:"受降城外月如霜。",m:"受降城外的月色像秋霜一样冷。"},{t:"不知何处吹芦管，",m:"不知何处吹起了芦管。"},{t:"一夜征人尽望乡。",m:"这一夜征人们都在眺望故乡。"}],
        translation: "回乐峰前的沙地在月光下像雪一样白，受降城外的月色像秋霜一样冷。不知何处吹起了凄凉的芦管声，这一夜，所有的征人都被勾起乡思，眺望故乡。这首诗描写了边塞月夜的独特景色和将士们的思乡之情。",
        quiz: [{q:"“沙似雪”是因为？",options:["下雪了","月光照耀","沙子白","幻觉"],ans:1},{q:"“芦管”是指？",options:["芦苇","乐器/笛子","水管","吸管"],ans:1},{q:"“尽望乡”的原因是？",options:["看风景","听到笛声/思乡","找人","迷路"],ans:1},{q:"这首诗的氛围是？",options:["热烈","凄清/幽怨","开心","恐怖"],ans:1},{q:"这是一首？",options:["边塞诗","田园诗","送别诗","咏物诗"],ans:0}]
    },
    {
        id: 274, category: '五年级', title: "冬夜读书示子聿", author: "宋 · 陆游", image: "冬夜读书.png",
        content: [{t:"古人学问无遗力，",m:"古人做学问是不遗余力的。"},{t:"少壮工夫老始成。",m:"少年时下功夫到老才有所成。"},{t:"纸上得来终觉浅，",m:"从书本上得来的知识终究是浅薄的。"},{t:"绝知此事要躬行。",m:"要透彻了解必须亲身实践。"}],
        translation: "古人做学问是不遗余力的，少年时下功夫到老才有所成。从书本上得来的知识终究是浅薄的，要透彻了解必须亲身实践。这首诗是陆游教导儿子子聿做学问的诗，强调了实践的重要性。",
        quiz: [{q:"“示”的意思是？",options:["表示","给...看/教导","视力","示范"],ans:1},{q:"“无遗力”是指？",options:["没有力气","遗留力气","不遗余力/竭尽全力","无奈"],ans:2},{q:"“躬行”的意思是？",options:["弯腰走","亲身实践","恭敬","送行"],ans:1},{q:"这首诗告诉我们？",options:["要多读书","读书没用","实践出真知","要锻炼身体"],ans:2},{q:"千古名句是？",options:["古人学问无遗力","少壮工夫老始成","纸上得来终觉浅，绝知此事要躬行","以上都是"],ans:2}]
    },
    {
        id: 275, category: '五年级', title: "观书", author: "明 · 于谦", image: "观书.png",
        content: [{t:"书卷多情似故人，",m:"书卷像老朋友一样多情。"},{t:"晨昏忧乐每相亲。",m:"早晚忧乐都和我相亲相伴。"},{t:"眼前直下三千字，",m:"眼前浏览过三千字。"},{t:"胸次全无一点尘。",m:"胸怀中全无一点尘世俗念。"}],
        translation: "书卷像老朋友一样多情，早晚忧乐都和我相亲相伴。读书速度很快，眼前浏览过三千字，胸怀中全无一点尘世俗念。这首诗表达了诗人对读书的热爱和读书带来的精神净化。",
        quiz: [{q:"诗人把书卷比作？",options:["敌人","故人/老朋友","老师","亲戚"],ans:1},{q:"“晨昏”是指？",options:["早晨和黄昏/时刻","头晕","天黑","昏迷"],ans:0},{q:"“直下三千字”形容？",options:["字数多","读书速度快/畅快","写字快","掉下来"],ans:1},{q:"“无一点尘”是指？",options:["没有灰尘","心地纯净/超凡脱俗","打扫干净","视力好"],ans:1},{q:"这首诗的主题是？",options:["买书","读书的乐趣和境界","写书","送书"],ans:1}]
    },
    {
        id: 276, category: '五年级', title: "秋词(其二)", author: "唐 · 刘禹锡", image: "秋词_其二.png",
        content: [{t:"山明水净夜来霜，",m:"山明水净，夜晚降下白霜。"},{t:"数树深红出浅黄。",m:"几株树叶深红胜过浅黄。"},{t:"试上高楼清入骨，",m:"登上高楼，清气入骨。"},{t:"岂如春色嗾人狂。",m:"哪像春色那样撩拨得人发狂。"}],
        translation: "山明水净，夜晚降下白霜，几株树叶深红胜过浅黄。登上高楼，清秋寒气入骨，但这清爽肃穆正好，哪像春色那样撩拨得人发狂呢？这首诗赞美了秋天的清爽高洁。",
        quiz: [{q:"“山明水净”描写的季节是？",options:["春","夏","秋","冬"],ans:2},{q:"“深红”和“浅黄”是指？",options:["花朵","秋叶的颜色","衣服","灯光"],ans:1},{q:"“清入骨”形容？",options:["骨头疼","秋气清爽/寒意","水清","瘦"],ans:1},{q:"“嗾(sǒu)”的意思是？",options:["咳嗽","教唆/撩拨","走开","搜索"],ans:1},{q:"诗人更喜欢？",options:["春色","秋色","冬色","夏色"],ans:1}]
    },
    {
        id: 277, category: '五年级', title: "利州南渡", author: "唐 · 温庭筠", image: "利州南渡.png",
        content: [{t:"澹然空水对斜晖，",m:"江水清澈淡泊对着落日斜晖。"},{t:"曲岛苍茫接翠微。",m:"弯曲的岛屿苍茫连接着青翠的山气。"},{t:"波上马嘶看棹去，",m:"波上马嘶鸣，看着船桨划去。"},{t:"柳边人歇待船归。",m:"柳边的人歇息着等待船回来。"}],
        translation: "江水清澈淡泊对着落日斜晖，弯曲的岛屿苍茫连接着青翠的山气。波上马嘶鸣，看着船桨划去，柳边的人歇息着等待船回来。这首诗描写了渡口傍晚的景色，蕴含了羁旅之愁。",
        quiz: [{q:"“澹然”形容？",options:["淡泊/平静的水面","淡定","担心","突然"],ans:0},{q:"“翠微”是指？",options:["微微翠绿","青翠的山气/山色","名字","微风"],ans:1},{q:"“棹”是指？",options:["桌子","船桨/船","找","照"],ans:1},{q:"这首诗描写的是？",options:["清晨","正午","傍晚渡口","深夜"],ans:2},{q:"诗人此刻的心情是？",options:["兴奋","思乡/羁旅惆怅","愤怒","害怕"],ans:1}]
    },
    {
        id: 278, category: '五年级', title: "江村", author: "唐 · 杜甫", image: "江村.png",
        content: [{t:"清江一曲抱村流，",m:"清澈的江水曲折地环绕着村子流过。"},{t:"长夏江村事事幽。",m:"长长的夏日里，江村事事幽静。"},{t:"自去自来梁上燕，",m:"梁上的燕子自由自在地飞来飞去。"},{t:"相亲相近水中鸥。",m:"水中的鸥鸟相亲相近地嬉戏。"},{t:"老妻画纸为棋局，",m:"老妻在纸上画着棋盘。"},{t:"稚子敲针作钓钩。",m:"小儿子敲弯针做鱼钩。"},{t:"但有故人供禄米，",m:"只要有老朋友供给米粮。"},{t:"微躯此外更何求？",m:"我这微小的身体此外还有什么别无所求？"}],
        translation: "(节选)清澈的江水曲折地环绕着村子流过，长长的夏日里，江村事事幽静。梁上的燕子自由自在地飞来飞去，水中的鸥鸟相亲相近。老妻在纸上画着棋盘，小儿子敲弯针做鱼钩。只要有老朋友供给米粮，我这微小的身体此外还有什么别无所求？这首诗描写了杜甫在成都草堂的安适生活。",
        quiz: [{q:"“抱”字形容？",options:["抱住","水环绕着村子","拥抱","抱怨"],ans:1},{q:"“幽”的意思是？",options:["幽默","幽静/清闲","幽灵","忧愁"],ans:1},{q:"老妻和稚子在做什么？",options:["做饭和读书","画棋局和做鱼钩","睡觉和玩水","吵架"],ans:1},{q:"“微躯”是指？",options:["微小的身躯/谦称","身体不好","弯腰","微风"],ans:0},{q:"这首诗表达了？",options:["满足于安适的生活","想当官","抱怨贫穷","想搬家"],ans:0}]
    },
    {
        id: 279, category: '五年级', title: "月夜", author: "唐 · 刘方平", image: "月夜_刘方平.png",
        content: [{t:"更深月色半人家，",m:"夜深了，月光照亮了半个庭院。"},{t:"北斗阑干南斗斜。",m:"北斗星横斜，南斗星倾斜。"},{t:"今夜偏知春气暖，",m:"今夜偏偏感觉到了春气的暖意。"},{t:"虫声新透绿窗纱。",m:"虫鸣声新透进了绿色的窗纱。"}],
        translation: "夜深了，月光照亮了半个庭院。北斗星和南斗星都已横斜。今夜偏偏感觉到了春气的暖意，因为听到了透过绿窗纱传来的初春虫鸣。这首诗描写了初春月夜的静谧和生机。",
        quiz: [{q:"“更深”是指？",options:["更加深","深夜/夜深","更夫","深坑"],ans:1},{q:"“阑干”在这里意思是？",options:["栏杆","纵横交错/横斜的样子","哭干了泪","干净"],ans:1},{q:"怎么知道“春气暖”？",options:["看天气预报","听到虫声新透","开暖气","花开了"],ans:1},{q:"“透”字形容？",options:["透明","穿透/清晰","透气","湿透"],ans:1},{q:"这首诗描写的季节是？",options:["盛夏","深秋","初春/早春","寒冬"],ans:2}]
    },

    // 六年级
    {
        id: 280, category: '六年级', title: "关山月", author: "唐 · 李白", image: "关山月.png",
        content: [{t:"明月出天山，",m:"一轮明月从天山升起。"},{t:"苍茫云海间。",m:"穿行在苍茫的云海之间。"},{t:"长风几万里，",m:"长风吹拂几万里。"},{t:"吹度玉门关。",m:"吹过了玉门关。"},{t:"汉下白登道，",m:"当年汉军在白登道被围。"},{t:"胡窥青海湾。",m:"胡人觊觎着青海湾。"},{t:"由来征战地，",m:"自古以来这里就是征战之地。"},{t:"不见有人还。",m:"没看见几个人能活着回来。"}],
        translation: "(节选)一轮明月从天山升起，穿行在苍茫的云海之间。长风吹拂几万里，吹过了玉门关。当年汉军在白登道被围，胡人觊觎着青海湾。自古以来这里就是征战之地，没看见几个人能活着回来。这首诗描绘了边塞的辽阔景象，揭示了战争的残酷。",
        quiz: [{q:"“苍茫”形容？",options:["苍老","忙碌","广阔迷蒙/无边","草色"],ans:2},{q:"“度”的意思是？",options:["度过/越过","温度","度量","制度"],ans:0},{q:"“白登”典故涉及？",options:["刘邦被困","李白登山","白色的灯","路名"],ans:0},{q:"“不见有人还”表达了？",options:["人迷路了","战争残酷/伤亡惨重","人都搬家了","不想回家"],ans:1},{q:"这是一首？",options:["乐府旧题诗/边塞诗","田园诗","送别诗","闺怨诗"],ans:0}]
    },
    {
        id: 281, category: '六年级', title: "望洞庭湖赠张丞相", author: "唐 · 孟浩然", image: "望洞庭湖.png",
        content: [{t:"八月湖水平，",m:"八月洞庭湖水上涨，与岸齐平。"},{t:"涵虚混太清。",m:"水气映着天空，水天一色。"},{t:"气蒸云梦泽，",m:"云梦泽上水气蒸腾。"},{t:"波撼岳阳城。",m:"波涛汹涌似乎撼动了岳阳城。"},{t:"欲济无舟楫，",m:"想渡湖却没有船和桨。"},{t:"端居耻圣明。",m:"闲居在家愧对圣明的时代。"},{t:"坐观垂钓者，",m:"坐着看别人垂钓。"},{t:"徒有羡鱼情。",m:"只能白白羡慕人家得鱼。"}],
        translation: "八月洞庭湖水上涨，与岸齐平，水气映着天空，水天一色。云梦泽上水气蒸腾，波涛汹涌似乎撼动了岳阳城。想渡湖却没有船和桨，闲居在家愧对圣明的时代。坐着看别人垂钓，只能白白羡慕人家得鱼。这首诗借写洞庭湖壮景，表达了诗人想出来做官却无人引荐的苦衷。",
        quiz: [{q:"“涵虚”是指？",options:["心虚","包含天空/水映天空","空虚","涵养"],ans:1},{q:"“撼”的意思是？",options:["遗憾","摇动/撼动","喊叫","看"],ans:1},{q:"“济”的意思是？",options:["救济","渡河","拥挤","经济"],ans:1},{q:"“羡鱼情”比喻？",options:["想吃鱼","想做官/求仕之心","喜欢钓鱼","羡慕别人"],ans:1},{q:"这首诗是写给谁的？",options:["张丞相/张九龄","李白","杜甫","皇帝"],ans:0}]
    },
    {
        id: 282, category: '六年级', title: "终南别业", author: "唐 · 王维", image: "终南别业.png",
        content: [{t:"中岁颇好道，",m:"中年以后颇为喜好佛道。"},{t:"晚家南山陲。",m:"晚年安家在终南山边。"},{t:"兴来每独往，",m:"兴致来了往往独自前往。"},{t:"胜事空自知。",m:"美好的事只有自己知道。"},{t:"行到水穷处，",m:"随意而行走到水流尽头。"},{t:"坐看云起时。",m:"坐下来看云彩升起。"},{t:"偶然值林叟，",m:"偶然遇见林中的老翁。"},{t:"谈笑无还期。",m:"谈笑风生忘了回家的时间。"}],
        translation: "中年以后颇为喜好佛道，晚年安家在终南山边。兴致来了往往独自前往，美好的事只有自己知道。随意而行走到水流尽头，坐下来看云彩升起。偶然遇见林中的老翁，谈笑风生忘了回家的时间。这首诗描写了诗人隐居终南山时闲适自得的生活。",
        quiz: [{q:"“别业”是指？",options:["毕业","别墅/别馆","别的作业","行业"],ans:1},{q:"“好道”是指？",options:["路好走","喜好佛道/修道","知道","好人"],ans:1},{q:"千古名句是？",options:["中岁颇好道","行到水穷处，坐看云起时","偶然值林叟","晚家南山陲"],ans:1},{q:"“值”的意思是？",options:["值钱","遇到","值得","值班"],ans:1},{q:"这首诗体现了王维的？",options:["禅意/闲适","悲伤","愤怒","忙碌"],ans:0}]
    },
    {
        id: 283, category: '六年级', title: "旅夜书怀", author: "唐 · 杜甫", image: "旅夜书怀.png",
        content: [{t:"细草微风岸，",m:"微风吹拂着江岸的细草。"},{t:"危樯独夜舟。",m:"高耸的桅杆，孤独的夜舟。"},{t:"星垂平野阔，",m:"星星低垂，平野辽阔。"},{t:"月涌大江流。",m:"月光涌动，大江奔流。"},{t:"名岂文章著，",m:"名声难道是因为文章显著吗？"},{t:"官应老病休。",m:"官职应该是因老病而罢休。"},{t:"飘飘何所似，",m:"飘飘一身像什么呢？"},{t:"天地一沙鸥。",m:"就像天地间的一只沙鸥。"}],
        translation: "微风吹拂着江岸的细草，高耸的桅杆，孤独的夜舟。星星低垂，平野辽阔；月光涌动，大江奔流。名声难道是因为文章显著吗？官职应该是因老病而罢休。飘飘一身像什么呢？就像天地间的一只沙鸥。这首诗借景抒情，表达了诗人漂泊无依、孤独寂寞的情怀。",
        quiz: [{q:"“危樯”是指？",options:["危险的墙","高耸的桅杆","围墙","强壮"],ans:1},{q:"千古名句是？",options:["细草微风岸","星垂平野阔，月涌大江流","名岂文章著","官应老病休"],ans:1},{q:"“著”的意思是？",options:["著名/显著","写书","穿着","着急"],ans:0},{q:"“天地一沙鸥”比喻？",options:["喜欢鸟","诗人孤单漂泊的身世","风景好","鸟很大"],ans:1},{q:"这首诗写于？",options:["少年得意时","晚年漂泊时","做官时","结婚时"],ans:1}]
    },
    {
        id: 284, category: '六年级', title: "登岳阳楼", author: "唐 · 杜甫", image: "登岳阳楼.png",
        content: [{t:"昔闻洞庭水，",m:"早就听说过洞庭湖的水。"},{t:"今上岳阳楼。",m:"今天终于登上了岳阳楼。"},{t:"吴楚东南坼，",m:"吴楚两地在东南被湖水分开。"},{t:"乾坤日夜浮。",m:"天地日月在湖水中日夜浮动。"},{t:"亲朋无一字，",m:"亲朋好友没有一字书信。"},{t:"老病有孤舟。",m:"年老多病只有孤舟相伴。"},{t:"戎马关山北，",m:"关山以北战争未息。"},{t:"凭轩涕泗流。",m:"倚窗眺望涕泪交流。"}],
        translation: "早就听说过洞庭湖的水，今天终于登上了岳阳楼。吴楚两地在东南被湖水分开，天地日月在湖水中日夜浮动。亲朋好友没有一字书信，年老多病只有孤舟相伴。关山以北战争未息，倚窗眺望涕泪交流。这首诗描写了洞庭湖的壮阔景色，抒发了诗人忧国忧民的情怀。",
        quiz: [{q:"“坼(chè)”的意思是？",options:["拆开/分裂","彻底","撤退","清晰"],ans:0},{q:"“乾坤”是指？",options:["钱和昆虫","天地/日月","两个人","东西"],ans:1},{q:"“戎马”代指？",options:["马","战争","军队","兵器"],ans:1},{q:"诗人为什么“涕泗流”？",options:["烟熏的","感动","忧国忧民/身世凄凉","眼睛痛"],ans:2},{q:"这首诗的意境是？",options:["狭窄","雄浑壮阔又苍凉","快乐","热闹"],ans:1}]
    },
    {
        id: 285, category: '六年级', title: "客至", author: "唐 · 杜甫", image: "客至.png",
        content: [{t:"舍南舍北皆春水，",m:"草堂南面北面都是春水。"},{t:"但见群鸥日日来。",m:"只见群鸥天天飞来。"},{t:"花径不曾缘客扫，",m:"长满花草的小路不曾因为客来而打扫。"},{t:"蓬门今始为君开。",m:"柴门今天才为你打开。"},{t:"盘飧市远无兼味，",m:"离市太远盘中没好菜。"},{t:"樽酒家贫只旧醅。",m:"家贫只有陈旧的浊酒。"},{t:"肯与邻翁相对饮，",m:"是否愿意和邻居老翁对饮？"},{t:"隔篱呼取尽馀杯。",m:"隔着篱笆喊他过来喝尽余杯。"}],
        translation: "草堂南面北面都是春水，只见群鸥天天飞来。长满花草的小路不曾因为客来而打扫，柴门今天才为你打开。离市太远盘中没好菜，家贫只有陈旧的浊酒。是否愿意和邻居老翁对饮？隔着篱笆喊他过来喝尽余杯。这首诗洋溢着浓郁的生活气息，表现了主人的热情好客。",
        quiz: [{q:"“缘”的意思是？",options:["缘分","因为","边缘","沿着"],ans:1},{q:"“蓬门”是指？",options:["蓬草编的门/简陋的门","朋友","帐篷","蓬松"],ans:0},{q:"“兼味”是指？",options:["兼职","多种美味/好菜","味道","怪味"],ans:1},{q:"主人对待客人的态度是？",options:["冷淡","热情诚恳","虚伪","炫耀"],ans:1},{q:"这首诗充满了？",options:["悲伤","生活情趣/人情味","愤怒","孤独"],ans:1}]
    },
    {
        id: 286, category: '六年级', title: "左迁至蓝关示侄孙湘", author: "唐 · 韩愈", image: "左迁至蓝关.png",
        content: [{t:"一封朝奏九重天，",m:"早晨一封奏章呈给皇帝。"},{t:"夕贬潮阳路八千。",m:"傍晚就被贬到八千里外的潮阳。"},{t:"欲为圣明除弊事，",m:"本想为皇帝除去弊政。"},{t:"肯将衰朽惜残年！",m:"怎肯为了顾惜衰老残年而逃避！"},{t:"云横秦岭家何在？",m:"云横秦岭，家在哪里？"},{t:"雪拥蓝关马不前。",m:"雪拥蓝关，马都不肯前行。"},{t:"知汝远来应有意，",m:"知道你远道而来必有深意。"},{t:"好收吾骨瘴江边。",m:"正好在瘴江边收殓我的尸骨。"}],
        translation: "早晨一封奏章呈给皇帝，傍晚就被贬到八千里外的潮阳。本想为皇帝除去弊政，怎肯为了顾惜衰老残年而逃避！云横秦岭，家在哪里？雪拥蓝关，马都不肯前行。知道你远道而来必有深意，正好在瘴江边收殓我的尸骨。这首诗抒发了诗人忠而获罪的愤慨和悲壮的情怀。",
        quiz: [{q:"“左迁”的意思是？",options:["向左搬家","升官","降职/被贬","向左走"],ans:2},{q:"“九重天”代指？",options:["天很高","皇帝/朝廷","九层楼","神仙"],ans:1},{q:"“弊事”是指？",options:["坏事","迎佛骨之事/弊政","货币","作弊"],ans:1},{q:"“拥”字形容？",options:["拥抱","雪大/阻塞","拥挤","拥有"],ans:1},{q:"千古名句是？",options:["云横秦岭家何在，雪拥蓝关马不前","一封朝奏","夕贬潮阳","好收吾骨"],ans:0}]
    },
    {
        id: 287, category: '六年级', title: "离思", author: "唐 · 元稹", image: "离思.png",
        content: [{t:"曾经沧海难为水，",m:"经历过沧海，别处的水就不足为顾。"},{t:"除却巫山不是云。",m:"除了巫山的云，别处的云就不称其为云。"},{t:"取次花丛懒回顾，",m:"匆匆走过花丛，懒得回头看。"},{t:"半缘修道半缘君。",m:"一半是因为修道，一半是因为你。"}],
        translation: "经历过沧海，别处的水就不足为顾；除了巫山的云，别处的云就不称其为云。匆匆走过花丛，懒得回头看，一半是因为修道，一半是因为你。这首诗是悼念亡妻的，表达了对妻子忠贞不渝的爱情。",
        quiz: [{q:"“难为水”的意思是？",options:["水很难做","难以成为水/不值得看","没有水","发大水"],ans:1},{q:"“除却”的意思是？",options:["除了","除法","却步","去除"],ans:0},{q:"“取次”的意思是？",options:["取东西","仓促/随意","其次","第二次"],ans:1},{q:"“缘”的意思是？",options:["缘分","因为","边缘","沿着"],ans:1},{q:"这首诗表达了？",options:["看风景","对亡妻的忠贞/深情","修道","喜欢云"],ans:1}]
    },
    {
        id: 288, category: '六年级', title: "蝶恋花·春景", author: "宋 · 苏轼", image: "蝶恋花_春景.png",
        content: [{t:"花褪残红青杏小。",m:"花儿凋谢，青杏尚小。"},{t:"燕子飞时，绿水人家绕。",m:"燕子飞舞，绿水环绕人家。"},{t:"枝上柳绵吹又少，",m:"枝上柳絮被风吹得越来越少。"},{t:"天涯何处无芳草！",m:"天涯何处没有芳草！"},{t:"墙里秋千墙外道。",m:"墙里荡秋千，墙外是道路。"},{t:"墙外行人，墙里佳人笑。",m:"墙外行人听到墙里佳人的笑声。"},{t:"笑渐不闻声渐悄，",m:"笑声渐渐听不到了。"},{t:"多情却被无情恼。",m:"多情的人却被无情的人烦恼。"}],
        translation: "(节选)花儿凋谢，青杏尚小。燕子飞舞，绿水环绕人家。枝上柳絮被风吹得越来越少，天涯何处没有芳草！墙里荡秋千，墙外是道路。墙外行人听到墙里佳人的笑声。笑声渐渐听不到了，多情的人却被无情的人烦恼。这首词描写了春末景色，抒发了惜春和伤感之情。",
        quiz: [{q:"“褪残红”是指？",options:["红衣服褪色","花谢了","红色颜料","太阳落山"],ans:1},{q:"“柳绵”是指？",options:["棉花","柳絮","海绵","柳树"],ans:1},{q:"千古名句是？",options:["天涯何处无芳草","花褪残红","燕子飞时","多情却被无情恼"],ans:0},{q:"“多情”指谁？",options:["墙里佳人","墙外行人/作者","燕子","柳絮"],ans:1},{q:"这首词表达了？",options:["快乐","惜春/失意感伤","想荡秋千","喜欢杏子"],ans:1}]
    },
    {
        id: 289, category: '六年级', title: "临安春雨初霁", author: "宋 · 陆游", image: "临安春雨.png",
        content: [{t:"世味年来薄似纱，",m:"近年来世态人情薄得像纱一样。"},{t:"谁令骑马客京华。",m:"谁让我骑马客居京城。"},{t:"小楼一夜听春雨，",m:"住在小楼里一夜听着春雨声。"},{t:"深巷明朝卖杏花。",m:"明天早晨深巷里会有卖杏花的叫卖声。"},{t:"矮纸斜行闲作草，",m:"铺开小纸斜写草书。"},{t:"晴窗细乳戏分茶。",m:"晴窗下煮茶品茗。"},{t:"素衣莫起风尘叹，",m:"素衣不要发出风尘的感叹。"},{t:"犹及清明可到家。",m:"还来得及在清明赶回家。"}],
        translation: "(节选)近年来世态人情薄得像纱一样，谁让我骑马客居京城。住在小楼里一夜听着春雨声，明天早晨深巷里会有卖杏花的叫卖声。铺开小纸斜写草书，晴窗下煮茶品茗。素衣不要发出风尘的感叹，还来得及在清明赶回家。这首诗虽然写了闲适的生活，但字里行间流露出的却是客居京华的郁闷和惆怅。",
        quiz: [{q:"“世味”是指？",options:["世界味道","世态人情","好吃的","气味"],ans:1},{q:"千古名句是？",options:["小楼一夜听春雨，深巷明朝卖杏花","世味年来薄似纱","矮纸斜行","晴窗细乳"],ans:0},{q:"“分茶”是指？",options:["分茶叶","一种点茶游戏/品茶","分给别人茶","倒茶"],ans:1},{q:"诗人听春雨时的心情是？",options:["高兴","闲适中带着惆怅/郁闷","害怕","想买花"],ans:1},{q:"这首诗作于？",options:["临安/杭州","北京","南京","西安"],ans:0}]
    },
    {
        id: 290, category: '六年级', title: "生查子·元夕", author: "宋 · 欧阳修", image: "生查子.png",
        content: [{t:"去年元夜时，",m:"去年元宵夜的时候。"},{t:"花市灯如昼。",m:"花市的灯火像白天一样亮。"},{t:"月上柳梢头，",m:"月亮升起在柳树梢头。"},{t:"人约黄昏后。",m:"与佳人相约在黄昏之后。"},{t:"今年元夜时，",m:"今年元宵夜的时候。"},{t:"月与灯依旧。",m:"月亮和灯火依然如旧。"},{t:"不见去年人，",m:"却看不见去年的那个人。"},{t:"泪湿春衫袖。",m:"泪水打湿了春衫的袖子。"}],
        translation: "去年元宵夜的时候，花市的灯火像白天一样亮。月亮升起在柳树梢头，与佳人相约在黄昏之后。今年元宵夜的时候，月亮和灯火依然如旧。却看不见去年的那个人，泪水打湿了春衫的袖子。这首词通过今昔对比，抒发了物是人非的感伤。",
        quiz: [{q:"“元夜”是指？",options:["元旦晚上","元宵节晚上","除夕","半夜"],ans:1},{q:"“如昼”形容？",options:["像白天/灯火通明","像船","像粥","很热"],ans:0},{q:"千古名句是？",options:["月上柳梢头，人约黄昏后","花市灯如昼","不见去年人","泪湿春衫袖"],ans:0},{q:"“依旧”说明？",options:["旧衣服","景物没变","人没变","酒没变"],ans:1},{q:"这首词表达了？",options:["快乐","物是人非/相思之苦","看灯","买花"],ans:1}]
    },
    {
        id: 291, category: '六年级', title: "武陵春", author: "宋 · 李清照", image: "武陵春.png",
        content: [{t:"风住尘香花已尽，",m:"风停了，尘土中带着花香，花已落尽。"},{t:"日晚倦梳头。",m:"太阳高了，还懒得梳头。"},{t:"物是人非事事休，",m:"物是人非，万事皆休。"},{t:"欲语泪先流。",m:"想要说话，泪水先流下来。"},{t:"闻说双溪春尚好，",m:"听说双溪的春光还不错。"},{t:"也拟泛轻舟。",m:"也打算去划船游览。"},{t:"只恐双溪舴艋舟，",m:"只恐怕双溪那像蚱蜢一样的小船。"},{t:"载不动许多愁。",m:"载不动我这么多的忧愁。"}],
        translation: "风停了，尘土中带着花香，花已落尽。太阳高了，我因为忧伤还懒得梳头。物是人非，万事皆休，想要说话，泪水先流下来。听说双溪的春光还不错，也打算去划船游览。只恐怕双溪那像蚱蜢一样的小船，载不动我这么多的忧愁。这首词抒发了词人晚年流离失所、丧夫之痛的深重愁苦。",

class PoetryApp {
    constructor() {
        this.currentIdx = 0;
        this.mode = 'fill';
        this.filter = 'all'; 
        this.searchTerm = '';
        this.searchType = 'all'; // 新增搜索类型
        this.filteredList = []; 
        this.synth = window.speechSynthesis;
        this.voices = [];
        this.quizScore = 0;
        this.currentQuizIdx = 0;
        
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => { this.voices = this.synth.getVoices(); };
        }
        this.init();
    }

    init() {
        this.applyFilters();
        this.loadPoem(0);
    }

    // 处理搜索类型切换
    handleSearchType() {
        this.searchType = document.getElementById('search-type').value;
        this.applyFilters();
    }

    handleSearch(val) {
        this.searchTerm = val.trim().toLowerCase();
        this.applyFilters();
    }

    filterPoems(category, btnElement) {
        this.filter = category;
        const btns = document.querySelectorAll('.filter-btn');
        btns.forEach(b => b.classList.remove('active'));
        if(btnElement) btnElement.classList.add('active');
        this.applyFilters();
    }

    applyFilters() {
        this.filteredList = ALL_POEMS.filter(p => {
            // 1. 分类筛选
            const matchesCat = this.filter === 'all' || p.category === this.filter;
            
            // 2. 搜索逻辑 (支持类型)
            let matchesSearch = false;
            if (this.searchTerm === '') {
                matchesSearch = true;
            } else {
                const term = this.searchTerm;
                // 解析作者和朝代 "唐 · 骆宾王"
                const parts = p.author.split('·').map(s => s.trim());
                const dynasty = parts[0] || '';
                const authorName = parts.length > 1 ? parts[1] : parts[0];

                if (this.searchType === 'all') {
                    matchesSearch = p.title.includes(term) || p.author.includes(term);
                } else if (this.searchType === 'title') {
                    matchesSearch = p.title.includes(term);
                } else if (this.searchType === 'author') {
                    matchesSearch = authorName.includes(term);
                } else if (this.searchType === 'dynasty') {
                    matchesSearch = dynasty.includes(term);
                }
            }

            return matchesCat && matchesSearch;
        });

        this.renderSidebar();
        // 自动选择列表中的第一个
        if (this.filteredList.length > 0) {
            const currentStillVisible = this.filteredList.some(p => p.id === this.currentIdx);
            if (!currentStillVisible) {
                this.loadPoem(this.filteredList[0].id);
            }
        }
    }

    renderSidebar() {
        const container = document.getElementById('poem-list-container');
        container.innerHTML = '';
        
        if (this.filteredList.length === 0) {
            container.innerHTML = '<div class="empty-tip">暂无相关古诗</div>';
            return;
        }

        this.filteredList.forEach((poem, index) => {
            const item = document.createElement('div');
            item.className = `poem-item ${poem.id === this.currentIdx ? 'active' : ''}`;
            item.onclick = () => this.loadPoem(poem.id);
            item.innerHTML = `
                <div class="poem-index">${index + 1}</div>
                <div class="poem-name" title="${poem.title}">${poem.title}</div>
                <div class="poem-cat-tag">${poem.category}</div>
            `;
            container.appendChild(item);
        });
    }

    loadPoem(globalId) {
        this.currentIdx = globalId;
        const poem = ALL_POEMS.find(p => p.id === globalId);
        if(!poem) return;

        // 重新渲染侧边栏以更新高亮
        this.renderSidebar(); 
        
        document.getElementById('display-title').innerText = poem.title;
        document.getElementById('display-author').innerText = poem.author;
        
        const imgBox = document.getElementById('illustration-container');
        const img = document.getElementById('poem-img');
        if (poem.image) {
            img.src = poem.image;
            imgBox.style.display = 'block';
        } else {
            imgBox.style.display = 'none';
        }

        this.cancelSpeech();
        this.currentQuizIdx = 0;
        this.quizScore = 0;
        this.renderGame();
    }

    switchMode(newMode) {
        this.mode = newMode;
        const tabs = document.querySelectorAll('.tab-btn');
        tabs.forEach(t => t.classList.remove('active'));
        const modeMap = { 'fill':0, 'sort':1, 'learn':2, 'quiz':3 };
        if (tabs[modeMap[newMode]]) tabs[modeMap[newMode]].classList.add('active');

        document.getElementById('learn-controls').style.display = (newMode === 'learn') ? 'flex' : 'none';
        this.renderGame();
    }

    renderGame() {
        const stage = document.getElementById('game-stage');
        stage.innerHTML = '';
        if(this.mode === 'fill') this.renderFillGame(stage);
        else if(this.mode === 'sort') this.renderSortGame(stage);
        else if(this.mode === 'learn') this.renderLearnMode(stage);
        else if(this.mode === 'quiz') this.renderQuizGame(stage);
    }

    // --- 1. 填字游戏 ---
    renderFillGame(container) {
        const poem = ALL_POEMS.find(p => p.id === this.currentIdx);
        const wrapper = document.createElement('div'); wrapper.className = 'fill-game-container';
        let missingChars = [];
        let optionIdCounter = 0;
        
        poem.content.forEach((line) => {
            const row = document.createElement('div'); row.className = 'poem-sentence-row';
            const chars = line.t.split('');
            const validIndices = chars.map((c, i) => !['，','。','？','！'].includes(c) ? i : -1).filter(i => i !== -1);
            const missingIdx = validIndices.length > 0 ? validIndices[Math.floor(Math.random() * validIndices.length)] : -1;

            chars.forEach((char, idx) => {
                const isPunctuation = ['，','。','？','！'].includes(char);
                const cell = document.createElement('div'); cell.className = 'tian-zi-ge';
                if (isPunctuation) {
                    cell.className += ' punctuation'; cell.innerHTML = `<span>${char}</span>`;
                } else if(idx === missingIdx) {
                    cell.className += ' empty'; cell.dataset.ans = char; missingChars.push(char); cell.innerHTML = `<span></span>`;
                    cell.ondragover = (e) => { e.preventDefault(); cell.classList.add('drag-over'); };
                    cell.ondragleave = () => { cell.classList.remove('drag-over'); };
                    cell.ondrop = (e) => { e.preventDefault(); cell.classList.remove('drag-over'); this.handleDrop(cell, e.dataTransfer.getData("text/char"), e.dataTransfer.getData("text/id")); };
                } else {
                    cell.innerHTML = `<span>${char}</span>`;
                }
                row.appendChild(cell);
            });
            wrapper.appendChild(row);
        });

        const tray = document.createElement('div'); tray.className = 'options-tray';
        const shuffled = [...missingChars].sort(() => Math.random() - 0.5);
        shuffled.forEach(char => {
            const btn = document.createElement('div'); const uid = `opt-${optionIdCounter++}`;
            btn.className = 'option-tile'; btn.id = uid; btn.innerText = char; btn.draggable = true;
            btn.ondragstart = (e) => { e.dataTransfer.setData("text/char", char); e.dataTransfer.setData("text/id", uid); setTimeout(() => btn.classList.add('dragging'), 0); };
            btn.ondragend = () => { btn.classList.remove('dragging'); };
            btn.onclick = () => { const empty = wrapper.querySelector('.tian-zi-ge.empty'); if(empty) this.handleDrop(empty, char, uid); };
            tray.appendChild(btn);
        });
        wrapper.appendChild(tray); container.appendChild(wrapper);
    }

    handleDrop(targetCell, char, sourceId) {
        if (!targetCell.classList.contains('empty')) return;
        if (targetCell.dataset.ans === char) {
            targetCell.querySelector('span').innerText = char; targetCell.classList.remove('empty'); targetCell.classList.add('correct');
            const sourceEl = document.getElementById(sourceId); if (sourceEl) { sourceEl.style.transform = 'scale(0)'; setTimeout(() => sourceEl.remove(), 200); }
            if (document.querySelectorAll('.tian-zi-ge.empty').length === 0) setTimeout(() => this.showSuccess('填字完成'), 500);
        } else {
            this.showError('哎呀，不是这个字哦'); targetCell.classList.add('wrong'); setTimeout(() => targetCell.classList.remove('wrong'), 500);
        }
    }

    // --- 2. 排序游戏 ---
    renderSortGame(container) {
        const poem = ALL_POEMS.find(p => p.id === this.currentIdx);
        const wrapper = document.createElement('div'); wrapper.className = 'sort-game-container';
        const dropZone = document.createElement('div'); dropZone.className = 'sort-drop-zone';
        dropZone.innerHTML = `<div class="placeholder-text">按顺序点击下方的诗句</div>`;
        const pool = document.createElement('div'); pool.className = 'sort-pool';
        let userSelection = [];
        const lines = poem.content.length > 0 ? poem.content.map((l, i) => ({ t: l.t, idx: i })) : [];
        const shuffledLines = [...lines].sort(() => Math.random() - 0.5);

        const refreshUI = () => {
            dropZone.innerHTML = userSelection.length === 0 ? `<div class="placeholder-text">按顺序点击下方的诗句</div>` : '';
            userSelection.forEach((item, i) => {
                const el = document.createElement('div'); el.className = 'sort-item'; el.innerText = `${i+1}. ${item.t}`;
                el.onclick = () => { userSelection.splice(i, 1); refreshUI(); }; dropZone.appendChild(el);
            });
            pool.innerHTML = '';
            shuffledLines.forEach(item => {
                if(!userSelection.includes(item)) {
                    const el = document.createElement('div'); el.className = 'sort-item pool-item'; el.innerText = item.t;
                    el.onclick = () => { userSelection.push(item); refreshUI(); if(userSelection.length === poem.content.length) checkResult(); };
                    pool.appendChild(el);
                }
            });
        };
        const checkResult = () => {
            let correct = true; userSelection.forEach((item, i) => { if(item.idx !== i) correct = false; });
            if(correct) setTimeout(() => this.showSuccess('排序正确'), 300);
            else { dropZone.classList.add('error'); this.showError('顺序好像有点乱，点击诗句取消重排吧'); setTimeout(() => dropZone.classList.remove('error'), 500); }
        };
        wrapper.appendChild(dropZone); wrapper.appendChild(pool); container.appendChild(wrapper); refreshUI();
    }

    // --- 3. 古诗赏析 ---
    renderLearnMode(container) {
        const poem = ALL_POEMS.find(p => p.id === this.currentIdx);
        const wrapper = document.createElement('div'); wrapper.className = 'learn-container';
        const list = document.createElement('div'); list.className = 'learn-list';
        poem.content.forEach(line => {
            const card = document.createElement('div'); card.className = 'learn-card';
            card.innerHTML = `<div class="card-header"><div class="play-icon"><svg class="icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div><div class="card-text">${line.t}</div></div><div class="meaning-box">【字词义】${line.m}</div>`;
            card.querySelector('.play-icon').onclick = (e) => { e.stopPropagation(); this.speak(line.t); };
            card.querySelector('.card-header').onclick = () => { list.querySelectorAll('.learn-card').forEach(c => c.classList.remove('open')); card.classList.toggle('open'); };
            list.appendChild(card);
        });
        if(poem.translation) {
            const transCard = document.createElement('div'); transCard.className = 'translation-card';
            transCard.innerHTML = `
                <div class="trans-title">
                    <span>全诗大意</span>
                    <div class="trans-btn-group">
                        <button class="control-btn btn-play-green btn-listen-trans">
                            <svg class="icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg> 听大意
                        </button>
                        <button class="control-btn btn-stop-red" onclick="app.cancelSpeech()">
                            <svg class="icon" viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg> 停止
                        </button>
                    </div>
                </div>
                <div class="trans-content">${poem.translation}</div>
            `;
            transCard.querySelector('.btn-listen-trans').onclick = () => { this.speak(poem.translation); };
            wrapper.appendChild(list); wrapper.appendChild(transCard);
        }
        container.appendChild(wrapper);
    }

    // --- 4. 知识闯关 ---
    renderQuizGame(container) {
        const poem = ALL_POEMS.find(p => p.id === this.currentIdx);
        if (!poem.quiz || poem.quiz.length === 0) { container.innerHTML = '<div style="font-size:20px; color:#666; margin-top:50px;">本诗暂无题目</div>'; return; }
        const qData = poem.quiz[this.currentQuizIdx];
        const wrapper = document.createElement('div'); wrapper.className = 'quiz-container';
        const card = document.createElement('div'); card.className = 'quiz-card';
        card.innerHTML = `<div class="quiz-progress">第 ${this.currentQuizIdx + 1} / ${poem.quiz.length} 题</div><div class="quiz-question">${qData.q}</div>`;
        const optsContainer = document.createElement('div'); optsContainer.className = 'quiz-options';
        const feedback = document.createElement('div'); feedback.className = 'quiz-feedback';

        qData.options.forEach((optText, idx) => {
            const btn = document.createElement('div'); btn.className = 'quiz-opt-btn'; btn.innerText = optText;
            btn.onclick = () => {
                if (btn.dataset.locked) return;
                const allBtns = optsContainer.querySelectorAll('.quiz-opt-btn'); allBtns.forEach(b => b.dataset.locked = 'true');
                if (idx === qData.ans) {
                    btn.classList.add('correct'); this.quizScore++;
                    setTimeout(() => { this.nextQuizQuestion(poem); }, 1000);
                } else {
                    btn.classList.add('wrong');
                    const correctBtn = allBtns[qData.ans]; correctBtn.classList.add('correct');
                    feedback.style.display = 'block';
                    feedback.innerHTML = `正确答案是：<strong>${qData.options[qData.ans]}</strong> <br><span style="font-size:12px; color:#666;">点击正确答案继续</span>`;
                    correctBtn.dataset.locked = ''; correctBtn.onclick = () => { this.nextQuizQuestion(poem); };
                }
            };
            optsContainer.appendChild(btn);
        });
        card.appendChild(optsContainer); card.appendChild(feedback); wrapper.appendChild(card); container.appendChild(wrapper);
    }

    nextQuizQuestion(poem) {
        if (this.currentQuizIdx < poem.quiz.length - 1) { this.currentQuizIdx++; this.renderGame(); }
        else { this.showQuizCelebration(poem.quiz.length); }
    }

    showQuizCelebration(total) {
        document.getElementById('modal-icon').innerText = '状元'; document.getElementById('modal-icon').classList.add('gold-badge');
        document.getElementById('modal-title').innerText = '闯关成功！';
        let msg = this.quizScore === total ? '太厉害了！全部答对，真是小神童！' : `完成了挑战，答对 ${this.quizScore} 题，再接再厉！`;
        document.getElementById('modal-msg').innerText = msg;
        document.getElementById('success-modal').classList.add('show');
    }

    speak(text) {
        this.cancelSpeech(); const u = new SpeechSynthesisUtterance(text); u.lang = 'zh-CN'; u.rate = 0.85;
        const bestVoice = this.voices.find(v => v.name.includes('Google') && v.lang.includes('zh-CN')) || this.voices.find(v => v.lang === 'zh-CN');
        if(bestVoice) u.voice = bestVoice; this.synth.speak(u);
    }
    readPoem() { const p = ALL_POEMS.find(x => x.id === this.currentIdx); this.speak(`${p.title}。${p.author}。${p.content.map(l => l.t).join('')}`); }
    cancelSpeech() { if(this.synth.speaking) this.synth.cancel(); }
    showError(msg) { const t = document.getElementById('error-toast'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
    showSuccess(msgText) { 
        document.getElementById('modal-icon').innerText = '优'; document.getElementById('modal-icon').classList.remove('gold-badge');
        document.getElementById('modal-title').innerText = '挑战成功！'; document.getElementById('modal-msg').innerText = msgText || '你真棒！';
        document.getElementById('success-modal').classList.add('show'); 
    }
    nextMode() {
        document.getElementById('success-modal').classList.remove('show');
        const modes = ['fill', 'sort', 'learn', 'quiz'];
        let nextIdx = modes.indexOf(this.mode) + 1;
        if(nextIdx >= modes.length) nextIdx = 0; this.switchMode(modes[nextIdx]);
    }
    nextPoem() {
        document.getElementById('success-modal').classList.remove('show');
        let currentInFilter = this.filteredList.findIndex(p => p.id === this.currentIdx);
        let nextInFilter = currentInFilter + 1;
        if (nextInFilter >= this.filteredList.length) nextInFilter = 0;
        this.loadPoem(this.filteredList[nextInFilter].id);
        this.switchMode('fill');
    }
}

const app = new PoetryApp();
</script>
